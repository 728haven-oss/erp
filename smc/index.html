<!DOCTYPE html>
<!-- v4.6 sync marker (D2) -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SMC 대리점 ERP 테스트 v4.0 · 대리점</title>
<style>
:root{--bg:#f4f6f9;--card:#fff;--line:#e2e8f0;--txt:#1e293b;--sub:#64748b;--pri:#2563eb;--pri2:#1d4ed8;--ok:#16a34a;--warn:#d97706;--bad:#dc2626;--nav:#0f172a;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--txt);font-size:13px;display:flex;min-height:100vh}
aside{width:200px;background:var(--nav);color:#cbd5e1;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
aside h1{font-size:15px;color:#fff;padding:16px 14px 10px;border-bottom:1px solid #1e293b}
aside h1 small{display:block;font-size:10px;color:#64748b;font-weight:normal;margin-top:3px}
aside a{display:block;padding:12px 16px;color:#cbd5e1;text-decoration:none;font-size:13px;border-left:3px solid transparent;min-height:40px}/* v4.4: 터치 40px */
aside a:hover{background:#1e293b}
aside a.on{background:#1e293b;color:#fff;border-left-color:var(--pri);font-weight:bold}
aside .grp-h{padding:10px 16px 4px;font-size:11px;color:#64748b;cursor:pointer;display:flex;justify-content:space-between;align-items:center;letter-spacing:1px;user-select:none}
aside .grp-h:hover{color:#cbd5e1}
aside .grp.closed .grp-items{display:none}
aside .grp{border-bottom:1px solid #16213a}
aside .foot{padding:12px 14px;font-size:11px;color:#475569;border-top:1px solid #1e293b;margin-top:12px}
aside .foot button{width:100%;margin-top:6px}
aside a.nav-pin{display:flex;justify-content:space-between;align-items:center;gap:6px;margin:8px 10px 4px;padding:8px 10px;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-weight:bold;font-size:13px}
aside a.nav-pin:hover{background:#273449}
aside a.nav-pin.on{border-color:var(--pri);background:#1d2c4f;color:#fff}
#topstrip{position:fixed;top:10px;right:14px;z-index:60}
#topstrip a{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--txt);cursor:pointer;box-shadow:0 1px 4px rgba(15,23,42,.12);text-decoration:none}
#topstrip a:hover{border-color:var(--pri);color:var(--pri)}
main{flex:1;padding:18px 22px;max-width:1320px}/* v4.4: 담당자 패널 공간 */
h2{font-size:18px;margin-bottom:4px}
h3{font-size:14px;margin:14px 0 8px}
.crumb{font-size:12px;color:var(--sub);margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}/* v4.4: 라운드 12px 통일 */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;cursor:pointer}
.stat:hover{border-color:var(--pri);box-shadow:0 1px 4px rgba(37,99,235,.15)}
.stat .t{font-size:12px;color:var(--sub)}
.stat .v{font-size:19px;font-weight:bold;margin-top:4px}
.stat .s{font-size:11px;color:var(--sub);margin-top:2px}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{background:#f8fafc;font-size:12px;color:var(--sub);text-align:left;padding:7px 8px;border-bottom:2px solid var(--line);white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
td:last-child{white-space:nowrap}
tr:hover td{background:#f8fafc}
td.r,th.r{text-align:right}
td.c,th.c{text-align:center}
.num{font-variant-numeric:tabular-nums;white-space:nowrap}
td.r,th.r{white-space:nowrap}
td:first-child{white-space:nowrap}
a.lnk{color:var(--pri);cursor:pointer;text-decoration:none}
a.lnk:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;white-space:nowrap;cursor:default}
.b-gray{background:#f1f5f9;color:#475569}.b-blue{background:#dbeafe;color:#1d4ed8}.b-green{background:#dcfce7;color:#15803d}.b-amber{background:#fef3c7;color:#b45309}.b-red{background:#fee2e2;color:#b91c1c}.b-purple{background:#f3e8ff;color:#7e22ce}
button{font-family:inherit;font-size:12px;padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;color:var(--txt);white-space:nowrap}
button:hover{background:#f1f5f9}
button.pri{background:var(--pri);border-color:var(--pri);color:#fff}
button.pri:hover{background:var(--pri2)}
button.danger{color:var(--bad);border-color:#fecaca}
button.sm{padding:3px 8px;font-size:11px}
button:disabled{opacity:.45;cursor:not-allowed}
input,select,textarea{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:2px solid #bfdbfe;border-color:var(--pri)}
input.r{text-align:right}
input:disabled,select:disabled{background:#f1f5f9;color:var(--sub)}
.frm{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.frm label{display:block;font-size:11px;color:var(--sub);margin-bottom:3px}
.frm .full{grid-column:1/-1}
.frm input,.frm select,.frm textarea{width:100%}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.bar .sp{flex:1}
.tabs{display:flex;flex-wrap:wrap;gap:2px;border-bottom:2px solid var(--line);margin-bottom:12px}
.tabs a{padding:8px 14px;font-size:13px;color:var(--sub);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;white-space:nowrap}
.tabs a.on{color:var(--pri);border-bottom-color:var(--pri);font-weight:bold}
.linkpanel{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px;padding:10px 12px;font-size:12px;margin-top:10px}
.linkpanel b{color:var(--sub);font-size:11px;display:block;margin-bottom:5px}
.linkpanel .row{margin:3px 0}
.warnbox{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 10px;font-size:12px;color:#92400e;margin:8px 0}
.okbox{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 10px;font-size:12px;color:#166534;margin:8px 0}
#modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;z-index:50}
#modal{position:fixed;top:6vh;left:50%;transform:translateX(-50%);width:min(760px,94vw);max-height:86vh;overflow-y:auto;background:#fff;border-radius:10px;padding:18px;display:none;z-index:51;box-shadow:0 10px 40px rgba(0,0,0,.25)}
#modal h3{margin-top:0}
.mini{font-size:11px;color:var(--sub)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.gaugewrap{background:#e2e8f0;border-radius:6px;height:14px;position:relative;overflow:hidden}
.gauge{height:100%;border-radius:6px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s}
.cc-dd{position:absolute;top:100%;left:0;right:0;margin-top:2px;background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(15,23,42,.22);z-index:200;max-height:290px;overflow:auto}
.cc-op{padding:7px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line)}
.cc-op:last-child{border-bottom:none}
.cc-op:hover,.cc-op.on{background:#eff6ff}
.cc-dd mark{background:none;color:var(--pri);font-weight:700;padding:0}
.kbd{background:#f1f5f9;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11px}
.cal-h{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;padding:6px 0;border-bottom:1px solid var(--line)}
.cal{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-d{min-height:96px;border:1px solid var(--line);margin:-1px 0 0 -1px;padding:4px;cursor:pointer;overflow:hidden}
.cal-d:hover{background:#f8fafc}
.cal-off{background:#fafafa;cursor:default}
.cal-today{background:#eff6ff}
.cal-n{font-size:12px;font-weight:bold;margin-bottom:2px}
.cal-chip{font-size:10.5px;padding:1px 4px;margin:1px 0;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#printarea{display:none}
.doc-sheet{font-family:'Malgun Gothic',sans-serif;color:#000;max-width:720px;margin:0 auto;padding:20px}
.doc-sheet h1{text-align:center;font-size:24px;letter-spacing:8px;margin-bottom:10px}
.doc-meta{font-size:11px;color:#333;margin:4px 0}
.doc-t{width:100%;border-collapse:collapse}
.doc-t th,.doc-t td{border:1px solid #333;padding:5px 7px;font-size:12px}
.doc-t th{background:#f1f1f1}
.doc-t .r{text-align:right}.doc-t .c{text-align:center}
.doc-foot{margin-top:14px;font-size:13px;text-align:right}
@media print{body.printing>*{display:none!important}body.printing #printarea{display:block!important}}
/* ---- v4.4 카드형 홈(SAP 포털 스타일) · 그룹 허브 · 업무 담당자 패널 · 브레드크럼 ---- */
.kpis{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.kpis .stat{padding:9px 11px}
.kpis .stat .v{font-size:15px;margin-top:2px}
.kpis .stat .s{margin-top:1px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.tile{position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;min-height:118px;cursor:pointer;overflow:hidden;transition:box-shadow .15s,transform .15s}
.tile:hover{box-shadow:0 6px 18px rgba(15,23,42,.14);transform:translateY(-2px);border-color:#cbd5e1}
.tile .tt{font-size:13px;font-weight:bold;line-height:1.35;max-height:36px;overflow:hidden}
.tile .ts{font-size:11px;color:var(--sub);margin-top:3px;max-height:30px;overflow:hidden}
.tile .tc{font-size:11px;color:var(--pri);font-weight:bold;margin-top:4px}
.tile .ic{position:absolute;right:10px;bottom:10px;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px}
.tile .tile-b{position:absolute;top:8px;right:10px;background:var(--bad);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:bold}
.dash-wrap{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:14px;align-items:start}
@media(max-width:1100px){.dash-wrap{grid-template-columns:1fr}}
.staff-h{font-size:13px;font-weight:bold;margin-bottom:8px}
.staff-h::before{content:'\25CF';color:var(--bad);font-size:9px;margin-right:6px;vertical-align:2px}
.staff-t td,.staff-t th{padding:5px 6px;font-size:12px}
.staff-t .dep{background:#f8fafc;font-size:11px;color:var(--sub);font-weight:bold}
.bc{font-size:12px;color:var(--sub);margin:0 0 8px}
.bc a{color:var(--sub);text-decoration:none}
.bc a:hover{color:var(--pri);text-decoration:underline}
aside .grp-t{flex:1;cursor:pointer;padding:2px 0}
aside .grp-t:hover{color:#e2e8f0}
aside .grp-tg{padding:2px 7px;border-radius:6px;cursor:pointer}
aside .grp-tg:hover{background:#1e293b;color:#e2e8f0}
@media(max-width:820px){.tiles{grid-template-columns:repeat(2,1fr)}}
/* ---- 모바일 대응 (추후 핸드폰 뷰) ---- */
.card{overflow-x:auto}
@media(max-width:820px){
 body{flex-direction:column}
 aside{width:100%;height:auto;position:static;overflow:visible}
 aside h1{padding:10px 14px 6px}
 aside nav{display:flex;overflow-x:auto;white-space:nowrap;border-bottom:1px solid #1e293b}
 aside a{padding:9px 12px;font-size:12px;border-left:none;border-bottom:3px solid transparent;flex-shrink:0}
 aside a.on{border-left:none;border-bottom-color:var(--pri)}
 aside a.nav-pin{margin:6px 8px;padding:7px 10px;border-bottom:none;flex-shrink:0}
 #topstrip{top:auto;bottom:14px;right:12px}
 aside .grp{display:contents}
 aside .grp-h{display:none}
 aside .grp-items{display:contents}
 aside .grp.closed .grp-items{display:contents}
 aside .foot{display:flex;gap:6px;align-items:center;margin-top:0;padding:8px 14px}
 aside .foot button{width:auto;margin-top:0}
 main{padding:12px 10px;max-width:100%}
 .cards{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
 .stat .v{font-size:16px}
 table{min-width:560px}
 .cal-d{min-height:64px;padding:2px}
 .cal-chip{font-size:9px}
 .tabs{overflow-x:auto;white-space:nowrap}
 .tabs a{padding:8px 10px;font-size:12px;flex-shrink:0}
 #modal{top:2vh;width:96vw;max-height:92vh;padding:12px}
 .bar{gap:6px}
 input,select{font-size:16px} /* iOS 확대 방지 */
}
</style>
</head>
<body>
<aside>
  <h1>SMC 대리점 ERP <small>테스트 v4.0 · 대리점 · SMC 송수신 특화 (D1)</small></h1>
  <div style="padding:10px 14px;border-bottom:1px solid #1e293b"><label style="font-size:10px;color:#64748b;display:block;margin-bottom:3px">현재 사용자 <a class="lnk" style="float:right" onclick="loginModal()">ID/PW 로그인</a></label><select id="user-sel" style="width:100%;background:#1e293b;color:#e2e8f0;border-color:#334155" onchange="switchUser(this.value)"></select></div>
  <nav id="nav"></nav>
  <div class="foot">
    데이터는 이 브라우저에 저장됩니다.
    <button class="sm" onclick="exportJson()">백업(JSON)</button>
    <button class="sm" onclick="restoreModal()">복원/스냅샷</button>
    <button class="sm" onclick="resetSeed()">샘플로 초기화</button>
    <button class="sm danger" onclick="wipeAll()">전체 삭제</button>
  </div>
</aside>
<main id="main"></main>
<div id="topstrip"><a id="ts-mail" onclick="location.hash='#/mail'" title="메일함 바로가기 (모든 화면)">✉ 메일</a></div>
<div id="modal-bg" onclick="closeModal()"></div>
<div id="modal"></div>
<div id="toast" class="toast"></div>
<div id="printarea" style="display:none"></div>
<script>
'use strict';
/* ================= 데이터 계층 ================= */
const EDITION='dealer'; // V4-대리점 (D1): 장비사 기능(PRJ·호기·공수·검사성적서) 숨김 + SMC 송수신 — 코드 경로는 유지(유지보수 1회선)
const LS_KEY='erp_smc_d1';
let DB=null;
function saveDB(){localStorage.setItem(LS_KEY,JSON.stringify(DB));try{snapshotDaily();}catch(e){}}
function snapshotDaily(){ // 하루 1회 자동 스냅샷, 최근 7일 보관 (백업 1순위 원칙)
  const k='erp_snap_smcd1_'+today();
  if(!localStorage.getItem(k))localStorage.setItem(k,JSON.stringify(DB));
  const keys=[];for(let i=0;i<localStorage.length;i++){const kk=localStorage.key(i);if(kk&&kk.startsWith('erp_snap_smcd1_'))keys.push(kk);}
  keys.sort().slice(0,-7).forEach(kk=>localStorage.removeItem(kk));}
function restoreModal(){
  const snaps=[];for(let i=0;i<localStorage.length;i++){const kk=localStorage.key(i);if(kk&&kk.startsWith('erp_snap_smcd1_'))snaps.push(kk);}
  snaps.sort().reverse();
  openModal('<h3>백업 / 복원</h3>'
  +'<div class="mini">백업은 이 시스템의 1순위 원칙입니다: ① 수동 JSON 백업(파일로 보관) ② 매일 자동 스냅샷(브라우저, 7일) ③ 실개발(Flask)에서는 서버 일일 자동백업+외부 보관으로 확장.</div>'
  +'<h3>JSON 파일에서 복원</h3><input type="file" accept=".json" onchange="restoreFile(this)">'
  +'<h3 style="margin-top:14px">자동 스냅샷에서 복원 (최근 7일)</h3>'
  +(snaps.map(k=>'<div class="row" style="margin:4px 0"><button class="sm" onclick="restoreSnap(\''+k+'\')">'+k.replace('erp_snap_smcd1_','')+' 시점으로 복원</button></div>').join('')||'<div class="mini">스냅샷 없음</div>')
  +'<div class="bar" style="margin-top:10px"><button onclick="closeModal()">닫기</button></div>');}
function restoreFile(inp){const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);
    if(!d.companies){toast('올바른 백업 파일이 아닙니다');return;}
    if(!confirm('현재 데이터를 이 백업으로 교체할까요?'))return;
    DB=d;saveDB();closeModal();route();toast('복원되었습니다');}catch(err){toast('복원 실패: '+err.message);}};
  r.readAsText(f);}
function restoreSnap(k){if(!confirm(k.replace('erp_snap_smcd1_','')+' 시점 스냅샷으로 복원할까요?'))return;
  DB=JSON.parse(localStorage.getItem(k));saveDB();closeModal();route();toast('스냅샷으로 복원되었습니다');}
function loadDB(){try{DB=JSON.parse(localStorage.getItem(LS_KEY));}catch(e){DB=null;}
  if(!DB||!DB.companies){ // v4: v3 데이터가 있으면 조용히 이관 (신규 기본필드는 아래 마이그레이션에서 채움)
    try{const old=JSON.parse(localStorage.getItem('erp_smc_d1_migr_off'));if(old&&old.companies)DB=old;}catch(e){}}
  if(!DB||!DB.companies){DB=seedData();saveDB();}
  else{ // v1 데이터 마이그레이션
    DB.users=DB.users||[{id:'u1',name:'김재성 (대표)',role:'approver'},{id:'u2',name:'박담당 (영업/구매)',role:'staff'}];
    DB.settings=DB.settings||{currentUserId:'u1',approvalLimit:1000000,quoteApproval:true};
    DB.issues=DB.issues||[];DB.emailLog=DB.emailLog||[];DB.uses=DB.uses||[];DB.rfqs=DB.rfqs||[];
    DB.companies.forEach(c=>{c.contacts=c.contacts||[];});
    DB.schedules=DB.schedules||[];
    DB.bank.forEach(b=>{if(b.bank===undefined)b.bank='';});
    DB.mails=DB.mails||[];DB.labors=DB.labors||[];DB.prices=DB.prices||[];DB.mailContacts=DB.mailContacts||[];DB.auditLog=DB.auditLog||[];DB.adjusts=DB.adjusts||[];DB.cardTx=DB.cardTx||[];(DB.users||[]).forEach(u=>{if(u.rate===undefined)u.rate=25000;});
    DB.settings.company=DB.settings.company||{name:'',bizno:'',ceo:'',tel:'',addr:'',email:'',biztype:'',certName:'',certExpire:'',hometaxLinked:false,bankName:'',bankAcct:'',bankLinked:false,smtp:'',bizCert:null};
    (DB.users||[]).forEach(u=>{if(u.loginId===undefined){u.loginId=u.id==='u1'?'kim':'park';u.pw='1234';u.email=u.email||'';u.active=1;}
      if(u.role==='approver')u.role='admin';if(u.role==='staff')u.role='user';
      if(!u.email)u.email=u.id+'@ourequip.co.kr';});
    // v4 마이그레이션: UI 상태·어음·적정재고·영수/청구
    DB.ui=DB.ui||{navOpen:{}};DB.pnotes=DB.pnotes||[];
    (DB.items||[]).forEach(i=>{if(i.minStock===undefined)i.minStock=0;});
    (DB.taxInvoices||[]).forEach(t=>{if(t.gubun===undefined)t.gubun='청구';});
    // v4 마이그레이션: 홈택스 전자세금계산서 연동 자리 + 건당 전송비용 시뮬레이션
    DB.settings.hometax=DB.settings.hometax||{agency:'팝빌',apiKey:'',feePerDoc:110,enabled:false};
    DB.hometaxLog=DB.hometaxLog||[];
    // v4.1 마이그레이션: SMC 사이트 가격 조회 링크 설정 (에스엠씨공압 대리점 — 2026-07-04)
    DB.settings.smc=DB.settings.smc||{urlTpl:'https://www.google.com/search?q=SMC+{part}+%EA%B0%80%EA%B2%A9',note:''};

const LEAVE_TYPES={annual:['연차','#0d9488',1],half:['반차','#0d9488',0.5],family:['경조','#7e22ce',0],sick:['병가','#dc2626',0],unpaid:['무급','#64748b',0]};

function hrOf(uid2){DB.hr=DB.hr||{};return DB.hr[uid2]||(DB.hr[uid2]={dept:'',jikgub:'',jikchak:'',joinDate:'',tel:'',hp:'',birth:'',status:'재직',leaveDate:'',carryover:0,memo:''});}
function annualLeaveDays(joinDate,asOf){ // 1년 미만: 개근 월 1일(최대 11) / 1년 이상: 15+(근속-1)/2 내림, 상한 25 — 기준일: 오늘(입사일 기준)
  if(!joinDate)return 0;asOf=asOf||today();if(joinDate>asOf)return 0;
  const R=hrRules();const j=new Date(joinDate),a=new Date(asOf);
  let months=(a.getFullYear()-j.getFullYear())*12+(a.getMonth()-j.getMonth());
  if(a.getDate()<j.getDate())months--;
  if(months<12)return Math.max(0,Math.min(months,R.firstYearMax));
  return Math.min(R.base+Math.floor((Math.floor(months/12)-1)/2),R.max);}

/* ---- v4.1: 딜러형 출고 흐름 — 출고가능 수량·미입고 백오더·최근매입 원가 (SMC 등 상품 매입→납품) ---- */
function shipAvailFor(orderId,l){ // 출고가능 = 공통 자재재고(재고현황 기준) + 이 수주 직납 입고 − 기출고(대기 제외) · 제작품/용역/비품목은 null(재고 게이트 없음)
  const it=l.itemId?byId(DB.items,l.itemId):null;
  if(!it||(!['material','part'].includes(it.kind)&&!it.isSet))return null; // v4.5: 세트 품목도 재고 게이트 (조립 입고분 = 세트 재고)
  const k=(l.itemId||'')+'|'+l.name;
  const common=stockOf(l.itemId||('n:'+l.name)).qty;
  let directIn=0;
  DB.trans.filter(t=>t.type==='purchase'&&DB.pos.some(p=>p.id===t.poId&&p.orderId===orderId)).forEach(t=>t.lines.forEach(x=>{if(((x.itemId||'')+'|'+x.name)===k)directIn+=x.qty;}));
  let shipped=0;
  DB.trans.filter(t=>t.type==='sales'&&t.status!=='holdGr'&&t.orderId===orderId).forEach(t=>t.lines.forEach(x=>{if(((x.itemId||'')+'|'+x.name)===k)shipped+=x.qty;}));
  return Math.max(0,common+directIn-shipped);}
function holdDls(){return DB.trans.filter(t=>t.type==='sales'&&t.status==='holdGr');}
function holdAvailInfo(d){ // 대기 전표 라인별 현재 출고 가능 수량 (같은 품목 라인끼리 재고 분배)
  const pool={};
  return d.lines.map(l=>{const k=(l.itemId||'')+'|'+l.name;
    if(!(k in pool)){const a=shipAvailFor(d.orderId,l);pool[k]=a==null?Infinity:a;}
    const ship=Math.max(0,Math.min(l.qty,pool[k]));pool[k]-=ship;
    return {l,ship};});}
function fillLineCost(l){ // 원가 자동 삽입: 가장 가까운(최근) 매입 입고 전표 단가 → 없으면 기준 매입단가 (수동 수정 가능 스냅샷)
  const _sml=l.itemId?byId(DB.items,l.itemId):null; // D2: SMC 원장 판매가 스냅샷(약정가 감사 대조) — 명세서 라인 생성 경로 공용
  if(_sml&&typeof isSmcItem==='function'&&isSmcItem(_sml)&&!(+l.ledgerSale>0)){const _ld=smcLedgerCalc(_sml);if(_ld)l.ledgerSale=_ld.sale;}
  if(l.cost!=null&&l.cost>0){if(l.costPending)delete l.costPending;return l;} // v4.2: 원가 확인되면 미확정 해제
  const _sit=l.itemId?byId(DB.items,l.itemId):null; // v4.5: 세트 라인 원가 = 최신 조립원가(setUnitCost) → 컴포넌트 최근원가 합
  if(_sit&&_sit.isSet){const sc=setCostOf(_sit.id,l.setOpts);if(sc){l.cost=sc.cost;l.costSrc=sc.src;delete l.costPending;return l;}}
  const rb=l.itemId?recentBuyCost(l.itemId):null;
  if(rb){l.cost=rb.price;l.costSrc='최근매입 '+(rb.companyId?co(rb.companyId).name+' · ':'')+rb.date+' 입고'+(rb.no?' ('+rb.no+')':'');delete l.costPending;}
  else{const it=l.itemId?byId(DB.items,l.itemId):null;if(it&&it.buyPrice){l.cost=it.buyPrice;l.costSrc='기준 매입단가';delete l.costPending;}
    else if(costPendingCalc(l)){l.costPending=1;l.costSrc='원가 미확정';}} // v4.2: 매입 대상 품목인데 근거 없음 → 미확정 플래그 (저장·인쇄는 차단 안 함)
  return l;}
function orderDealerCost(oid){ // 딜러형 라인 원가: 직납·불출로 원가가 안 잡힌 품목의 명세서 라인 원가(최근 매입가 스냅샷) — 직납/불출과 이중계상 방지
  const cov={};
  DB.trans.filter(t=>t.type==='purchase'&&DB.pos.some(p=>p.id===t.poId&&p.orderId===oid)).forEach(t=>t.lines.forEach(l=>{cov[(l.itemId||'')+'|'+l.name]=1;}));
  (DB.issues||[]).filter(i=>i.orderId===oid).forEach(i=>{cov[(i.itemId||'')+'|'+i.name]=1;});
  let s=0;
  DB.trans.filter(t=>t.type==='sales'&&t.status!=='holdGr'&&t.orderId===oid).forEach(t=>t.lines.forEach(l=>{
    if(cov[(l.itemId||'')+'|'+l.name])return;s+=(l.cost||0)*(l.qty||0);}));
  return s;}
function refreshOrderDelivered(oid){const o=oid?byId(DB.orders,oid):null;if(!o)return false;
  const dq=deliveredQty(oid);
  const full=o.lines.every(l=>{const k=(l.itemId||'')+'|'+l.name;return (dq[k]||0)>=l.qty;});
  if(full&&['ordered','producing'].includes(o.status)){o.status='delivered';touch(o);}
  return full;}

/* ================= v3: 장비(호기)·진척률·사용처리·RFQ·공급사 포털 ================= */
function projMaterials(oid){
  const m={};
  DB.trans.filter(t=>t.type==='purchase'&&DB.pos.some(p=>p.id===t.poId&&p.orderId===oid)).forEach(t=>t.lines.forEach(l=>{
    const k=(l.itemId||'')+'|'+l.name;
    if(!m[k])m[k]={key:k,itemId:l.itemId,name:l.name,unit:l.unit,inQty:0,used:0};
    m[k].inQty+=l.qty;}));
  (DB.issues||[]).filter(i=>i.orderId===oid).forEach(i=>{const k=(i.itemId||'')+'|'+i.name;
    if(!m[k])m[k]={key:k,itemId:i.itemId,name:i.name,unit:'',inQty:0,used:0};
    m[k].inQty+=i.qty;});
  (DB.uses||[]).filter(u=>u.orderId===oid).forEach(u=>{const k=(u.itemId||'')+'|'+u.name;
    if(!m[k])m[k]={key:k,itemId:u.itemId,name:u.name,unit:'',inQty:0,used:0};
    m[k].used+=u.qty;});
  return m;}
function orderRates(oid){
  const pos=DB.pos.filter(p=>p.orderId===oid);
  let ordQ=0,recQ=0;
  pos.forEach(p=>{const rq=receivedQty(p.id);p.lines.forEach(l=>{ordQ+=l.qty;recQ+=Math.min(rq[(l.itemId||'')+'|'+l.name]||0,l.qty);});});
  const inRate=ordQ>0?Math.round(recQ/ordQ*100):null;
  const mats=Object.values(projMaterials(oid));
  let totQ=0,usedQ=0;
  mats.forEach(x=>{totQ+=x.inQty;usedQ+=Math.min(x.used,x.inQty);});
  const useRate=totQ>0?Math.round(usedQ/totQ*100):null;
  const units=(byId(DB.orders,oid)||{}).units||[];
  const asm=units.length?Math.round(units.reduce((s,u)=>s+(+u.progress||0),0)/units.length):0;
  const comp=Math.round(((useRate==null?0:useRate)+asm)/2);
  return {inRate,useRate,asm,comp,ordQ,recQ,totQ,usedQ};}

function useDo(oid){
  const mats=window._useMats;let n=0;
  for(let i=0;i<mats.length;i++){
    const q=+String((document.getElementById('use-q'+i)||{}).value||'0').replace(/,/g,'')||0;
    if(q<=0)continue;
    if(q>mats[i].inQty-mats[i].used){toast('⚠ "'+mats[i].name+'" 가용 초과');return;}
    n++;}
  if(!n){toast('투입 수량을 입력하세요');return;}
  const date=document.getElementById('use-date').value;
  DB.uses=DB.uses||[];
  for(let i=0;i<mats.length;i++){
    const q=+String((document.getElementById('use-q'+i)||{}).value||'0').replace(/,/g,'')||0;
    if(q>0)DB.uses.push({id:uid('us'),orderId:oid,itemId:mats[i].itemId,name:mats[i].name,qty:q,date,by:curUser().id});}
  saveDB();closeModal();route();toast('투입 완료 — 사용률·완성율 갱신');}
function useCancel(id){if(!confirm('투입 기록을 취소할까요?'))return;DB.uses=DB.uses.filter(u=>u.id!==id);saveDB();route();}

  const list=(DB.rfqs||[]).slice().sort((a,b)=>a.no<b.no?1:-1);
  return '<div class="card"><div class="bar"><span class="mini">품목·수량만 보내면 거래처가 링크(포털)에서 품번·단가·납기를 기입해 회신 → 그대로 발주 전환. 테스트 단계에서는 포털을 시뮬레이션으로 제공.</span><div class="sp"></div><button class="pri" onclick="rfqNewModal()">+ 견적요청 작성</button></div>'
  +'<table><tr><th>번호</th><th>거래처</th><th>일자</th><th>연결 수주</th><th>품목</th><th>회신(단가·납기)</th><th>상태</th><th></th></tr>'
  +(list.map(r=>{const o=r.orderId?byId(DB.orders,r.orderId):null;
    const replied=r.lines.some(l=>l.price>0);
    return '<tr><td><b>'+r.no+'</b></td><td>'+esc(co(r.companyId).name)+'</td><td>'+r.date+'</td><td>'+(o?'<a class="lnk" href="#/orders/view/'+o.id+'">'+o.no+'</a>':'<span class="mini">공통</span>')+'</td>'
    +'<td class="mini">'+r.lines.map(l=>esc(l.name)+' x'+l.qty).join('<br>')+'</td>'
    +'<td class="mini">'+(replied?r.lines.map(l=>(l.vendorPart?'['+esc(l.vendorPart)+'] ':'')+fmt(l.price)+'원'+(l.dcRate>0?' → <b>'+fmt(netOf(l,l.dcRate))+'</b>(DC'+l.dcRate+'%)':'')+' / '+(l.leadDays!=null?l.leadDays+'일':'-')).join('<br>'):'-')+'</td>'
    +'<td>'+rfqBadge(r.status)+' '+negoBadge(r)+(r.poId?' <a class="lnk mini" href="#/po/view/'+r.poId+'">→발주</a>':'')+'</td>'
    +'<td>'+(r.status==='draft'?'<button class="sm" onclick="rfqSend(\''+r.id+'\')">전달</button> <button class="sm danger" onclick="rfqDel(\''+r.id+'\')">삭제</button> ':'')
    +(r.status==='sent'?'<button class="sm" onclick="emailModal(\'rfq\',\''+r.id+'\')">메일</button> <button class="sm pri" onclick="rfqPortal(\''+r.id+'\')">포털(공급사 화면)</button> ':'')
    +(r.status==='replied'?'<button class="sm pri" onclick="rfqToPo(\''+r.id+'\')">발주 전환</button> '+(negoOf(r).status==='vendorCounter'?'<button class="sm pri" onclick="negoCounterReview(\''+r.id+'\')">제안 검토</button> ':(['none','rejected'].includes(negoOf(r).status)?'<button class="sm" onclick="negoAskModal(\''+r.id+'\')">DC 협상</button> ':''))+'<button class="sm" onclick="rfqPortal(\''+r.id+'\')">회신 보기</button>':'')
    +'</td></tr>';}).join('')||'<tr><td colspan="8" class="mini">견적요청 없음</td></tr>')
  +'</table><div class="mini" style="margin-top:6px">실개발(Flask)에서는 "포털" 버튼이 거래처에게 보내는 추측 불가 토큰 URL(로그인 불필요)이 됩니다 — Anvyl 매직링크/Coupa SAN 패턴.</div></div>';}
function rfqNewModal(){
  window._rfqNew={companyId:null,orderId:null,lines:[]};
  rfqNewRender();}
function rfqNewRender(){
  const st=window._rfqNew;
  const orders=DB.orders.filter(o=>!['closed','canceled'].includes(o.status));
  openModal('<h3>견적요청(RFQ) 작성</h3><div class="mini">단가는 비워서 보냅니다 — 거래처가 기입합니다.</div>'
  +'<div class="frm" style="margin:10px 0">'
  +'<div><label>거래처(공급사) *</label><div class="bar" style="margin:0">'+coCombo('rfq-co',cid=>{window._rfqNew.companyId=cid;rfqNewRender();},'purchase',st.companyId?co(st.companyId).name:'')+'</div></div>'
  +'<div><label>연결 수주(프로젝트)</label><select id="rfq-order" onchange="window._rfqNew.orderId=this.value||null"><option value="">공통</option>'+orders.map(o=>'<option value="'+o.id+'"'+(st.orderId===o.id?' selected':'')+'>'+o.no+'</option>').join('')+'</select></div>'
  +'<div><label>일자</label><input type="date" id="rfq-date" value="'+today()+'"></div></div>'
  +'<table><tr><th>품목</th><th>규격</th><th class="r">수량</th><th></th></tr>'
  +st.lines.map((l,i)=>'<tr><td>'+esc(l.name)+'</td><td>'+esc(l.spec||'')+'</td><td class="r"><input class="r" style="width:60px" value="'+l.qty+'" onchange="window._rfqNew.lines['+i+'].qty=+this.value||1"></td><td><button class="sm danger" onclick="window._rfqNew.lines.splice('+i+',1);rfqNewRender()">✕</button></td></tr>').join('')
  +'</table><div class="bar" style="margin-top:8px"><button class="sm" onclick="pickItem(iid=>{const it=byId(DB.items,iid);window._rfqNew.lines.push({itemId:iid,name:it.name,spec:it.spec,unit:it.unit,qty:1,vendorPart:\'\',price:0,leadDays:null});rfqNewRender();},[\'material\',\'part\',\'service\'])">+ 품목 추가</button></div>'
  +'<div class="bar" style="margin-top:10px"><button class="pri" onclick="rfqCreate()">저장</button><button onclick="closeModal()">취소</button></div>');}
function rfqCreate(){
  const st=window._rfqNew;
  if(!st.companyId){toast('거래처를 선택하세요');return;}
  if(!st.lines.length){toast('품목을 추가하세요');return;}
  DB.rfqs=DB.rfqs||[];
  DB.rfqs.push({id:uid('rf'),no:docNo('RFQ',document.getElementById('rfq-date').value),companyId:st.companyId,orderId:st.orderId,date:document.getElementById('rfq-date').value,status:'draft',replyDate:null,poId:null,lines:st.lines});
  saveDB();closeModal();route();toast('견적요청이 저장되었습니다 — [전달] 후 포털로 회신받으세요');}
function rfqSend(id){const r=byId(DB.rfqs,id);r.status='sent';saveDB();route();toast('전달됨 — [포털] 버튼이 거래처가 보는 화면입니다 (실개발 시 토큰 URL 발송)');}
function rfqDel(id){if(!confirm('삭제할까요?'))return;DB.rfqs=DB.rfqs.filter(r=>r.id!==id);saveDB();route();}
function rfqPortal(id){
  const r=byId(DB.rfqs,id);const ro=r.status!=='sent';
  openModal('<div style="background:#0f172a;color:#e2e8f0;margin:-18px -18px 12px;padding:12px 18px;border-radius:10px 10px 0 0"><b>공급사 포털</b> <span class="mini" style="color:#94a3b8">— '+esc(co(r.companyId).name)+' 전용 화면 (시뮬레이션) · 실제로는 https://erp.example.com/p/'+r.id.slice(0,10)+'… 토큰 링크</span></div>'
  +'<h3>견적요청 '+r.no+' <span class="mini">('+esc(userName('u1')).split(' ')[0]+' 사(社) → 귀사)</span></h3>'
  +'<div class="mini">품번을 귀사 기준으로 수정하고, 단가와 납기(일)를 기입 후 회신해 주세요.</div>'+negoVendorPanel(r)+negoHist(r)
  +'<table style="margin-top:8px"><tr><th>품목</th><th class="r">수량</th><th>귀사 품번</th><th class="r">단가(원)</th><th class="r">납기(일)</th><th class="r" title="발주사에 공개되지 않는 귀사 내부 값 — DC 수락 시 마진 계산용">귀사 원가(비공개)</th></tr>'
  +r.lines.map((l,i)=>'<tr><td>'+esc(l.name)+' <span class="mini">'+esc(l.spec||'')+'</span></td><td class="r num">'+fmt(l.qty)+'</td>'
    +'<td><input style="width:110px" id="rp-vp'+i+'" value="'+esc(l.vendorPart||'')+'" '+(ro?'disabled':'')+'></td>'
    +'<td class="r"><input class="r" style="width:100px" id="rp-pr'+i+'" value="'+(l.price||'')+'" '+(ro?'disabled':'')+'></td>'
    +'<td class="r"><input class="r" style="width:60px" id="rp-ld'+i+'" value="'+(l.leadDays!=null?l.leadDays:'')+'" '+(ro?'disabled':'')+'></td>'
    +'<td class="r"><input class="r" style="width:90px" id="rp-vc'+i+'" value="'+(l.vendorCost||'')+'" placeholder="내부용"></td></tr>').join('')
  +'</table><div class="bar" style="margin-top:10px">'+(ro?'<span class="mini">회신 완료된 요청입니다.</span>':'<button class="pri" onclick="rfqReply(\''+id+'\')">회신 제출 (공급사 → 발주사)</button>')+'<button onclick="closeModal()">닫기</button></div>');}
function readVendorCosts(r){r.lines.forEach((l,i)=>{const e=document.getElementById('rp-vc'+i);if(e&&e.value!=='')l.vendorCost=Math.round(+String(e.value).replace(/,/g,''))||0;});}
function rfqReply(id){
  const r=byId(DB.rfqs,id);let anyPrice=false;
  readVendorCosts(r);
  r.lines.forEach((l,i)=>{
    l.vendorPart=(document.getElementById('rp-vp'+i)||{}).value||l.vendorPart||'';
    l.price=Math.round(+String((document.getElementById('rp-pr'+i)||{}).value||'0').replace(/,/g,''))||0;
    const ld=(document.getElementById('rp-ld'+i)||{}).value;
    l.leadDays=ld===''?null:(+ld||0);
    if(l.price>0)anyPrice=true;});
  if(!anyPrice){toast('단가를 1개 이상 기입하세요');return;}
  r.status='replied';r.replyDate=today();
  sysMail(null,'[공급사 회신] '+r.no+' — '+co(r.companyId).name,'견적요청 회신이 도착했습니다. 단가·납기를 확인하고 [발주 전환]으로 진행하세요.','rfq',r.id);
  saveDB();closeModal();route();toast('회신이 기록되었습니다 — 메일함·RFQ 목록에서 확인');}
function rfqToPo(id){
  const r=byId(DB.rfqs,id);
  const n=negoOf(r);
  if(n.status==='buyerAsk'||n.status==='vendorCounter'){toast('⚠ DC 협상 진행 중입니다 — 가격 확정(또는 협상 종료) 후 발주 전환하세요');return;}
  if(!confirm('회신 단가'+(r.priceFixed?' (DC '+(r.agreedDc||0)+'% 확정가)':'')+'·품번으로 발주서를 생성할까요? (결재 규칙 적용)'))return;
  const maxLead=Math.max.apply(null,r.lines.map(l=>l.leadDays||0));
  const lines=r.lines.map(l=>{const it=l.itemId?byId(DB.items,l.itemId):null;
    return calcLine({itemId:l.itemId,name:l.name,spec:(l.spec||'')+(l.vendorPart?' [공급사품번:'+l.vendorPart+']':''),unit:l.unit,qty:l.qty,price:l.price,dcRate:l.dcRate||0},it&&it.tax==='exempt');});
  const p={id:uid('po'),no:docNo('PO',today()),companyId:r.companyId,orderId:r.orderId,date:today(),dueDate:addDays(today(),maxLead||7),status:'ordered',memo:'RFQ '+r.no+' 회신 기반',apv:{status:'none'},lines};
  if(autoApvPo(p))toast('발주 생성 — 한도 이하 자동승인');else toast('발주 생성 — 결재 상신 필요');
  DB.pos.push(p);r.status='ordered';r.poId=p.id;
  saveDB();route();location.hash='#/po/view/'+p.id;}

/* ---- v3: 공급사 명세서(임시→확정) / 긴급 입고요청 / 포털 ---- */
function poPortal(poId){
  const p=byId(DB.pos,poId);
  if(!p.snote)p.snote={status:'prep',updatedAt:null,lines:p.lines.map(l=>({name:l.name,qty:l.qty,ready:0}))};
  const sn=p.snote;const ro=sn.status!=='prep';const reqd=sn.status==='requested';
  const rq=receivedQty(poId);
  openModal('<div style="background:#0f172a;color:#e2e8f0;margin:-18px -18px 12px;padding:12px 18px;border-radius:10px 10px 0 0"><b>공급사 포털</b> <span class="mini" style="color:#94a3b8">— '+esc(co(p.companyId).name)+' 전용 (시뮬레이션) · 실제로는 토큰 URL</span></div>'
  +'<h3>발주서 '+p.no+' — 거래명세서 준비 현황</h3>'
  +(p.rush?'<div class="warnbox">🚨 긴급 입고요청 ('+p.rush.date+'): '+esc(p.rush.note)+' — 준비된 수량만 부분 확정해 먼저 보내주세요.</div>':'')+(sn.rejectNote?'<div class="warnbox">❗ 직전 납품이 반려되었습니다 — 사유: '+esc(sn.rejectNote)+'</div>':'')
  +'<div class="frm" style="margin:8px 0"><div><label>납기 회신 (출하 예정일)</label><input type="date" id="sn-due" value="'+(p.vendorDue||p.dueDate||'')+'" '+(ro?'disabled':'')+'></div></div>'
  +'<div class="mini">물건이 준비되는 대로 "준비 수량"을 수정하세요(임시 명세서). 전부 준비되면 [전량 확정], 급한 건은 준비분만 [부분 출하 확정] — 확정 후에는 수정할 수 없습니다.</div>'
  +'<table style="margin-top:8px"><tr><th>품목</th><th class="r">발주수량</th><th class="r">기출하(입고됨)</th><th class="r">준비 수량</th></tr>'
  +sn.lines.map((l,i)=>{const got=rq[Object.keys(rq).find(k=>k.endsWith('|'+l.name))]||0;
    return '<tr><td>'+esc(l.name)+'</td><td class="r num">'+fmt(l.qty)+'</td><td class="r num">'+fmt(got)+'</td><td class="r"><input class="r" style="width:70px" id="sn-r'+i+'" value="'+l.ready+'" '+(ro?'disabled':'')+'></td></tr>';}).join('')
  +'</table><div class="bar" style="margin-top:10px">'
  +(ro?(sn.status==='final'?'<button class="pri" onclick="deliverRequest(\''+poId+'\')">📦 납품 전달 — 발주사 입고 승인 요청</button>':reqd?'<span class="badge b-purple">발주사 승인 대기 ('+(sn.reqDate||'')+')</span>':'<span class="mini">입고 완료된 명세서입니다.</span>')
    :'<button onclick="snoteSave(\''+poId+'\')">임시 저장 (준비상태 갱신)</button><button class="pri" onclick="snoteFinal(\''+poId+'\',false)">전량 준비 완료 — 확정</button><button class="pri" onclick="snoteFinal(\''+poId+'\',true)">부분 출하 확정 (준비분만)</button>')
  +'<button onclick="closeModal()">닫기</button></div>'
  +'<div class="mini" style="margin-top:6px">확정 명세서(동봉 출력물)는 실개발 시 PDF로 생성됩니다.</div>');}
function snoteRead(p){p.snote.lines.forEach((l,i)=>{const el=document.getElementById('sn-r'+i);if(el)l.ready=Math.max(0,Math.min(l.qty,Math.round(+String(el.value).replace(/,/g,'')||0)));});const de=document.getElementById('sn-due');if(de&&de.value)p.vendorDue=de.value;p.snote.updatedAt=today();}
function snoteSave(poId){const p=byId(DB.pos,poId);snoteRead(p);saveDB();closeModal();route();toast('임시 명세서 준비상태가 갱신되었습니다');}
function snoteFinal(poId,partial){const p=byId(DB.pos,poId);snoteRead(p);
  const anyReady=p.snote.lines.some(l=>l.ready>0);
  if(!anyReady){toast('준비 수량이 없습니다');return;}
  if(!partial){const all=p.snote.lines.every(l=>l.ready>=l.qty);
    if(!all&&!confirm('아직 전량 준비되지 않았습니다. 그래도 전량 확정으로 처리할까요?'))return;}
  p.snote.status='final';p.rush=null;
  sysMail(null,'[명세서 확정] '+p.no+' — '+co(p.companyId).name,'공급사가 거래명세서를 '+(partial?'부분':'전량')+' 확정했습니다. 준비 수량 기준으로 입고 처리하세요.','po',p.id);
  saveDB();closeModal();route();toast((partial?'부분 출하':'전량')+' 확정 — 발주사 메일함에 통지됨');}
function rushModal(poId){
  openModal('<h3>긴급 입고요청 — '+byId(DB.pos,poId).no+'</h3><div class="mini">공급사 포털에 긴급 배지로 표시되고, 공급사는 준비분만 부분 확정해 먼저 보낼 수 있습니다.</div>'
  +'<div class="frm" style="margin:10px 0"><div class="full"><label>요청 내용</label><input id="rush-note" placeholder="예: 서보모터 2개만 먼저 보내주세요 (금주 필수)"></div></div>'
  +'<div class="bar"><button class="pri" onclick="rushDo(\''+poId+'\')">요청 발송</button><button onclick="closeModal()">취소</button></div>');}
function rushDo(poId){const p=byId(DB.pos,poId);
  p.rush={date:today(),note:document.getElementById('rush-note').value||'긴급 입고 요청'};
  saveDB();closeModal();route();toast('긴급 요청이 포털에 표시되었습니다 (실개발: 메일/알림톡 발송)');}

/* ---- v3: 입고 첨부(사진/서류) ---- */
function attachModal(transId){
  openModal('<h3>입고 첨부 — 사진/서류</h3><div class="mini">입고 검수 사진, 공급사 명세서 스캔 등을 이 입고 건에 저장합니다.</div>'
  +'<div style="margin:10px 0"><input type="file" id="att-file" accept="image/*,.pdf" onchange="attachRead(this)"></div>'
  +'<div class="frm"><div class="full"><label>메모</label><input id="att-note" placeholder="예: 외관 이상 없음 / 포장 파손 1건"></div></div>'
  +'<div id="att-preview" class="mini" style="margin:8px 0"></div>'
  +'<div class="bar"><button class="pri" onclick="attachSave(\''+transId+'\')">저장</button><button onclick="closeModal()">취소</button></div>');}
let _attData=null;
function attachRead(inp){const f=inp.files[0];if(!f)return;_attData={name:f.name,dataUrl:null};
  if(f.type&&f.type.startsWith('image/')&&f.size<1500000){
    const r=new FileReader();r.onload=e=>{_attData.dataUrl=e.target.result;
      document.getElementById('att-preview').innerHTML='<img src="'+e.target.result+'" style="max-width:200px;max-height:150px;border:1px solid var(--line);border-radius:6px">';};
    r.readAsDataURL(f);}
  else document.getElementById('att-preview').textContent=f.name+' (파일명만 기록됩니다'+(f.size>=1500000?' — 1.5MB 초과':'')+')';}
function attachSave(transId){const d=byId(DB.trans,transId);
  const note=document.getElementById('att-note').value;
  if(!_attData&&!note){toast('파일을 선택하거나 메모를 입력하세요');return;}
  d.attachments=d.attachments||[];
  d.attachments.push({id:uid('at'),name:_attData?_attData.name:'(메모)',dataUrl:_attData?_attData.dataUrl:null,note,date:today(),by:curUser().id});
  _attData=null;saveDB();closeModal();route();toast('첨부가 저장되었습니다');}
function attachDel(transId,attId){const d=byId(DB.trans,transId);
  if(!confirm('첨부를 삭제할까요?'))return;
  d.attachments=(d.attachments||[]).filter(a=>a.id!==attId);saveDB();route();}

/* ---- v3b: 거래처 담당자(소속) 관리 + 거래처별 내역 조회 ---- */
function contactAdd(cid){const c=byId(DB.companies,cid);c.contacts=c.contacts||[];
  c.contacts.push({id:uid('ct'),name:'',dept:'',title:'',phone:'',email:'',memo:''});saveDB();route();}
function contactChg(cid,ctId,k,v){const c=byId(DB.companies,cid);const ct=(c.contacts||[]).find(x=>x.id===ctId);if(ct){ct[k]=v;touch(c);saveDB();}}
function contactDel(cid,ctId){const c=byId(DB.companies,cid);
  if(!confirm('담당자를 삭제할까요?'))return;
  c.contacts=(c.contacts||[]).filter(x=>x.id!==ctId);saveDB();route();}
function companyEmails(c){ // 용도별 + 담당자 이메일 목록
  const out=[];
  if(c.email)out.push({label:'대표 이메일',email:c.email});
  if(c.emailDoc)out.push({label:'거래명세서/일반 문서용',email:c.emailDoc});
  if(c.emailTax)out.push({label:'홈택스 세금계산서용',email:c.emailTax});
  (c.contacts||[]).forEach(ct=>{if(ct.email)out.push({label:'담당자 '+(ct.name||'')+(ct.dept?' ('+ct.dept+')':''),email:ct.email});});
  return out;}

/* ================= v3+: 일정(달력)·데드라인 / 로그인·계정 / 본사 설정 ================= */
/* 근거: 이카운트 일정관리(월간·유형·공유), kintone(전표 날짜를 달력에 렌더링 — 납기/입고 자동표시),
   사이보우즈(유형별 색), Odoo Activities(문서에 기한 달린 일정)+Milestones(기한초과=빨강), Monday/한국 D-day 관행 */
const SCHED_TYPES={meet:['회의','#2563eb'],field:['출장/현장','#d97706'],visit:['고객방문','#7e22ce'],off:['휴가','#64748b'],etc:['기타','#0891b2']};
function dday(ds){const d=Math.round((new Date(ds)-new Date(today()))/86400000);
  return d>0?'D-'+d:d===0?'D-DAY':'D+'+(-d);}
function ddayBadge(ds,done){const d=Math.round((new Date(ds)-new Date(today()))/86400000);
  const cls=done?'b-gray':d<0?'b-red':d<=7?'b-amber':'b-blue';
  return '<span class="badge '+cls+'">'+dday(ds)+'</span>';}
function calEvents(ds){
  const uf=window._calUser||'';const L=window._calL||(window._calL={s:1,due:1,pay:1,gr:1,lv:1});
  const out=[];
  if(L.s)(DB.schedules||[]).forEach(s=>{if(s.date!==ds)return;if(uf&&s.userId!==uf)return;
    const t=SCHED_TYPES[s.typeCode]||SCHED_TYPES.etc;
    out.push({c:s.deadline?'#dc2626':t[1],label:(s.deadline?'★ ':'')+s.title,sched:s,deadline:s.deadline,done:s.done});});
  if(L.lv===undefined)L.lv=1; // v4.3: 구 세션 기본값 보정
  if(L.lv)(DB.leaves||[]).forEach(l=>{if(l.canceled||apvOf(l).status!=='approved')return;
    if(uf&&l.userId!==uf)return;
    if(l.start<=ds&&ds<=l.end)out.push({c:(LEAVE_TYPES[l.type]||[0,'#0d9488'])[1],label:'휴가 '+userName(l.userId)+' ('+leaveTypeName(l.type)+')',link:'#/leave'});}); // v4.3: 승인 휴가 자동 표시
  if(L.due)DB.orders.forEach(o=>{if(o.status==='canceled'||o.status==='closed')return;
    if(o.dueDate===ds)out.push({c:'#dc2626',label:'납기 '+o.no,link:'#/orders/view/'+o.id});});
  if(L.pay)DB.installments.forEach(i=>{const o=byId(DB.orders,i.orderId);
    if(!o||o.status==='canceled'||i.status==='paid')return;
    if(i.dueDate===ds)out.push({c:'#16a34a',label:'수금 '+o.no+' '+i.name,link:'#/orders/view/'+o.id});});
  if(L.gr)DB.pos.forEach(p=>{if(p.status!=='ordered')return;
    if(p.dueDate===ds)out.push({c:'#64748b',label:'입고예정 '+p.no,link:'#/po/view/'+p.id});});
  return out;}
function calMv(n){const ym=window._calYm||thisMonth();const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+n,1);window._calYm=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');route();}
function pageCalendar(M){
  const ym=window._calYm||(window._calYm=thisMonth());
  const [y,m]=ym.split('-').map(Number);
  const uf=window._calUser||'';const L=window._calL||(window._calL={s:1,due:1,pay:1,gr:1,lv:1});
  const first=new Date(y,m-1,1);const startDow=first.getDay();
  const dim=new Date(y,m,0).getDate();

  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div class="cal-d cal-off"></div>';
  for(let d=1;d<=dim;d++){
    const ds=ym+'-'+String(d).padStart(2,'0');
    const ev=calEvents(ds);
    const isToday=ds===today();
    cells+='<div class="cal-d'+(isToday?' cal-today':'')+'" onclick="calDay(\''+ds+'\')">'
    +'<div class="cal-n">'+d+(isToday?' <span class="badge b-blue">오늘</span>':'')+'</div>'
    +ev.slice(0,3).map(e=>'<div class="cal-chip" style="background:'+e.c+'22;border-left:3px solid '+e.c+(e.done?';text-decoration:line-through;opacity:.6':'')+'">'+esc(e.label)+'</div>').join('')
    +(ev.length>3?'<div class="mini">+'+(ev.length-3)+'건 더</div>':'')
    +'</div>';}
  const deadlines=(DB.schedules||[]).filter(s=>s.deadline&&!s.done).sort((a,b)=>a.date<b.date?-1:1);
  M.innerHTML='<h2>일정 (달력)</h2><div class="crumb">개인·프로젝트 일정 + 전표 날짜 자동 표시(납기·수금·입고예정 — 이중 입력 없음, kintone 방식) · 날짜 클릭 = 상세/추가</div>'
  +'<div class="card"><div class="bar">'
  +'<button onclick="calMv(-1)">◀ 이전달</button><b style="font-size:16px">'+y+'년 '+m+'월</b><button onclick="calMv(1)">다음달 ▶</button>'
  +'<button class="sm" onclick="window._calYm=thisMonth();route()">오늘</button>'
  +'<div class="sp"></div>'
  +'<select onchange="window._calUser=this.value;route()"><option value="">전체 담당자</option>'+(DB.users||[]).map(u=>'<option value="'+u.id+'"'+(uf===u.id?' selected':'')+'>'+esc(u.name)+'</option>').join('')+'</select>'
  +'<label class="mini"><input type="checkbox" '+(L.s?'checked':'')+' onchange="window._calL.s=this.checked?1:0;route()"> 일정</label>'
  +'<label class="mini"><input type="checkbox" '+(L.due?'checked':'')+' onchange="window._calL.due=this.checked?1:0;route()"> <span style="color:#dc2626">납기</span></label>'
  +'<label class="mini"><input type="checkbox" '+(L.pay?'checked':'')+' onchange="window._calL.pay=this.checked?1:0;route()"> <span style="color:#16a34a">수금</span></label>'
  +'<label class="mini"><input type="checkbox" '+(L.gr?'checked':'')+' onchange="window._calL.gr=this.checked?1:0;route()"> <span style="color:#64748b">입고</span></label>'
  +'<label class="mini"><input type="checkbox" '+(L.lv?'checked':'')+' onchange="window._calL.lv=this.checked?1:0;route()"> <span style="color:#0d9488">휴가</span></label>'
  +'<button class="pri sm" onclick="schedModal({date:today()})">+ 일정 추가</button></div>'
  +'<div class="cal-h">'+['일','월','화','수','목','금','토'].map((w,i)=>'<div style="color:'+(i===0?'var(--bad)':i===6?'var(--pri)':'var(--sub)')+'">'+w+'</div>').join('')+'</div>'
  +'<div class="cal">'+cells+'</div></div>'
  +'<div class="card"><h3 style="margin-top:0">데드라인 현황 (D-day)</h3>'
  +'<table><tr><th>D-day</th><th>일자</th><th>제목</th><th>프로젝트</th><th>담당</th><th></th></tr>'
  +(deadlines.map(s=>{const o=s.orderId?byId(DB.orders,s.orderId):null;
    return '<tr><td>'+ddayBadge(s.date,s.done)+'</td><td>'+s.date+'</td><td><b>'+esc(s.title)+'</b></td><td>'+(o?'<a class="lnk" href="#/orders/view/'+o.id+'">'+o.no+'</a>':'-')+'</td><td>'+userName(s.userId)+'</td>'
    +'<td><button class="sm" onclick="schedDone(\''+s.id+'\')">완료</button> <button class="sm danger" onclick="schedDel(\''+s.id+'\')">삭제</button></td></tr>';}).join('')||'<tr><td colspan="6" class="mini">미완료 데드라인 없음</td></tr>')
  +'</table><div class="mini" style="margin-top:6px">색 규칙(Odoo/Monday 패턴): 기한 전=파랑, 7일 내=주황, 초과=빨강. 완료 시 회색.</div></div>';}
function calDay(ds){
  const ev=calEvents(ds);
  openModal('<h3>'+ds+' ('+['일','월','화','수','목','금','토'][new Date(ds).getDay()]+')</h3>'
  +(ev.length?ev.map(e=>'<div class="row" style="margin:6px 0;padding:6px 8px;background:'+e.c+'18;border-left:3px solid '+e.c+';border-radius:4px">'
    +(e.deadline?ddayBadge(ds,e.done)+' ':'')+esc(e.label)
    +(e.sched?' <span class="mini">('+userName(e.sched.userId)+')</span> '
      +(e.sched.done?'<span class="badge b-gray">완료</span>':'<a class="lnk mini" onclick="schedDone(\''+e.sched.id+'\')">[완료]</a>')
      +' <a class="lnk mini" onclick="schedDel(\''+e.sched.id+'\')">[삭제]</a>':'')
    +(e.link?' <a class="lnk mini" href="'+e.link+'" onclick="closeModal()">[문서로]</a>':'')
    +(e.sched&&e.sched.memo?'<div class="mini">'+esc(e.sched.memo)+'</div>':'')+'</div>').join(''):'<div class="mini">일정 없음</div>')
  +'<div class="bar" style="margin-top:10px"><button class="pri" onclick="closeModal();schedModal({date:\''+ds+'\'})">+ 이 날짜에 일정 추가</button><button onclick="closeModal()">닫기</button></div>');}
function schedModal(pre){pre=pre||{};

  openModal('<h3>일정 추가</h3>'
  +'<div class="frm" style="margin:10px 0">'
  +'<div><label>일자 *</label><input type="date" id="sc-date" value="'+(pre.date||today())+'"></div>'
  +'<div><label>담당자</label><select id="sc-user">'+(DB.users||[]).map(u=>'<option value="'+u.id+'"'+(u.id===curUser().id?' selected':'')+'>'+esc(u.name)+'</option>').join('')+'</select></div>'
  +'<div class="full"><label>제목 *</label><input id="sc-title" placeholder="예: 대한정밀 방문 / 1호기 시운전"></div>'
  +'<div><label>유형(색상)</label><select id="sc-type">'+Object.keys(SCHED_TYPES).map(k=>'<option value="'+k+'">'+SCHED_TYPES[k][0]+'</option>').join('')+'</select></div>'
  +'<div><label>프로젝트(수주) 연결</label><select id="sc-order"><option value="">없음(개인/회사 일정)</option>'+orders.map(o=>'<option value="'+o.id+'"'+(pre.orderId===o.id?' selected':'')+'>'+o.no+'</option>').join('')+'</select></div>'
  +'<div class="full"><label><input type="checkbox" id="sc-dead"'+(pre.deadline?' checked':'')+'> <b>데드라인으로 지정</b> (달력·프로젝트에 D-day 표시, 지연 시 빨강)</label></div>'
  +'<div class="full"><label>메모</label><input id="sc-memo"></div></div>'
  +'<div class="bar"><button class="pri" onclick="schedSave()">저장</button><button onclick="closeModal()">취소</button></div>');}
function schedSave(){
  const g=x=>document.getElementById(x);
  if(!g('sc-title').value.trim()){toast('제목을 입력하세요');return;}
  DB.schedules=DB.schedules||[];
  DB.schedules.push({id:uid('sc'),date:g('sc-date').value,title:g('sc-title').value.trim(),userId:g('sc-user').value,typeCode:g('sc-type').value,orderId:g('sc-order').value||null,deadline:g('sc-dead').checked,done:false,memo:g('sc-memo').value,by:curUser().id});
  saveDB();closeModal();route();toast('일정이 추가되었습니다');}
function schedDone(id){const s=byId(DB.schedules,id);s.done=!s.done;saveDB();route();}
function schedDel(id){if(!confirm('일정을 삭제할까요?'))return;DB.schedules=DB.schedules.filter(s=>s.id!==id);saveDB();route();}
function schedCard(o,locked){

  +'<input type="date" value="'+f.from+'" onchange="fltGet(\''+k+'\').from=this.value;route()"> ~ <input type="date" value="'+f.to+'" onchange="fltGet(\''+k+'\').to=this.value;route()">'

  +'</div>';}
function fltHit(k,doc,lines){const f=fltGet(k);
  if(f.co&&doc.companyId!==f.co)return false;
  if(f.from&&(doc.date||'')<f.from)return false;
  if(f.to&&(doc.date||'')>f.to)return false;
  if(f.brand){const has=(lines||[]).some(l=>{const it=l.itemId?byId(DB.items,l.itemId):null;return it&&(it.brand||'')===f.brand;});
    if(!has)return false;}
  if(f.q){const hay=((doc.no||'')+' '+(doc.memo||'')+' '+co(doc.companyId).name+' '+(lines||[]).map(l=>(l.name||'')+' '+(l.spec||'')).join(' '));
    if(!hay.includes(f.q))return false;}
  return true;}

/* ---- v3+: 현금 장부(통장 실흐름) vs 전산 장부(계산서 발생) 분리 — 현금주의/발생주의 ----
   근거: 이카운트 자금현황표(전표=실제 자금) vs 매출·매입장(계산서=발생), 더존 매입매출장, 경리나라 자금일보 패턴 */
function repCash(){
  const from=window._cashFrom||today().slice(0,4)+'-01-01';
  const to=window._cashTo||today();
  const rows=DB.bank.filter(b=>b.date>=from&&b.date<=to).sort((a,b)=>a.date<b.date?-1:1);
  const inSum=rows.filter(b=>b.amount>0).reduce((s,b)=>s+b.amount,0);
  const outSum=rows.filter(b=>b.amount<0).reduce((s,b)=>s-b.amount,0);
  let run=DB.bank.filter(b=>b.date<from).reduce((s,b)=>s+b.amount,0);
  const open=run;
  const monthly={};
  rows.forEach(b=>{const m=b.date.slice(0,7);monthly[m]=monthly[m]||{i:0,o:0};if(b.amount>0)monthly[m].i+=b.amount;else monthly[m].o-=b.amount;});
  return '<div class="card"><div class="bar"><b>현금 장부 — 통장 기준 실제 돈의 흐름</b>'
  +'<input type="date" value="'+from+'" onchange="window._cashFrom=this.value;route()"> ~ <input type="date" value="'+to+'" onchange="window._cashTo=this.value;route()">'
  +'<div class="sp"></div><a class="lnk" href="#/reports/bank">통장 대사로 →</a></div>'
  +'<div class="cards">'
  +'<div class="stat"><div class="t">기간 입금 합계</div><div class="v" style="color:var(--pri)">'+fmt(inSum)+'</div></div>'
  +'<div class="stat"><div class="t">기간 출금 합계</div><div class="v" style="color:var(--bad)">'+fmt(outSum)+'</div></div>'
  +'<div class="stat"><div class="t">순증감</div><div class="v">'+fmt(inSum-outSum)+'</div></div>'
  +'<div class="stat"><div class="t">기말 잔액(누계)</div><div class="v">'+fmt(open+inSum-outSum)+'</div></div></div>'
  +'<table><tr><th>일자</th><th>은행</th><th>적요</th><th class="r">입금</th><th class="r">출금</th><th class="r">누적 잔액</th><th>대사</th></tr>'
  +'<tr style="background:#f8fafc"><td>'+from+'</td><td colspan="4"><b>이월 잔액</b></td><td class="r num"><b>'+fmt(open)+'</b></td><td></td></tr>'
  +rows.slice().reverse().map(b=>{run+=b.amount;
    return '<tr><td>'+b.date+'</td><td class="mini">'+esc(b.bank||'')+'</td><td>'+esc(b.desc)+'</td><td class="r num" style="color:var(--pri)">'+(b.amount>0?fmt(b.amount):'')+'</td><td class="r num" style="color:var(--bad)">'+(b.amount<0?fmt(-b.amount):'')+'</td><td class="r num">'+fmt(run)+'</td><td>'+badge('bank',bankStatus(b))+'</td></tr>';}).join('')
  +'</table>'
  +'<h3>월별 현금 흐름</h3><table><tr><th>월</th><th class="r">입금</th><th class="r">출금</th><th class="r">순증감</th></tr>'
  +Object.keys(monthly).sort().map(m=>'<tr><td>'+m+'</td><td class="r num">'+fmt(monthly[m].i)+'</td><td class="r num">'+fmt(monthly[m].o)+'</td><td class="r num"'+(monthly[m].i-monthly[m].o<0?' style="color:var(--bad)"':'')+'>'+fmt(monthly[m].i-monthly[m].o)+'</td></tr>').join('')
  +'</table><div class="mini" style="margin-top:6px">여기는 "실제로 오간 돈"만 봅니다. 계산서를 끊었지만 아직 입금 안 된 돈(미수)은 아래 전산 장부와의 차이로 나타납니다.</div></div>';}

  +Object.keys(monthly).sort().map(m=>'<tr><td>'+m+'</td><td class="r num">'+fmt(monthly[m].s)+'</td><td class="r num">'+fmt(monthly[m].b)+'</td><td class="r num">'+fmt(monthly[m].s-monthly[m].b)+'</td></tr>').join('')

/* ---- v3+: 메일함 v2 — Gmail·네이버웍스 패턴 ----
   근거: Gmail(좌측 폴더·별표·검색·선택 시 일괄 액션바·RE:/FW: 규칙·임시보관함),

function negoOf(r){return r.nego||(r.nego={status:'none',dc:0,history:[]});}
function negoBadge(r){const n=negoOf(r);
  return n.status==='agreed'?'<span class="badge b-green">가격확정 DC '+(r.agreedDc||'')+(negoOf(r).scope==='standing'?' · 종가':'')+'</span>'
  :n.status==='buyerAsk'?'<span class="badge b-purple">DC '+(n.mode==='line'?'품번별':n.dc+'%')+' 요청중</span>'
  :n.status==='vendorCounter'?'<span class="badge b-amber">공급사 조정제안 '+(n.mode==='line'?'품번별':n.dc+'%')+'</span>'
  :n.status==='rejected'?'<span class="badge b-red">협상 반려</span>':'';}
function applyStandingPrices(r){const n=negoOf(r);let cnt=0;
  DB.prices=DB.prices||[];
  r.lines.forEach((l,i)=>{const rate=n.mode==='line'?((n.dcs&&+n.dcs[i])||0):(n.dc||0);
    if(!(rate>0)||!l.itemId)return;
    const np=netOf(l,rate);
    DB.prices.forEach(p=>{if(p.itemId===l.itemId&&p.companyId===r.companyId&&p.buyPrice>0&&(!p.to||p.to>=today()))p.to=addDays(today(),-1);}); // 기존 종가 종료
    DB.prices.push({id:uid('pr'),itemId:l.itemId,companyId:r.companyId,salePrice:0,buyPrice:np,from:today(),to:null,src:'협상 '+r.no});cnt++;});
  if(cnt){n.history.push({by:'system',action:'종가 변동 등록 — '+cnt+'개 품목 향후 단가 적용',dc:null,note:'',date:today()});
    toast('종가 변동: '+cnt+'개 품목의 향후 매입단가 등록 (품목>단가 관리)');}}
function applyDc(r){const n=negoOf(r);
  if(n.mode==='line'){r.lines.forEach((l,i)=>{l.dcRate=(n.dcs&&+n.dcs[i])||0;});r.agreedDc='품번별';}
  else{r.lines.forEach(l=>{l.dcRate=n.dc;});r.agreedDc=n.dc+'%';} // 총액 DC = 전 라인 균등 비례(1/N) 배분
  r.priceFixed=true;
  if(n.scope==='standing')applyStandingPrices(r); // 종가 변동: 앞으로의 납품분 단가 갱신 (과거 문서 불변)
}
function netOf(l,rate){return Math.round((l.price)*(1-(rate||0)/100));}
function negoHist(r){const n=negoOf(r);
  return n.history.length?'<div class="linkpanel"><b>협상 이력</b>'+n.history.map(h=>'<div class="row">'+h.date+' · '+(h.by==='buyer'?'발주사':'공급사')+' · '+h.action+' '+(h.dc!=null?'DC '+h.dc+'%':'')+(h.note?' — '+esc(h.note):'')+'</div>').join('')+'</div>':'';}
function negoAskModal(id){const r=byId(DB.rfqs,id);const n=negoOf(r);
  const md=window._ngMode||n.mode||'total';window._ngMode=md;
  openModal('<h3>DC율 '+(n.status==='vendorCounter'?'재요청':'요청')+' — '+r.no+'</h3>'

  +'<div class="bar" style="margin:10px 0"><label class="mini"><input type="radio" name="ngm" '+(md==='total'?'checked':'')+' onclick="window._ngMode=\'total\';closeModal();negoAskModal(\''+id+'\')"> 총액 DC (전 품번 균등 1/N 배분)</label>'
  +'<label class="mini"><input type="radio" name="ngm" '+(md==='line'?'checked':'')+' onclick="window._ngMode=\'line\';closeModal();negoAskModal(\''+id+'\')"> 품번별 DC (라인마다 다르게)</label></div>'
  +(md==='total'
    ?'<div class="frm"><div><label>요청 DC율 (%)</label><input class="r" id="ng-dc" value="'+(n.dc||5)+'"></div></div>'
    :'<table><tr><th>품목</th><th class="r">단가(원)</th><th class="r">요청 DC%</th><th class="r">정산가(예상)</th></tr>'
     +r.lines.map((l,i)=>'<tr><td>'+esc(l.name)+'</td><td class="r num">'+fmt(l.price)+'</td><td class="r"><input class="r" style="width:55px" id="ng-ldc'+i+'" value="'+((n.dcs&&n.dcs[i])||0)+'"></td><td class="r num mini">입력 후 확정 시 표시</td></tr>').join('')+'</table>')
  +'<div class="bar" style="margin:8px 0"><label class="mini"><input type="radio" name="ngs" '+((window._ngScope||'once')==='once'?'checked':'')+' onclick="window._ngScope=\'once\'"> <b>이번 건 한정</b> (이 발주 1회만 적용)</label>'
  +'<label class="mini"><input type="radio" name="ngs" '+((window._ngScope||'once')==='standing'?'checked':'')+' onclick="window._ngScope=\'standing\'"> <b>종가 변동</b> (확정 시 향후 납품분부터 업체별 단가 자동 적용)</label></div>'
  +'<div class="frm" style="margin:8px 0"><div class="full"><label>요청 사유/메모</label><input id="ng-note" placeholder="예: 일괄 발주 조건"></div></div>'
  +negoHist(r)
  +'<div class="bar" style="margin-top:10px"><button class="pri" onclick="negoAsk(\''+id+'\')">DC 요청 발송</button><button onclick="closeModal()">취소</button></div>');}
function negoAsk(id){const r=byId(DB.rfqs,id);const n=negoOf(r);
  n.mode=window._ngMode||'total';
  if(n.mode==='line'){
    n.dcs=r.lines.map((l,i)=>Math.max(0,Math.min(99,+String((document.getElementById('ng-ldc'+i)||{}).value||'0').replace(/,/g,'')||0)));
    if(!n.dcs.some(d=>d>0)){toast('품번별 DC율을 1개 이상 입력하세요');return;}
    n.dc=null;}
  else{const dc=+String(document.getElementById('ng-dc').value).replace(/,/g,'')||0;
    if(dc<=0||dc>=100){toast('DC율을 1~99 사이로 입력하세요');return;}
    n.dc=dc;n.dcs=null;}
  n.scope=window._ngScope||'once';
  n.status='buyerAsk';
  n.history.push({by:'buyer',action:'DC 요청('+(n.mode==='line'?'품번별':'총액 '+n.dc+'%')+' · '+(n.scope==='standing'?'종가 변동':'이번 건 한정')+')',dc:n.dc,note:document.getElementById('ng-note').value,date:today()});
  saveDB();closeModal();route();toast('DC 요청이 공급사 포털에 표시됩니다');}
function negoCounterReview(id){const r=byId(DB.rfqs,id);const n=negoOf(r);
  openModal('<h3>공급사 조정 제안 검토 — '+r.no+'</h3>'
  +'<div class="mini">공급사 제안: <b>'+(n.mode==='line'?'품번별 DC ['+(n.dcs||[]).join('/')+'%]':'DC '+n.dc+'%')+'</b> · 적용 범위: <b>'+(n.scope==='standing'?'종가 변동(향후 지속)':'이번 건 한정')+'</b> — 수락 시 발주 단가는 원가격 유지 + 정산가 병기.</div>'
  +negoHist(r)
  +'<div class="bar" style="margin-top:10px">'
  +'<button class="pri" onclick="negoBuyerAccept(\''+id+'\')">수락 — 가격 확정</button>'
  +'<button onclick="closeModal();negoAskModal(\''+id+'\')">다른 DC로 재요청</button>'
  +'<button class="danger" onclick="negoBuyerReject(\''+id+'\')">협상 종료(원단가 유지)</button>'
  +'<button onclick="closeModal()">닫기</button></div>');}
function negoBuyerAccept(id){const r=byId(DB.rfqs,id);const n=negoOf(r);
  applyDc(r);n.status='agreed';
  n.history.push({by:'buyer',action:'수락 — 가격 확정',dc:n.dc,note:'',date:today()});
  sysMail(null,'[가격 확정] '+r.no+' — DC '+(r.agreedDc||''),'양측 승낙으로 가격이 확정되었습니다. [발주 전환]을 진행하세요.','rfq',r.id);
  saveDB();closeModal();route();toast('가격 확정 (DC '+n.dc+'%) — 발주 전환 시 확정 단가가 적용됩니다');}
function negoBuyerReject(id){const r=byId(DB.rfqs,id);const n=negoOf(r);
  n.status='rejected';n.history.push({by:'buyer',action:'협상 종료',dc:null,note:'',date:today()});
  saveDB();closeModal();route();toast('협상을 종료했습니다 (회신 원단가 유지)');}
function negoVendor(id,act){const r=byId(DB.rfqs,id);const n=negoOf(r);readVendorCosts(r);saveDB();
  if(act==='accept'){applyDc(r);n.status='agreed';
    n.history.push({by:'vendor',action:'수락 — 가격 확정',dc:n.dc,note:'',date:today()});
    sysMail(null,'[가격 확정] '+r.no+' — 공급사가 DC '+(r.agreedDc||negoOf(r).dc+'%')+' 수락','가격이 확정되었습니다. [발주 전환]을 진행하세요.','rfq',r.id);
    saveDB();closeModal();route();toast('수락 — 가격 확정');}
  else if(act==='reject'){n.status='rejected';
    n.history.push({by:'vendor',action:'반려',dc:null,note:document.getElementById('ngv-note')?document.getElementById('ngv-note').value:'',date:today()});
    sysMail(null,'[DC 반려] '+r.no,'공급사가 DC 요청을 반려했습니다 (회신 원단가 유지).','rfq',r.id);
    saveDB();closeModal();route();toast('반려 처리');}
  else{
    if(n.mode==='line'){
      const cs=r.lines.map((l,i)=>Math.max(0,Math.min(99,+String((document.getElementById('ngv-ldc'+i)||{}).value||'0').replace(/,/g,'')||0)));
      if(!cs.some(d=>d>0)){toast('조정 DC율을 입력하세요');return;}
      n.dcs=cs;n.status='vendorCounter';
      n.history.push({by:'vendor',action:'조정 제안(품번별)',dc:null,note:document.getElementById('ngv-note')?document.getElementById('ngv-note').value:'',date:today()});}
    else{const c=+String(document.getElementById('ngv-dc').value).replace(/,/g,'')||0;
      if(c<=0||c>=100){toast('조정 DC율을 입력하세요');return;}
      n.status='vendorCounter';n.dc=c;
      n.history.push({by:'vendor',action:'조정 제안',dc:c,note:document.getElementById('ngv-note')?document.getElementById('ngv-note').value:'',date:today()});}
    const lbl=n.mode==='line'?'품번별 ['+(n.dcs||[]).join('/')+'%]':n.dc+'%';
    sysMail(null,'[DC 조정 제안] '+r.no+' — '+lbl,'공급사가 DC '+lbl+'를 역제안했습니다. 검토 후 수락/재요청하세요.','rfq',r.id);
    saveDB();closeModal();route();toast('조정 제안 '+lbl+' 발송');}}
function negoVendorPanel(r){const n=negoOf(r);
  const rateAt=i=>n.mode==='line'?((n.dcs&&n.dcs[i])||0):(n.dc||0);
  const marginBlock=()=>{const has=r.lines.some(l=>l.vendorCost>0);
    if(!has)return '<div class="mini">위 표의 "귀사 원가(비공개)"를 입력하면 DC 수락 시 마진율이 여기 표시됩니다.</div>';
    let sell=0,cost=0;
    const rows=r.lines.map((l,i)=>{if(!(l.vendorCost>0))return '';
      const sp=netOf(l,rateAt(i));sell+=sp*l.qty;cost+=l.vendorCost*l.qty;
      const mg=sp>0?Math.round((sp-l.vendorCost)/sp*100):0;
      return '<tr><td>'+esc(l.name)+'</td><td class="r num">'+fmt(l.price)+'</td><td class="r">'+rateAt(i)+'%</td><td class="r num">'+fmt(sp)+'</td><td class="r num">'+fmt(l.vendorCost)+'</td><td class="r"><span class="badge '+(mg<10?'b-red':mg<20?'b-amber':'b-green')+'">'+mg+'%</span></td></tr>';}).join('');
    const tm=sell>0?Math.round((sell-cost)/sell*100):0;
    return '<div class="card" style="background:#fffbeb"><b class="mini">요청 DC 수락 시 귀사 마진 (내부 계산 — 발주사 미공개)</b>'
    +'<table style="margin-top:6px"><tr><th>품목</th><th class="r">원단가</th><th class="r">DC</th><th class="r">정산가</th><th class="r">귀사 원가</th><th class="r">마진</th></tr>'+rows
    +'<tr><th colspan="5">전체 마진율</th><th class="r"><span class="badge '+(tm<10?'b-red':tm<20?'b-amber':'b-green')+'">'+tm+'%</span></th></tr></table></div>';};
  if(n.status==='buyerAsk')
    return marginBlock()+'<div class="warnbox"><b>발주사 DC 요청: '+(n.mode==='line'?'품번별 ['+(n.dcs||[]).join('/')+'%]':'총액 '+n.dc+'% (전 품번 균등 배분)')+'</b> <span class="badge '+(n.scope==='standing'?'b-purple':'b-gray')+'">'+(n.scope==='standing'?'종가 변동 — 향후 납품분 지속 적용':'이번 건 한정')+'</span>'+(n.history.length&&n.history[n.history.length-1].note?' — '+esc(n.history[n.history.length-1].note):'')+'</div>'
    +'<div class="bar"><button class="pri" onclick="negoVendor(\''+r.id+'\',\'accept\')">승인(수락) — 가격 확정</button>'
    +(n.mode==='line'
      ?r.lines.map((l,i)=>'<span class="mini">'+esc(l.name).slice(0,8)+'</span><input class="r" id="ngv-ldc'+i+'" style="width:45px" value="'+rateAt(i)+'">').join(' ')+'<button onclick="negoVendor(\''+r.id+'\',\'counter\')">품번별 조정 제안</button>'
      :'<input class="r" id="ngv-dc" style="width:60px" placeholder="%" value="'+Math.max(1,(n.dc||3)-2)+'"><button onclick="negoVendor(\''+r.id+'\',\'counter\')">DC 조정 제안</button>')
    +'<input id="ngv-note" style="width:140px" placeholder="사유(선택)"><button class="danger" onclick="negoVendor(\''+r.id+'\',\'reject\')">반려</button></div>';
  if(n.status==='agreed')return '<div class="okbox">✅ 가격 확정 — DC '+(r.agreedDc||'')+' 적용 (원단가 유지 + 정산가 병기)</div>';
  if(n.status==='vendorCounter')return '<div class="warnbox">조정 제안 DC '+n.dc+'% — 발주사 검토 중</div>';
  return '';}

/* ---- v3+: 업체별·기간별 단가 + 최근 매입가 원가 참조 — 이카운트 특별단가/이전 최근단가 패턴 ---- */
function priceFor(itemId,companyId,kind,date){
  date=date||today();
  const key=kind==='sale'?'salePrice':'buyPrice';
  const cands=(DB.prices||[]).filter(p=>p.itemId===itemId&&(p[key]>0)
    &&(!p.companyId||p.companyId===companyId)
    &&(!p.from||p.from<=date)&&(!p.to||p.to>=date));
  if(!cands.length)return null;
  cands.sort((a,b)=>((b.companyId?1:0)-(a.companyId?1:0))||((b.from||'')<(a.from||'')?-1:1)); // 업체 지정 우선, 최신 기간 우선
  return {price:cands[0][key],src:(cands[0].companyId?'업체별':'기간')+' 단가'};}
function recentBuyCost(itemId){ // 가장 가까운(최근) 매입 입고 전표의 단가 — v4.1: 거래처·전표번호 포함(원가 근거 표시), DC 정산가 우선
  let best=null;
  DB.trans.filter(t=>t.type==='purchase').forEach(t=>t.lines.forEach(l=>{
    if(l.itemId===itemId&&(!best||t.date>best.date))best={date:t.date,price:l.netPrice||l.price,companyId:t.companyId,no:t.no};}));
  return best;}

/* ---- v4.6: 매입 이력 원가 삽입 (2026-07-09) — 같은 품번의 매입 건 검색 → 매입금액 삽입 ----
   배경: 매입 금액이 브랜드·매입처·일자에 따라 다름 → 문서 작성 시 GR(매입 입고) 이력에서 근거를 보고 선택. */
let _bh={q:'',from:'',to:'',rows:[]};
function buyHistRows(itemId){ // 그 품번(itemId + 규격 동일 품 포함)의 매입 이력 — GR 기반, 최신순
  const it=byId(DB.items,itemId)||{};
  const spec=String(it.spec||'').trim();
  const out=[];
  DB.trans.filter(t=>t.type==='purchase').forEach(t=>(t.lines||[]).forEach(l=>{
    const li=l.itemId?byId(DB.items,l.itemId):null;
    if(!(l.itemId===itemId||(spec&&String(l.spec||(li?li.spec:'')||'').trim()===spec)))return;
    out.push({grId:t.id,no:t.no,date:t.date,companyId:t.companyId,brand:(li&&li.brand)||it.brand||'',price:l.netPrice||l.price,qty:l.qty,invoiced:t.status==='invoiced'});}));
  return out.sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:(a.no<b.no?1:-1));}
function buyHistModal(itemId,lineIdx){ // lineIdx=null → 품목 상세 조회 전용 · 숫자 → ED.lines[lineIdx] 원가 삽입
  _bh={q:'',from:'',to:'',rows:[]};
  buyHistRender(itemId,lineIdx==null?null:+lineIdx);}
function buyHistRender(itemId,lineIdx){
  const it=byId(DB.items,itemId)||{};
  const ro=lineIdx==null;
  const arg='\''+itemId+'\','+(ro?'null':lineIdx);
  _bh.rows=buyHistRows(itemId).filter(r=>{
    if(_bh.from&&r.date<_bh.from)return false;
    if(_bh.to&&r.date>_bh.to)return false;
    if(_bh.q&&!((co(r.companyId).name||'')+' '+r.no+' '+(r.brand||'')+' '+r.date).includes(_bh.q))return false;
    return true;});
  openModal('<h3>매입 이력 — '+esc(it.name||'')+' <span class="mini">'+esc(it.spec||'')+'</span>'+(ro?' <span class="badge b-gray">조회 전용</span>':'')+'</h3>'
  +'<div class="mini">같은 품번(규격 동일 품 포함)의 매입 입고(GR) 이력 — 브랜드·매입처·일자별로 매입금액이 다를 때 '+(ro?'근거를 확인합니다.':'행을 클릭해 해당 단가를 라인 원가로 삽입합니다 (근거 기록 · 원가 미확정 해제).')+'</div>'
  +'<div class="bar" style="margin:8px 0"><input placeholder="매입처/GR번호/브랜드 검색" style="width:190px" value="'+esc(_bh.q)+'" onchange="_bh.q=this.value;buyHistRender('+arg+')">'
  +'<input type="date" value="'+_bh.from+'" onchange="_bh.from=this.value;buyHistRender('+arg+')"> ~ <input type="date" value="'+_bh.to+'" onchange="_bh.to=this.value;buyHistRender('+arg+')">'
  +((_bh.q||_bh.from||_bh.to)?'<button class="sm" onclick="_bh.q=\'\';_bh.from=\'\';_bh.to=\'\';buyHistRender('+arg+')">필터 초기화 ✕</button>':'')+'</div>'
  +'<table><tr><th>입고일</th><th>매입처</th><th>브랜드</th><th class="r">단가</th><th class="r">수량</th><th class="c" title="매입 세금계산서 확정(invoiced) 여부">계산서</th><th>GR번호</th></tr>'
  +(_bh.rows.map((r,ri)=>'<tr'+(ro?'':' style="cursor:pointer" title="클릭 = 이 단가를 라인 원가로 삽입" onclick="buyHistPick('+lineIdx+','+ri+')"')+'><td>'+r.date+'</td><td>'+esc(co(r.companyId).name)+'</td><td>'+esc(r.brand||'')+'</td><td class="r num"><b>'+fmt(r.price)+'</b></td><td class="r num">'+fmt(r.qty)+'</td><td class="c">'+(r.invoiced?'<span class="badge b-green">확정</span>':'<span class="badge b-gray">미확정</span>')+'</td><td class="mini">'+r.no+'</td></tr>').join('')

function resolveSale(itemId,companyId){
  const sp=priceFor(itemId,companyId,'sale');const it=byId(DB.items,itemId)||{};
  return sp?{price:sp.price,src:sp.src}:{price:it.salePrice||it.buyPrice||0,src:'기준단가'};}
function resolveCost(itemId,companyId){
  const bp=priceFor(itemId,companyId,'buy');if(bp)return{cost:bp.price,src:bp.src};
  const rc=recentBuyCost(itemId);if(rc)return{cost:rc.price,src:'최근 매입가 '+rc.date};
  const it=byId(DB.items,itemId)||{};return{cost:it.buyPrice||0,src:'기준 매입단가'};}
function itemSources(itemId){ // 납품처별 매입 단가 비교 (등록 단가 + 최근 실매입가)
  const map={};
  (DB.prices||[]).forEach(p=>{if(p.itemId!==itemId||!(p.buyPrice>0)||!p.companyId)return;
    if(p.from&&p.from>today())return;if(p.to&&p.to<today())return;
    map[p.companyId]=map[p.companyId]||{};map[p.companyId].std=p.buyPrice;map[p.companyId].src=p.src||'등록 단가';});
  DB.trans.filter(t=>t.type==='purchase').forEach(t=>t.lines.forEach(l=>{
    if(l.itemId!==itemId)return;const c=t.companyId;map[c]=map[c]||{};
    if(!map[c].lastDate||t.date>map[c].lastDate){map[c].last=l.netPrice||l.price;map[c].lastDate=t.date;}}));
  return Object.keys(map).map(cid=>{const m=map[cid];
    return {cid,name:co(cid).name,std:m.std!=null?m.std:null,last:m.last!=null?m.last:null,lastDate:m.lastDate||'',src:m.src||'',eff:m.std!=null?m.std:m.last};});}
function sourcesTable(itemId){

  const min=Math.min.apply(null,srcs.filter(x=>x.eff!=null).map(x=>x.eff));
  return '<table><tr><th>납품처</th><th class="r">등록 단가(유효)</th><th class="r">최근 실매입가</th><th>최근 매입일</th><th>비고</th></tr>'
  +srcs.sort((a,b)=>(a.eff||9e15)-(b.eff||9e15)).map(x=>'<tr><td><a class="lnk" href="#/companies/view/'+x.cid+'">'+esc(x.name)+'</a>'+(x.eff===min?' <span class="badge b-green">최저가</span>':'')+'</td><td class="r num">'+(x.std!=null?fmt(x.std):'-')+'</td><td class="r num">'+(x.last!=null?fmt(x.last):'-')+'</td><td class="mini">'+x.lastDate+'</td><td class="mini">'+esc(x.src)+'</td></tr>').join('')+'</table>';}

function grApprove(poId){const p=byId(DB.pos,poId);const sn=p.snote;
  if(!lockGuard(today(),'납품 승인 입고'))return;
  logAudit('납품 승인(입고)',p.no);
  const rows=window._grRows||[];if(!rows.length){toast('입고 항목 없음');return;}
  const lines=rows.map(x=>{const pol=p.lines.find(l=>l.name===x.name)||{};const it=pol.itemId?byId(DB.items,pol.itemId):null;
    return calcLine({itemId:pol.itemId,name:x.name,spec:pol.spec,unit:pol.unit,qty:x.ship,price:pol.price,dcRate:pol.dcRate||0},it&&it.tax==='exempt');});

/* ---- v3+: 공정 플랜 vs 실적 (설계·발주·입고·조립) — TECHS 이나즈마선/Odoo 마일스톤/베이스라인 변차 축소판 ----
   실적 연계: 발주=발주서 일자 자동, 자재 입고=입고 전표(거래명세서) 자동, 설계·조립=직접 명기 */
const PLAN_DEFS=[['design','설계'],['po','발주'],['gr','자재 입고'],['assy','조립']];
function orderPlan(o){
  if(!o.plan)o.plan=PLAN_DEFS.map(d=>({id:uid('pl'),key:d[0],name:d[1],planStart:'',planEnd:'',aStart:'',aEnd:''}));
  return o.plan;}
function planActual(o,row){
  if(row.key==='po'){const pos=DB.pos.filter(p=>p.orderId===o.id);
    if(!pos.length)return{auto:true,s:'',e:'',done:false,src:'발주서 자동'};
    const ds=pos.map(p=>p.date).sort();
    return{auto:true,s:ds[0],e:ds[ds.length-1],done:true,src:'발주서 자동'};}
  if(row.key==='gr'){const grs=DB.trans.filter(t=>t.type==='purchase'&&DB.pos.some(p=>p.id===t.poId&&p.orderId===o.id));
    if(!grs.length)return{auto:true,s:'',e:'',done:false,src:'입고 전표 자동'};
    const ds=grs.map(t=>t.date).sort();const R=orderRates(o.id);
    return{auto:true,s:ds[0],e:R.inRate===100?ds[ds.length-1]:'',done:R.inRate===100,src:'입고 전표 자동'};}
  return{auto:false,s:row.aStart,e:row.aEnd,done:!!row.aEnd,src:'직접 명기'};}
function dDiff(a,b){return Math.round((new Date(a)-new Date(b))/86400000);}
function planSlip(row,a){
  if(!row.planEnd)return null;
  if(a.done&&a.e)return dDiff(a.e,row.planEnd);
  if(!a.s&&today()<=row.planEnd)return 0;
  const sl=dDiff(today(),row.planEnd);
  return sl>0?sl:0;}
function slipBadge(slip,done){
  if(slip==null)return '<span class="mini">계획 없음</span>';
  if(slip>0)return '<span class="badge b-red">'+(done?'+'+slip+'일 지연 완료':'+'+slip+'일 지연 중 — 당겨야 함')+'</span>';
  if(slip<0)return '<span class="badge b-blue">'+(-slip)+'일 단축</span>';
  return '<span class="badge b-green">제때</span>';}
function orderWorstSlip(o){
  let w=0;orderPlan(o).forEach(r=>{const sl=planSlip(r,planActual(o,r));if(sl!=null&&sl>w)w=sl;});return w;}
function planChg(oid,rid,k,v){const o=byId(DB.orders,oid);const r=(o.plan||[]).find(x=>x.id===rid);if(!r)return;r[k]=v;saveDB();route();}
function planAdd(oid){const o=byId(DB.orders,oid);orderPlan(o);
  const nm=prompt('공정명 (예: 배선, 시운전, 검수)','시운전');if(!nm)return;
  o.plan.push({id:uid('pl'),key:'custom',name:nm,planStart:'',planEnd:'',aStart:'',aEnd:''});saveDB();route();}
function planDel(oid,rid){const o=byId(DB.orders,oid);const r=(o.plan||[]).find(x=>x.id===rid);
  if(r&&r.key!=='custom'){toast('기본 공정(설계/발주/입고/조립)은 삭제할 수 없습니다');return;}
  if(!confirm('공정을 삭제할까요?'))return;
  o.plan=o.plan.filter(x=>x.id!==rid);saveDB();route();}
function planCard(o,locked){
  const rows=orderPlan(o);
  let dates=[today()];if(o.dueDate)dates.push(o.dueDate);
  rows.forEach(r=>{const a=planActual(o,r);[r.planStart,r.planEnd,a.s,a.e].forEach(d=>{if(d)dates.push(d);});});
  dates=dates.filter(Boolean).sort();
  const lo=addDays(dates[0],-2),hi=addDays(dates[dates.length-1],3);
  const span=Math.max(1,dDiff(hi,lo));
  const px=d=>Math.max(0,Math.min(100,dDiff(d,lo)/span*100));
  const bars=rows.map(r=>{const a=planActual(o,r);const sl=planSlip(r,a);
    const aEnd=a.e||(a.s?today():'');
    return '<div style="display:flex;align-items:center;gap:8px;margin:7px 0">'
    +'<div style="width:90px;font-size:12px;flex-shrink:0"><b>'+esc(r.name)+'</b><div>'+slipBadge(sl,a.done)+'</div></div>'
    +'<div style="flex:1;position:relative;height:22px;background:#f8fafc;border-radius:4px">'
    +(r.planStart&&r.planEnd?'<div title="계획 '+r.planStart+' ~ '+r.planEnd+'" style="position:absolute;top:2px;height:7px;border-radius:4px;background:#bfdbfe;left:'+px(r.planStart)+'%;width:'+Math.max(1,px(r.planEnd)-px(r.planStart))+'%"></div>':'')
    +(a.s?'<div title="실적 '+a.s+' ~ '+(a.e||'진행중')+'" style="position:absolute;top:12px;height:7px;border-radius:4px;background:'+(sl>0?'var(--bad)':'var(--ok)')+';opacity:.85;left:'+px(a.s)+'%;width:'+Math.max(1,px(aEnd)-px(a.s))+'%;'+(a.done?'':'border-right:3px dashed #fff')+'"></div>':'')
    +'<div title="오늘" style="position:absolute;top:0;bottom:0;width:2px;background:#dc2626;left:'+px(today())+'%"></div>'
    +(o.dueDate?'<div title="납기 '+o.dueDate+'" style="position:absolute;top:0;bottom:0;width:2px;background:#7e22ce;left:'+px(o.dueDate)+'%"></div>':'')
    +'</div></div>';}).join('');
  const worst=orderWorstSlip(o);
  return '<div class="card"><h3 style="margin-top:0">공정 플랜 vs 실적 <span class="mini">— ▬계획(파랑) / ▬실적(초록·지연=빨강, 점선=진행중) / |오늘(빨강) |납기(보라)</span></h3>'
  +(worst>0?'<div class="warnbox">⚠ 최대 <b>+'+worst+'일 지연</b> — 후속 공정을 당기거나 납기 조정 검토가 필요합니다.</div>':'<div class="okbox">✅ 계획 대비 정상 진행</div>')
  +bars
  +'<table style="margin-top:8px"><tr><th>공정</th><th>계획 시작</th><th>계획 완료</th><th>실적 시작</th><th>실적 완료</th><th>실적 출처</th><th class="c">지연</th><th></th></tr>'
  +rows.map(r=>{const a=planActual(o,r);const sl=planSlip(r,a);
    const di=(k,v)=>locked?'<span class="mini">'+(v||'-')+'</span>':'<input type="date" value="'+(v||'')+'" onchange="planChg(\''+o.id+'\',\''+r.id+'\',\''+k+'\',this.value)">';
    return '<tr><td><b>'+esc(r.name)+'</b></td>'
    +'<td>'+di('planStart',r.planStart)+'</td><td>'+di('planEnd',r.planEnd)+'</td>'
    +(a.auto?'<td class="mini">'+(a.s||'-')+'</td><td class="mini">'+(a.e||(a.s?'진행중':'-'))+'</td>'
      :'<td>'+di('aStart',r.aStart)+'</td><td>'+di('aEnd',r.aEnd)+'</td>')
    +'<td class="mini">'+a.src+'</td><td class="c">'+slipBadge(sl,a.done)+'</td>'
    +'<td>'+(r.key==='custom'&&!locked?'<button class="sm danger" onclick="planDel(\''+o.id+'\',\''+r.id+'\')">✕</button>':'')+'</td></tr>';}).join('')
  +'</table>'
  +(!locked?'<button class="sm" style="margin-top:8px" onclick="planAdd(\''+o.id+'\')">+ 공정 추가 (배선/시운전/검수 등)</button>':'')
  +'<div class="mini" style="margin-top:6px">발주·자재 입고 실적은 전표에서 자동 연계(이중 입력 없음), 설계·조립은 직접 명기 — TECHS 이나즈마선(계획-실적 지연 시각화)의 단순판.</div></div>';}

function inspPrint(transId){

function cardTx(){DB.cardTx=DB.cardTx||[];return DB.cardTx;}

  +'<div class="bar" style="margin-top:8px"><button class="pri" onclick="cardCsvImport()">가져오기</button><button onclick="closeModal()">취소</button></div>');}
function cardCsvFile(inp){const f=inp.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{document.getElementById('cc-text').value=e.target.result;};r.readAsText(f,'utf-8');}
function cardCsvImport(){
  const card=document.getElementById('cc-name').value.trim();
  if(!card){toast('카드명을 입력하세요');return;}
  window._lastCard=card;
  DB.settings.company.cards=DB.settings.company.cards||[];
  if(!DB.settings.company.cards.includes(card))DB.settings.company.cards.push(card);
  const txt=document.getElementById('cc-text').value.trim();
  let ok=0,dup=0,bad=0;
  txt.split(/\r?\n/).forEach(line=>{
    if(!line.trim())return;
    const c=line.split(',').map(x=>x.trim().replace(/^"|"$/g,''));
    if(c.length<3){bad++;return;}
    let date=c[0].replace(/[.\/]/g,'-');if(!/^\d{4}-\d{1,2}-\d{1,2}/.test(date)){bad++;return;}
    date=date.slice(0,10);
    const amount=Math.round(+String(c[2]).replace(/[^0-9.-]/g,''))||0;
    if(!amount){bad++;return;}
    const hash=card+'|'+date+'|'+c[1]+'|'+amount;
    if(cardTx().some(t=>t.hash===hash)){dup++;return;}
    cardTx().push({id:uid('cx'),card,date,merchant:c[1],amount,note:c[3]||'',hash,by:curUser().id});ok++;});
  logAudit('카드내역 업로드 '+ok+'건',card);
  saveDB();closeModal();route();toast('카드내역: '+ok+'건 추가 · 중복 '+dup+' · 오류 '+bad);}

/* ---- KPI 경영 대시보드 ---- */
function repKpi(){
  const months=[];for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const mSales=months.map(m=>DB.taxInvoices.filter(t=>t.type==='sales'&&t.status==='sent'&&t.date.startsWith(m)).reduce((s,t)=>s+t.supply,0));
  const mx=Math.max.apply(null,mSales.concat([1]));
  const qTot=DB.quotes.length;const qWin=DB.quotes.filter(q=>q.status==='converted').length;
  const winRate=qTot?Math.round(qWin/qTot*100):0;
  const pipeQuote=DB.quotes.filter(q=>q.status==='sent').reduce((s,q)=>s+lineTotals(q.lines).total,0);
  const pipeOrder=DB.orders.filter(o=>['ordered','producing'].includes(o.status)).reduce((s,o)=>s+orderTotal(o),0);
  const margins=DB.orders.filter(o=>o.status!=='canceled').map(o=>{const t=lineTotals(o.lines);const p=t.supply-orderMaterialCost(o.id)-laborCost(o.id);return t.supply?Math.round(p/t.supply*100):0;});
  const buckets=[['~15%',margins.filter(m=>m<15).length,'var(--bad)'],['15~30%',margins.filter(m=>m>=15&&m<30).length,'var(--warn)'],['30%~',margins.filter(m=>m>=30).length,'var(--ok)']];
  const recvNow=totalReceivable();
  return '<div class="cards">'
  +'<div class="stat"><div class="t">견적→수주 전환율 (Win Rate)</div><div class="v">'+winRate+'%</div><div class="s">'+qWin+'/'+qTot+'건</div></div>'
  +'<div class="stat"><div class="t">파이프라인: 견적 발송 중</div><div class="v" style="color:var(--pri)">'+fmt(pipeQuote)+'</div></div>'
  +'<div class="stat"><div class="t">파이프라인: 진행 수주</div><div class="v">'+fmt(pipeOrder)+'</div></div>'
  +'<div class="stat"><div class="t">미수금</div><div class="v" style="color:var(--bad)">'+fmt(recvNow)+'</div></div></div>'
  +'<div class="card"><h3 style="margin-top:0">월별 매출 추이 (세금계산서 공급가, 최근 6개월)</h3>'
  +'<div style="display:flex;align-items:flex-end;gap:10px;height:150px;padding:6px 4px">'
  +months.map((m,i)=>'<div style="flex:1;text-align:center"><div class="num mini">'+fmt(mSales[i])+'</div><div style="background:var(--pri);border-radius:4px 4px 0 0;height:'+Math.max(3,Math.round(mSales[i]/mx*110))+'px"></div><div class="mini">'+m.slice(2)+'</div></div>').join('')
  +'</div></div>'
  +'<div class="card"><h3 style="margin-top:0">프로젝트 마진 분포 <span class="mini">(자재+인력 반영)</span></h3>'
  +buckets.map(b=>'<div style="margin:5px 0"><span class="mini" style="display:inline-block;width:60px">'+b[0]+'</span><div class="gaugewrap" style="display:inline-block;width:60%;vertical-align:middle"><div class="gauge" style="width:'+(margins.length?Math.round(b[1]/margins.length*100):0)+'%;background:'+b[2]+'"></div></div> <b>'+b[1]+'건</b></div>').join('')
  +'<div class="mini" style="margin-top:6px">근거: K-System BI·소기업 KPI 관행(월매출·전환율·파이프라인·마진 분포).</div></div>';}
