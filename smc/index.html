function bomPasteModal(){
  openModal('<h3>BOM/엑셀 붙여넣기 — 견적 라인 일괄 생성</h3>'
  +'<div class="mini">엑셀에서 복사해 붙여넣으세요(탭 또는 쉼표 구분): <span class="kbd">품명, 규격, 단위, 수량, 단가, 원가(선택)</span> — 품목 마스터 등록 없이 바로 라인 생성(TECHS 부품표 임포트 패턴). 원가를 넣으면 마진%가 즉시 계산됩니다.</div>'
  +'<textarea id="bom-text" rows="8" style="width:100%" placeholder="프레임 가공\tSUS304\t식\t1\t3500000\t2400000&#10;제어반, IP54, 식, 1, 5000000, 3200000"></textarea>'
  +'<div class="bar" style="margin-top:8px"><button class="pri" onclick="bomPasteDo()">라인 생성</button><button onclick="closeModal()">취소</button></div>');}
function bomPasteDo(){
  const txt=document.getElementById('bom-text').value.trim();
  if(!txt){toast('내용이 없습니다');return;}
  let ok=0,bad=0;
  txt.split(/\r?\n/).forEach(line=>{
    if(!line.trim())return;
    const c=(line.includes('\t')?line.split('\t'):line.split(',')).map(x=>x.trim());
    if(c.length<4||!c[0]){bad++;return;}
    const qty=+String(c[3]).replace(/,/g,'')||1;
    const price=Math.round(+String(c[4]||'0').replace(/[^0-9.-]/g,''))||0;
    const cost=Math.round(+String(c[5]||'0').replace(/[^0-9.-]/g,''))||0;
    ED.lines.push(calcLine({itemId:null,name:c[0],spec:c[1]||'',unit:c[2]||'식',qty,price,cost,base:price,costSrc:'BOM 임포트'},false));ok++;});
  closeModal();renderEdLines();toast('BOM '+ok+'행 생성'+(bad?' · 형식오류 '+bad:'')+' — 원가/마진은 그리드에서 확인·수정');}
function copyOrderModal(){
  const list=DB.orders.filter(o=>o.status!=='canceled');
  openModal('<h3>과거 프로젝트에서 복사 — 유사 견적 사전원가</h3>'
  +'<div class="mini">과거 유사 안건의 품목·단가·실적원가를 복사해 견적 정확도를 높입니다(TECHS 유사 안건 원가 참조 패턴).</div>'
  +'<table style="margin-top:8px"><tr><th>프로젝트</th><th>거래처</th><th class="r">계약액</th><th class="r">실적원가(자재+인력)</th><th class="r">마진</th><th></th></tr>'
  +list.map(o=>{const t=lineTotals(o.lines);const cost=orderMaterialCost(o.id)+laborCost(o.id);
    const mg=t.supply?Math.round((t.supply-cost)/t.supply*100):0;
    return '<tr><td>'+o.no+'</td><td>'+esc(co(o.companyId).name)+'</td><td class="r num">'+fmt(t.supply)+'</td><td class="r num">'+fmt(cost)+'</td><td class="r">'+mg+'%</td>'
    +'<td><button class="sm pri" onclick="copyOrderDo(\''+o.id+'\')">이 안건 복사</button></td></tr>';}).join('')
  +'</table><div class="bar" style="margin-top:10px"><button onclick="closeModal()">취소</button></div>');}
function copyOrderDo(oid){
  const o=byId(DB.orders,oid);
  const cost=orderMaterialCost(o.id)+laborCost(o.id);
  const sup=lineTotals(o.lines).supply||1;
  o.lines.forEach(l=>{
    const lineCost=Math.round(cost*(l.supply/sup)); // 실적원가를 라인 금액 비례 배분
    ED.lines.push(calcLine({itemId:l.itemId,name:l.name,spec:l.spec,unit:l.unit,qty:l.qty,price:l.price,cost:l.qty?Math.round(lineCost/l.qty):0,base:l.price,costSrc:o.no+' 실적원가 배분'},false));});
  closeModal();renderEdLines();toast(o.no+' 복사 — 실적원가가 라인별 비례 배분되어 마진이 표시됩니다');}

/* ---- v4-2b. 세금계산서 역발행 (매입자발행 — TX_GU/SENDDT 시뮬레이션) ---- */
function reverseReqModal(tid){const d=byId(DB.trans,tid);const t=lineTotals(d.lines);
  openModal('<h3>매입 세금계산서 역발행 요청 — '+d.no+'</h3>'
  +'<div class="mini">매입자(우리)가 계산서 내용을 작성해 공급사('+esc(co(d.companyId).name)+')에 발행을 요청합니다. 공급사가 포털에서 승인하면 매입계산서로 확정(SENDDT 기록)됩니다. 실제 국세청 전송은 중계사 가입+건당 과금 — 내부 시뮬레이션.</div>'
  +'<div class="frm" style="margin:10px 0"><div><label>작성일자</label><input type="date" id="rv-date" value="'+today()+'"></div>'
  +'<div><label>공급가액</label><input class="r" id="rv-supply" value="'+t.supply+'"></div>'
  +'<div><label>세액</label><input class="r" id="rv-vat" value="'+t.vat+'"></div>'
  +'<div class="full"><label>비고</label><input id="rv-memo" value="역발행 — '+d.no+'"></div></div>'
  +'<div class="bar"><button class="pri" onclick="reverseReqDo(\''+tid+'\')">역발행 요청 (공급사 포털로)</button><button onclick="closeModal()">취소</button></div>');}
function reverseReqDo(tid){const d=byId(DB.trans,tid);
  const g=x=>document.getElementById(x).value;
  if(!lockGuard(g('rv-date'),'역발행 요청'))return;
  const supply=Math.round(+String(g('rv-supply')).replace(/,/g,'')||0);
  if(!supply){toast('공급가액을 입력하세요');return;}
  const ti={id:uid('ti'),no:docNo('PTI',g('rv-date')),type:'purchase',companyId:d.companyId,date:g('rv-date'),basis:'trans',basisId:tid,supply,vat:Math.round(+String(g('rv-vat')).replace(/,/g,'')||0),status:'reverse_req',gubun:'청구',memo:g('rv-memo'),originalId:null,modifyReason:null,reqBy:curUser().id,reqAt:today()};
  DB.taxInvoices.push(ti);
  logAudit('역발행 요청',ti.no);
  sysMail(null,'[역발행 요청] '+ti.no+' — '+co(d.companyId).name,'입고 '+d.no+' 건의 매입 세금계산서 역발행을 공급사에 요청했습니다.\n공급가액 '+fmt(supply)+'원 — 공급사 포털에서 승인하면 확정됩니다.','ti',ti.id);
  saveDB();closeModal();route();toast('역발행 요청 — 공급사 포털에 승인 카드가 생성되었습니다');}
function revApprove(tiId){const ti=byId(DB.taxInvoices,tiId);
  if(!ti||ti.status!=='reverse_req'){toast('승인 대기 상태가 아닙니다');return;}
  ti.status='sent';ti.sendDt=today();applyInvoiceEffect(ti);hometaxSend(ti);
  logAudit('역발행 승인(공급사)',ti.no);
  sysMail(ti.reqBy||null,'[역발행 승인] '+ti.no+' — '+co(ti.companyId).name,'공급사가 역발행을 승인했습니다.\n매입계산서가 확정되어 원가·미지급금에 반영됩니다. (확정일 '+ti.sendDt+')','ti',ti.id);
  saveDB();route();toast('역발행 승인 — 매입계산서 '+ti.no+' 확정');}
function revReject(tiId){const ti=byId(DB.taxInvoices,tiId);
  if(!ti||ti.status!=='reverse_req'){toast('승인 대기 상태가 아닙니다');return;}
  const note=prompt('반려 사유를 입력하세요','금액 불일치');if(note===null)return;
  ti.status='reverse_rej';ti.rejNote=note;
  logAudit('역발행 반려(공급사)',ti.no);
  sysMail(ti.reqBy||null,'[역발행 반려] '+ti.no+' — '+co(ti.companyId).name,'공급사가 역발행을 반려했습니다.\n사유: '+note,'ti',ti.id);
  saveDB();route();toast('반려 처리 — 요청자에게 사유가 회신되었습니다');}

/* ---- v4-2c. 합계발행 (기간 내 미발행 납품 합산 1장 — IJ_TAXNO 역링크 패턴) ---- */
function sumIssueCands(){return DB.trans.filter(t=>t.type==='sales'&&t.status==='open'&&t.companyId===window._sumCo&&t.date>=(window._sumFrom||'0000')&&t.date<=(window._sumTo||'9999'));}
function sumIssueModal(){
  const cos=DB.companies.filter(c=>c.active&&(c.type==='sales'||c.type==='both'));
  if(!cos.length){toast('매출 거래처가 없습니다');return;}
  window._sumCo=window._sumCo||cos[0].id;
  window._sumFrom=window._sumFrom||thisMonth()+'-01';window._sumTo=window._sumTo||today();
  openModal('<h3>세금계산서 합계발행 (월합계)</h3>'
  +'<div class="mini">거래처+기간의 미발행 납품(거래명세서)을 1장으로 합산 발행합니다. 원본 납품들에 계산서가 역링크됩니다(월말 합계 발행 관행).</div>'
  +'<div class="bar" style="margin:10px 0"><select onchange="window._sumCo=this.value;sumIssueRender()">'+cos.map(c=>'<option value="'+c.id+'"'+(window._sumCo===c.id?' selected':'')+'>'+esc(c.name)+'</option>').join('')+'</select>'
  +'<input type="date" value="'+window._sumFrom+'" onchange="window._sumFrom=this.value;sumIssueRender()"> ~ <input type="date" value="'+window._sumTo+'" onchange="window._sumTo=this.value;sumIssueRender()"></div>'
  +'<div id="sum-list"></div>'
  +'<div class="frm" style="margin:10px 0"><div><label>작성일자</label><input type="date" id="sum-date" value="'+today()+'"></div>'
  +'<div><label>영수/청구</label><select id="sum-gubun"><option value="청구">청구</option><option value="영수">영수</option></select></div></div>'
  +'<div class="bar"><button class="pri" onclick="sumIssueDo()">합계 발행 (1장)</button><button onclick="closeModal()">취소</button></div>');
  sumIssueRender();}
function sumIssueRender(){
  const list=sumIssueCands();
  window._sumIds=list.map(d=>d.id);
  const t=list.reduce((a,d)=>{const x=lineTotals(d.lines);a.s+=x.supply;a.v+=x.vat;return a;},{s:0,v:0});
  const el=document.getElementById('sum-list');if(!el)return;
  el.innerHTML='<table><tr><th>명세서</th><th>납품일</th><th>품목</th><th class="r">공급가액</th><th class="r">부가세</th></tr>'
  +(list.map(d=>{const x=lineTotals(d.lines);return '<tr><td>'+d.no+'</td><td>'+d.date+'</td><td class="mini">'+d.lines.map(l=>esc(l.name)+' x'+l.qty).join(', ')+'</td><td class="r num">'+fmt(x.supply)+'</td><td class="r num">'+fmt(x.vat)+'</td></tr>';}).join('')||'<tr><td colspan="5" class="mini">기간 내 미발행 납품 없음</td></tr>')
  +'<tr><td colspan="3" style="text-align:right"><b>합계 ('+list.length+'건)</b></td><td class="r num"><b>'+fmt(t.s)+'</b></td><td class="r num"><b>'+fmt(t.v)+'</b></td></tr></table>';}
function sumIssueDo(){
  const list=(window._sumIds||[]).map(id=>byId(DB.trans,id)).filter(d=>d&&d.status==='open');
  if(!list.length){toast('합산할 미발행 납품이 없습니다');return;}
  const dateEl=document.getElementById('sum-date');const date=(dateEl&&dateEl.value)||today();
  if(!lockGuard(date,'합계발행'))return;
  const t=list.reduce((a,d)=>{const x=lineTotals(d.lines);a.s+=x.supply;a.v+=x.vat;return a;},{s:0,v:0});
  const gEl=document.getElementById('sum-gubun');
  const ti={id:uid('ti'),no:docNo('TI',date),type:'sales',companyId:window._sumCo,date,basis:'sum',basisId:null,transIds:list.map(d=>d.id),supply:t.s,vat:t.v,status:'sent',gubun:(gEl&&gEl.value)||'청구',memo:'합계발행 '+list.length+'건 ('+(window._sumFrom||'')+' ~ '+(window._sumTo||'')+')',originalId:null,modifyReason:null};
  DB.taxInvoices.push(ti);applyInvoiceEffect(ti);hometaxSend(ti);
  logAudit('세금계산서 합계발행 '+list.length+'건',ti.no);
  saveDB();closeModal();route();toast('합계발행 '+ti.no+' — 납품 '+list.length+'건 합산 · 원본에 역링크됨');}

/* ---- v4-2d. 부가세 신고자료 (기간별 매출/매입 집계 + 인쇄) ---- */
function quarterOf(d){const m=+d.slice(5,7);return d.slice(0,4)+'-Q'+(Math.floor((m-1)/3)+1);}
function vatRange(q){const y=q.slice(0,4);const n=+q.slice(6);const fm=(n-1)*3+1;
  return [y+'-'+String(fm).padStart(2,'0')+'-01',y+'-'+String(fm+2).padStart(2,'0')+'-31'];}
function vatData(from,to){
  const inR=t=>t.date>=from&&t.date<=to;
  const sent=DB.taxInvoices.filter(t=>t.status==='sent'&&inR(t));
  const pend=DB.taxInvoices.filter(t=>['draft','reverse_req'].includes(t.status)&&inR(t));
  const agg=list=>({cnt:list.length,supply:list.reduce((s,t)=>s+t.supply,0),vat:list.reduce((s,t)=>s+t.vat,0)});
  return {sales:agg(sent.filter(t=>t.type==='sales')),buys:agg(sent.filter(t=>t.type==='purchase')),
    pendSales:agg(pend.filter(t=>t.type==='sales')),pendBuys:agg(pend.filter(t=>t.type==='purchase')),list:sent};}
function vatCoRows(list,type){
  const m={};list.filter(t=>t.type===type).forEach(t=>{m[t.companyId]=m[t.companyId]||{cnt:0,supply:0,vat:0};m[t.companyId].cnt++;m[t.companyId].supply+=t.supply;m[t.companyId].vat+=t.vat;});
  return Object.keys(m).map(cid=>Object.assign({cid,name:co(cid).name,bizno:co(cid).bizno||''},m[cid]));}
function repVat(){
  const q=window._vatQ||quarterOf(today());window._vatQ=q;
  const [df,dt]=vatRange(q);
  const from=window._vatFrom||df,to=window._vatTo||dt;
  const years=[...new Set(DB.taxInvoices.map(t=>t.date.slice(0,4)))].sort();
  if(!years.length)years.push(today().slice(0,4));
  const qs=[];years.forEach(y=>[1,2,3,4].forEach(n=>qs.push(y+'-Q'+n)));
  const v=vatData(from,to);
  const row=(lbl,a)=>'<tr><td>'+lbl+'</td><td class="r num">'+a.cnt+'</td><td class="r num">'+fmt(a.supply)+'</td><td class="r num">'+fmt(a.vat)+'</td><td class="r num"><b>'+fmt(a.supply+a.vat)+'</b></td></tr>';
  return '<div class="card"><div class="bar"><b>부가세 신고자료</b>'
  +'<select onchange="window._vatQ=this.value;window._vatFrom=null;window._vatTo=null;route()">'+qs.map(x=>'<option value="'+x+'"'+(q===x?' selected':'')+'>'+x.replace('-Q','년 ')+'분기</option>').join('')+'</select>'
  +'<input type="date" value="'+from+'" onchange="window._vatFrom=this.value;route()"> ~ <input type="date" value="'+to+'" onchange="window._vatTo=this.value;route()">'
  +'<div class="sp"></div><button class="sm" onclick="vatPrint()">인쇄 (신고 대사용)</button></div>'
  +'<h3 style="margin-top:4px">확정분 (발행·수취 완료 계산서 기준)</h3>'
  +'<table><tr><th>구분</th><th class="r">매수</th><th class="r">공급가액</th><th class="r">세액</th><th class="r">합계</th></tr>'
  +row('매출 (발행)',v.sales)+row('매입 (수취)',v.buys)
  +'<tr style="background:#f8fafc"><td><b>납부(환급) 예상세액 = 매출세액 − 매입세액</b></td><td></td><td></td><td class="r num"><b'+(v.sales.vat-v.buys.vat<0?' style="color:var(--pri)"':'')+'>'+fmt(v.sales.vat-v.buys.vat)+'</b></td><td></td></tr></table>'
  +((v.pendSales.cnt||v.pendBuys.cnt)?'<h3>미확정분 (임시저장·역발행 대기 — 신고 전 확정 필요)</h3><table><tr><th>구분</th><th class="r">매수</th><th class="r">공급가액</th><th class="r">세액</th><th class="r">합계</th></tr>'+row('매출 (임시)',v.pendSales)+row('매입 (대기)',v.pendBuys)+'</table>':'')
  +'<h3>거래처별 합계표 (매출처별·매입처별 세금계산서합계표 대응)</h3>'
  +'<table><tr><th>구분</th><th>거래처</th><th>사업자번호</th><th class="r">매수</th><th class="r">공급가액</th><th class="r">세액</th></tr>'
  +vatCoRows(v.list,'sales').map(r=>'<tr><td><span class="badge b-blue">매출</span></td><td>'+esc(r.name)+'</td><td class="mini">'+esc(r.bizno)+'</td><td class="r num">'+r.cnt+'</td><td class="r num">'+fmt(r.supply)+'</td><td class="r num">'+fmt(r.vat)+'</td></tr>').join('')
  +vatCoRows(v.list,'purchase').map(r=>'<tr><td><span class="badge b-purple">매입</span></td><td>'+esc(r.name)+'</td><td class="mini">'+esc(r.bizno)+'</td><td class="r num">'+r.cnt+'</td><td class="r num">'+fmt(r.supply)+'</td><td class="r num">'+fmt(r.vat)+'</td></tr>').join('')
  +'</table>'
  +(function(){const s=hometaxStats(from,to);
    return '<h3>홈택스 전송비용 (시뮬레이션)</h3><table><tr><th>기간 내 전송 건수</th><th class="r">전송비용 합계</th></tr>'
    +'<tr><td class="num">'+s.cnt+'건</td><td class="r num"><b>'+fmt(s.fee)+'</b>원</td></tr></table>'
    +'<div class="mini">중계사 건당 '+fmt(hometaxCfg().feePerDoc)+'원 기준, 시뮬레이션 — 실제 과금은 중계사 가입 후 청구 기준입니다.</div>';})()
  +'<div class="mini" style="margin-top:6px">홈택스 신고 내역과 대사하세요. 전자신고 자동 제출은 세무사/상용 영역 — 여기는 집계·대사용 자료입니다.</div></div>';}
function vatPrint(){
  const q=window._vatQ||quarterOf(today());const [df,dt]=vatRange(q);
  const from=window._vatFrom||df,to=window._vatTo||dt;
  const v=vatData(from,to);
  printHtml('<div class="doc-sheet"><h1 style="letter-spacing:4px">부가세 신고자료</h1>'
  +'<div class="doc-meta">기간: '+from+' ~ '+to+' · 상호: '+esc(compInfo().name||'')+' ('+esc(compInfo().bizno||'')+') · 출력일 '+today()+'</div>'
  +'<table class="doc-t" style="margin-top:8px"><tr><th>구분</th><th>매수</th><th>공급가액</th><th>세액</th><th>합계</th></tr>'
  +'<tr><td>매출 (발행)</td><td class="r">'+v.sales.cnt+'</td><td class="r">'+fmt(v.sales.supply)+'</td><td class="r">'+fmt(v.sales.vat)+'</td><td class="r">'+fmt(v.sales.supply+v.sales.vat)+'</td></tr>'
  +'<tr><td>매입 (수취)</td><td class="r">'+v.buys.cnt+'</td><td class="r">'+fmt(v.buys.supply)+'</td><td class="r">'+fmt(v.buys.vat)+'</td><td class="r">'+fmt(v.buys.supply+v.buys.vat)+'</td></tr>'

/* ---- v4-3. 상품수불대장 (품목별 입출·조정 시간순 + 누계 잔고) ---- */
function stockLedgerEntries(itemId){
  const out=[];
  DB.trans.forEach(t=>{t.lines.forEach(l=>{if(l.itemId!==itemId)return;
    if(t.type==='purchase')out.push({date:t.date,kind:'입고',ref:t.no+(isCommonPo(t.poId)?' (공통)':' (직납)'),inQty:l.qty,outQty:0,adj:0,price:l.netPrice||l.price});
    else if(t.status!=='holdGr')out.push({date:t.date,kind:'출고(납품)',ref:t.no,inQty:0,outQty:l.qty,adj:0,price:l.price});});}); // v4.1: 미입고 대기 전표는 수불 제외
  (DB.issues||[]).forEach(is=>{if(is.itemId!==itemId)return;
    out.push({date:is.date,kind:'출고(불출)',ref:is.orderId?((byId(DB.orders,is.orderId)||{}).no||''):'기타(소모)',inQty:0,outQty:is.qty,adj:0,price:is.unitCost});});
  (DB.adjusts||[]).forEach(a=>{if(a.itemId!==itemId)return;
    if(a.kind==='asmOut')out.push({date:a.date,kind:String(a.ref||'').startsWith('DAS')?'해체출고':'조립출고',ref:a.ref||'',inQty:0,outQty:-a.qty,adj:0,price:a.unitCost||0}); // v4.5: 세트조립 — 전표번호로 추적
    else if(a.kind==='asmIn')out.push({date:a.date,kind:String(a.ref||'').startsWith('DAS')?'해체입고':'조립입고',ref:a.ref||'',inQty:a.qty,outQty:0,adj:0,price:a.unitCost||0});
    else out.push({date:a.date,kind:'조정(실사)',ref:a.note||'',inQty:0,outQty:0,adj:a.qty,price:0});});
  return out.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);}
function computeStockLedger(itemId,from,to){
  const all=stockLedgerEntries(itemId);
  let open=0;all.forEach(e=>{if(e.date<from)open+=e.inQty-e.outQty+e.adj;});
  const rows=[];let bal=open,tin=0,tout=0,tadj=0;
  all.forEach(e=>{if(e.date<from||e.date>to)return;
    bal+=e.inQty-e.outQty+e.adj;tin+=e.inQty;tout+=e.outQty;tadj+=e.adj;
    rows.push(Object.assign({bal},e));});
  return {open,rows,totIn:tin,totOut:tout,totAdj:tadj,close:bal};}
function stockLedgerBody(){
  const items=DB.items.filter(i=>i.active);
  if(!window._slItem&&items.length)window._slItem=(items.find(i=>i.kind!=='product')||items[0]).id;

  +'<tr style="background:#f8fafc"><td colspan="3"><b>기간 합계</b></td><td class="r num"><b>'+fmt(L.totIn)+'</b></td><td class="r num"><b>'+fmt(L.totOut)+'</b></td><td class="r num"><b>'+(L.totAdj>0?'+':'')+fmt(L.totAdj)+'</b></td><td></td><td class="r num"><b>'+fmt(L.close)+'</b></td></tr></table>'
  +'<div class="mini" style="margin-top:6px">입고=매입 입고(직납·공통) · 출고=납품+불출 · 조정=재고실사. 제품(생산품)은 생산 입고 개념이 없어 음수 잔고로 보일 수 있습니다(판매 이력 대장 용도).</div></div>';}

/* ---- v4-4. 적정재고·사장재고 (적정 대비 현재고 부족 + 재고보유월수) ---- */
function itemStockQty(itemId){const r=stockRows().find(x=>x.itemId===itemId);return r?r.qty:0;}
function lowStockRows(){
  return DB.items.filter(i=>i.active&&(i.minStock||0)>0)
    .map(i=>({item:i,qty:itemStockQty(i.id),min:i.minStock||0}))
    .filter(r=>r.qty<r.min)
    .sort((a,b)=>(a.qty-a.min)-(b.qty-b.min));}
function outQtySince(itemId,from){let s=0;
  DB.trans.forEach(t=>{if(t.type!=='sales'||t.status==='holdGr'||t.date<from)return;t.lines.forEach(l=>{if(l.itemId===itemId)s+=l.qty;});}); // v4.1: 대기 전표 제외
  (DB.issues||[]).forEach(is=>{if(is.itemId===itemId&&is.date>=from)s+=is.qty;});
  return s;}
function deadStockRows(months){months=months||6;
  const from=addDays(today(),-Math.round(months*30.4));
  return stockRows().filter(r=>r.qty>0&&r.itemId).map(r=>{
    const out=outQtySince(r.itemId,from);
    const avg=out/months; // 월평균 출고
    return {itemId:r.itemId,name:r.name,spec:r.spec||'',qty:r.qty,avgCost:r.avgCost,out,avg,
      monthsHold:avg>0?Math.round(r.qty/avg*10)/10:Infinity};})
  .sort((a,b)=>(b.monthsHold===Infinity?9e9:b.monthsHold)-(a.monthsHold===Infinity?9e9:a.monthsHold));}

/* ---- v4-5. 일계표/월계표 (매출·매입·수금·지급·통장잔고) ---- */
function dailyReport(ym){
  const days={};
  const add=(d,k,v)=>{if(!d||!d.startsWith(ym))return;days[d]=days[d]||{sales:0,buys:0,inAmt:0,outAmt:0};days[d][k]+=v;};
  DB.taxInvoices.forEach(t=>{if(t.status==='sent')add(t.date,t.type==='sales'?'sales':'buys',t.supply+t.vat);});
  DB.bank.forEach(b=>{add(b.date,b.amount>0?'inAmt':'outAmt',Math.abs(b.amount));});
  let bal=DB.bank.filter(b=>b.date<ym+'-01').reduce((s,b)=>s+b.amount,0);
  const open=bal;
  const rows=Object.keys(days).sort().map(d=>{
    bal+=DB.bank.filter(b=>b.date===d).reduce((s,b)=>s+b.amount,0);
    return Object.assign({date:d,bal},days[d]);});
  const tot=rows.reduce((a,r)=>({sales:a.sales+r.sales,buys:a.buys+r.buys,inAmt:a.inAmt+r.inAmt,outAmt:a.outAmt+r.outAmt}),{sales:0,buys:0,inAmt:0,outAmt:0});
  return {open,rows,tot,close:bal};}
function monthlyReport(y){
  const months={};
  const add=(d,k,v)=>{if(!d||!d.startsWith(String(y)))return;const m=d.slice(0,7);months[m]=months[m]||{sales:0,buys:0,inAmt:0,outAmt:0};months[m][k]+=v;};
  DB.taxInvoices.forEach(t=>{if(t.status==='sent')add(t.date,t.type==='sales'?'sales':'buys',t.supply+t.vat);});
  DB.bank.forEach(b=>{add(b.date,b.amount>0?'inAmt':'outAmt',Math.abs(b.amount));});
  let bal=DB.bank.filter(b=>b.date<y+'-01-01').reduce((s,b)=>s+b.amount,0);
  const open=bal;
  const rows=[];
  for(let i=1;i<=12;i++){const m=y+'-'+String(i).padStart(2,'0');
    const d=months[m]||{sales:0,buys:0,inAmt:0,outAmt:0};
    bal+=d.inAmt-d.outAmt;
    rows.push(Object.assign({month:m,bal},d));}
  const tot=rows.reduce((a,r)=>({sales:a.sales+r.sales,buys:a.buys+r.buys,inAmt:a.inAmt+r.inAmt,outAmt:a.outAmt+r.outAmt}),{sales:0,buys:0,inAmt:0,outAmt:0});
  return {open,rows,tot,close:bal};}

/* ---- v4-6. 어음 관리대장 (받을어음/지급어음, 만기 D-7 경고 — EU_* 대응) ---- */
function notesAll(){
  const out=[];
  DB.installments.forEach(i=>{if(i.payMethod!=='note')return;
    const o=byId(DB.orders,i.orderId);if(!o||o.status==='canceled')return;
    out.push({kind:'recv',id:i.id,issueDt:i.noteIssueDt||i.dueDate||'',maturity:i.maturity||'',amount:i.amount,companyId:o.companyId,
      status:i.noteStatus||(i.status==='paid'?'결제완료':'보유'),ref:o.no+' '+i.seq+'회 '+(i.name||''),orderId:o.id,memo:i.noteMemo||''});});
  (DB.pnotes||[]).forEach(p=>out.push({kind:'pay',id:p.id,issueDt:p.date||'',maturity:p.maturity||'',amount:p.amount,companyId:p.companyId,
    status:p.status||'보유',ref:p.transId?((byId(DB.trans,p.transId)||{}).no||''):'',transId:p.transId,memo:p.memo||''}));
  return out.sort((a,b)=>(a.maturity||'9999')<(b.maturity||'9999')?-1:1);}
function notesDueSoon(){const lim=addDays(today(),7);
  return notesAll().filter(n=>n.status==='보유'&&n.maturity&&n.maturity<=lim);}
function noteDBadge(n){if(n.status!=='보유'||!n.maturity)return '';
  const d=Math.round((new Date(n.maturity)-new Date(today()))/86400000);
  if(d<0)return ' <span class="badge b-red">만기 경과 '+(-d)+'일</span>';
  if(d<=7)return ' <span class="badge b-red">D-'+d+'</span>';
  return '';}
function noteStBadge(st){return '<span class="badge '+(st==='보유'?'b-blue':st==='결제완료'?'b-green':'b-red')+'">'+st+'</span>';}
function noteSettle(kind,id){
  if(kind==='recv'){
    const inst=byId(DB.installments,id);const o=byId(DB.orders,inst.orderId);
    const remain=instRemain(inst);
    if(!confirm('받을어음 결제 처리할까요?\n'+co(o.companyId).name+' · 만기 '+(inst.maturity||'-')+' · 금액 '+fmt(inst.amount)+'원\n(통장 입금 + 회차 수금 배분이 자동 기록됩니다)'))return;
    if(remain>0){
      const bal=DB.bank.reduce((s,b)=>s+b.amount,0)+remain;
      const b={id:uid('b'),bank:compInfo().bankName||'은행',date:today(),desc:'전자어음 결제 '+co(o.companyId).name,amount:remain,balance:bal,hash:'note|'+today()+'|'+id,status:'unmatched',etcNote:''};
      DB.bank.push(b);
      DB.allocs.push({id:uid('a'),bankId:b.id,targetType:'installment',targetId:inst.id,amount:remain,fee:0,date:today()});
      refreshInstStatus(inst);}
    inst.noteStatus='결제완료';
    logAudit('받을어음 결제',o.no+' '+inst.seq+'회 '+fmt(inst.amount));}
  else{
    const p=byId(DB.pnotes,id);
    if(!confirm('지급어음 결제 처리할까요?\n'+co(p.companyId).name+' · 만기 '+(p.maturity||'-')+' · 금액 '+fmt(p.amount)+'원\n(통장 출금이 자동 기록됩니다)'))return;
    const bal=DB.bank.reduce((s,b)=>s+b.amount,0)-p.amount;
    const b={id:uid('b'),bank:compInfo().bankName||'은행',date:today(),desc:'지급어음 결제 '+co(p.companyId).name,amount:-p.amount,balance:bal,hash:'pnote|'+today()+'|'+id,status:'unmatched',etcNote:''};
    DB.bank.push(b);
    if(p.transId)DB.allocs.push({id:uid('a'),bankId:b.id,targetType:'purchaseTrans',targetId:p.transId,amount:p.amount,fee:0,date:today()});
    else{b.status='etc';b.etcNote='지급어음 결제';}
    p.status='결제완료';
    logAudit('지급어음 결제',co(p.companyId).name+' '+fmt(p.amount));}
  saveDB();route();toast('어음 결제 처리 완료 — 통장·장부에 반영되었습니다');}
function noteDishonor(kind,id){
  const note=prompt('부도 처리 메모','부도 — 채권 보전 절차 진행');if(note===null)return;
  if(kind==='recv'){const inst=byId(DB.installments,id);inst.noteStatus='부도';inst.noteMemo=note;logAudit('받을어음 부도',id);}
  else{const p=byId(DB.pnotes,id);p.status='부도';p.memo=note;logAudit('지급어음 부도',id);}

/* ---- v4-7. 대금청구서 (전월이월 + 당월발생 − 당월입금 = 월말잔액) ---- */
function billingData(cid,ym){
  const from=ym+'-01',to=ym+'-31';
  const debits=DB.taxInvoices.filter(t=>t.type==='sales'&&t.status==='sent'&&t.companyId===cid)
    .map(t=>({date:t.date,desc:'세금계산서 '+t.no+' ['+(t.gubun||'청구')+'] — '+basisPlain(t),dr:t.supply+t.vat,cr:0}));
  const credits=DB.allocs.filter(a=>{if(a.targetType!=='installment')return false;
    const i=byId(DB.installments,a.targetId);if(!i)return false;
    const o=byId(DB.orders,i.orderId);return o&&o.companyId===cid;})
    .map(a=>{const b=byId(DB.bank,a.bankId);return {date:a.date,desc:'입금 ('+(b?b.desc:'')+')',dr:0,cr:a.amount};});
  const all=debits.concat(credits).sort((a,b)=>a.date<b.date?-1:1);
  const carry=all.filter(r=>r.date<from).reduce((s,r)=>s+r.dr-r.cr,0);
  let bal=carry;
  const rows=all.filter(r=>r.date>=from&&r.date<=to).map(r=>{bal+=r.dr-r.cr;return Object.assign({bal},r);});
  const occur=rows.reduce((s,r)=>s+r.dr,0),paid=rows.reduce((s,r)=>s+r.cr,0);
  return {carry,occur,paid,close:carry+occur-paid,rows};}

/* ---- v4-8. 히트판 이관 (CSV/TSV 붙여넣기 임포트 — MDB 필드 매핑 §1-3) ---- */
const HITPAN_MAPS={
  companies:{buy_name:'name',buy_taxno:'bizno',buy_tel:'tel',buy_addr:'addr',buy_damdang:'damdang',buy_ceo:'ceo',buy_email:'email',buy_fax:'fax'},
  items:{s_pum:'name',s_ku:'spec',s_danw:'unit',s_maker:'brand',s_idan:'buyPrice',s_pdan:'salePrice',s_jek:'jek',s_code:'code',s_bar:'code'},
  prices:{ur_buy:'coName',ur_pum:'itemName',ur_pumno:'vendorPart',ur_dan:'salePrice',ur_idan:'salePrice',ur_ku:'itemSpec'}}; // 2026-07-04 사용자 확인: 히트판 단가 열은 기본 판매단가로 적재 (미리보기에서 열별 매입/판매 선택)
const HITPAN_ORDER={ // 헤더 없는 붙여넣기의 기본 열 순서 (수동 매핑 셀렉트로 변경 가능)
  companies:[['name','상호'],['bizno','사업자번호'],['tel','전화'],['addr','주소'],['damdang','담당자']],
  items:[['name','품명'],['spec','규격'],['unit','단위'],['brand','브랜드(메이커)'],['buyPrice','기본 매입단가'],['salePrice','기본 판매단가'],['jek','기초재고']],
  prices:[['coName','업체명'],['itemName','품명'],['vendorPart','업체 품번'],['salePrice','업체별 단가→판매단가'],['buyPrice','업체별 단가→매입단가']]};
function hitpanFieldLabel(type,f){const d=(HITPAN_ORDER[type]||[]).find(x=>x[0]===f);return d?d[1]:(f||'(무시)');}
function hitpanParse(text,type){
  const lines=String(text||'').split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return {header:false,cols:0,fields:[],grid:[],rows:[]};
  const sep=lines[0].includes('\t')?'\t':',';
  let grid=lines.map(l=>l.split(sep).map(x=>x.trim().replace(/^"|"$/g,'')));
  const map=HITPAN_MAPS[type]||{};
  const h0=grid[0].map(x=>String(x).toLowerCase());
  const header=h0.some(x=>map[x]!==undefined);
  let fields;
  if(header){fields=h0.map(x=>map[x]||null);grid=grid.slice(1);
    // 2026-07-04 사용자 확인: 히트판 품목의 단일 단가(S_IDAN*)는 실제로는 판매단가 — 판매단가 열이 따로 없으면 기본 판매단가로 적재 (미리보기 열별 선택으로 변경 가능)
    if(type==='items'&&fields.includes('buyPrice')&&!fields.includes('salePrice'))fields=fields.map(f=>f==='buyPrice'?'salePrice':f);}
  else{fields=(HITPAN_ORDER[type]||[]).map(x=>x[0]).slice(0,grid[0].length);
    while(fields.length<grid[0].length)fields.push(null);}
  const rows=grid.map(cells=>{const o={};cells.forEach((v,i)=>{if(fields[i])o[fields[i]]=v;});return o;});
  return {header,sep,cols:(grid[0]||[]).length,fields,grid,rows};}
function hitpanNum(v){return Math.round(+String(v==null?'':v).replace(/[^0-9.\-]/g,''))||0;}
function hitpanApply(type,rows){
  let added=0,merged=0,skipped=0;
  if(type==='companies'){rows.forEach(r=>{
    if(!r.name){skipped++;return;}
    const c=DB.companies.find(x=>(r.bizno&&x.bizno===r.bizno)||x.name===r.name);
    if(c){ // 병합: 빈 필드만 채움
      ['bizno','tel','addr','email','ceo'].forEach(k=>{if(r[k]&&!c[k])c[k]=r[k];});
      if(r.damdang&&!(c.contacts||[]).some(ct=>ct.name===r.damdang)){c.contacts=c.contacts||[];
        c.contacts.push({id:uid('ct'),name:r.damdang,dept:'',title:'',phone:r.tel||'',email:'',memo:'히트판 이관'});}
      touch(c);merged++;}
    else{DB.companies.push({id:uid('c'),name:r.name,bizno:r.bizno||'',ceo:r.ceo||'',addr:r.addr||'',tel:r.tel||'',email:r.email||'',type:'both',memo:'히트판 이관',aliases:[],active:1,
      contacts:r.damdang?[{id:uid('ct'),name:r.damdang,dept:'',title:'',phone:r.tel||'',email:'',memo:'히트판 이관'}]:[]});added++;}});}
  else if(type==='items'){rows.forEach(r=>{
    if(!r.name){skipped++;return;}
    let it=DB.items.find(x=>x.name===r.name&&(x.spec||'')===(r.spec||''));
    if(it){ // 병합: 빈 필드만 채움 (기초재고는 신규 품목에만 반영)
      if(r.unit&&!it.unit)it.unit=r.unit;
      if(r.brand&&!it.brand)it.brand=r.brand;
      if(r.code&&!it.code)it.code=r.code;
      if(hitpanNum(r.buyPrice)&&!it.buyPrice)it.buyPrice=hitpanNum(r.buyPrice);
      if(hitpanNum(r.salePrice)&&!it.salePrice)it.salePrice=hitpanNum(r.salePrice);
      touch(it);merged++;}
    else{it={id:uid('i'),code:r.code||'',name:r.name,brand:r.brand||'',spec:r.spec||'',unit:r.unit||'EA',kind:'part',salePrice:hitpanNum(r.salePrice),buyPrice:hitpanNum(r.buyPrice),tax:'taxable',minStock:0,active:1};
      DB.items.push(it);added++;
      const jek=hitpanNum(r.jek);
      if(jek){DB.adjusts=DB.adjusts||[];
        DB.adjusts.push({id:uid('adj'),date:today(),itemId:it.id,name:it.name,qty:jek,note:'히트판 이관 기초재고 (수불 시작 조정)',by:curUser().id});}}});}
  else{rows.forEach(r=>{ // prices: UR_BUY+UR_PUM(+UR_PUMNO) → 업체별 품번/단가 (2026-07-04 사용자 확인: 기본 판매단가 — 미리보기에서 열별 매입단가 선택 가능)
    const c=DB.companies.find(x=>x.name===r.coName||(x.aliases||[]).includes(r.coName));
    const it=DB.items.find(x=>x.name===r.itemName&&(!r.itemSpec||(x.spec||'')===r.itemSpec));
    const sp=hitpanNum(r.salePrice),bp=hitpanNum(r.buyPrice);
    if(!c||!it||(!sp&&!bp)){skipped++;return;}
    DB.prices=DB.prices||[];
    const p=DB.prices.find(x=>x.itemId===it.id&&x.companyId===c.id&&((sp&&x.salePrice>0)||(bp&&x.buyPrice>0)));
    if(p){if(r.vendorPart&&!p.src)p.src='히트판 품번 '+r.vendorPart;merged++;}
    else{DB.prices.push({id:uid('pr'),itemId:it.id,companyId:c.id,salePrice:sp,buyPrice:bp,from:null,to:null,src:'히트판 이관'+(r.vendorPart?' · 품번 '+r.vendorPart:'')});added++;}});}
  return {added,merged,skipped};}

  +P.grid.slice(0,10).map(cells=>'<tr>'+P.fields.map((f,i)=>'<td class="mini">'+esc(cells[i]||'')+'</td>').join('')+'</tr>').join('')
  +'</table><div class="mini" style="margin-top:4px">미리보기: 처음 10행 / 전체 '+P.rows.length+'행</div>';}
function hitpanImport(){
  const type=window._hpType||'companies';
  let P=window._hpParsed;
  if(!P){P=hitpanParse(document.getElementById('hp-text').value,type);window._hpParsed=P;}
  if(!P.rows.length){toast('임포트할 데이터가 없습니다 — 먼저 붙여넣고 미리보기 하세요');return;}
  const rows=P.grid.map(cells=>{const o={};cells.forEach((v,i)=>{if(P.fields[i])o[P.fields[i]]=v;});return o;});
  const r=hitpanApply(type,rows);
  logAudit('히트판 이관 ('+type+')','신규 '+r.added+' · 병합 '+r.merged+' · 오류 '+r.skipped);
  saveDB();closeModal();route();
  toast('히트판 이관 완료 — 신규 '+r.added+'건 · 병합(빈 필드 보완) '+r.merged+'건 · 건너뜀 '+r.skipped+'건');}

function recentSaleFor(itemId,companyId){let best=null;
  DB.trans.forEach(t=>{if(t.type!=='sales'||t.companyId!==companyId)return;
    t.lines.forEach(l=>{if(l.itemId===itemId&&(!best||t.date>best.date))best={date:t.date,price:l.netPrice||l.price};});});
  return best;}


/* ================= V4-대리점 (D1): SMC 송수신 모듈 ================= */
/* 수신 ③ 자재 입고 데이터 — 히트판 SMC_* 테이블 해독 매핑: SPNO(발주번호)·SUJUNO(수주번호)·INVNO(인보이스)·
   NAPDT/NAPSEQ/NAPQTY(납품예정 일자/회차/수량)·NAPDAN(단가)·ALT1~4(대체품번)·SMCOK(승인).
   실시간 EDI/API는 SMC코리아 대리점 채널 협의 필요 — 파일(붙여넣기) 기반은 무료·즉시 가동, 같은 자리에 연결 예정. */
const SMCIN_FIELDS=[['spno','발주번호(SPNO)'],['sujuno','수주번호(SUJUNO)'],['invno','인보이스(INVNO)'],['part','품번(PUMNO)'],['napdt','납품예정일(NAPDT)'],['napseq','회차(NAPSEQ)'],['napqty','수량(NAPQTY)'],['napdan','단가(NAPDAN)'],['alt1','대체품번1(ALT1)'],['alt2','대체품번2(ALT2)'],['alt3','대체품번3(ALT3)'],['alt4','대체품번4(ALT4)'],['smcok','승인(SMCOK)']];
const SMCIN_MAP={spno:'spno',sujuno:'sujuno',invno:'invno',pumno:'part',spum:'part',part:'part',napdt:'napdt',napseq:'napseq',napqty:'napqty',napdan:'napdan',alt1:'alt1',alt2:'alt2',alt3:'alt3',alt4:'alt4',smcok:'smcok'};
const SMC_SAMPLE='SPNO\tSUJUNO\tINVNO\tPUMNO\tNAPDT\tNAPSEQ\tNAPQTY\tNAPDAN\tALT1\tSMCOK\nPO2026-0005\tSO2026-0003\tIV260709-01\tAR25-02BG-A\t2026-07-09\t1\t2\t21000\t\tY\n\t\tIV260709-01\tKQ2H06-08A\t2026-07-10\t1\t4\t2100\t\tY\nPO2026-0006\t\tIV260709-02\tKQ2H06-08B\t2026-07-12\t2\t6\t2050\tKQ2H06-08A\tY\nPO9999-0001\t\tIV260709-03\tCDQ2B32-30DZ\t2026-07-15\t1\t5\t12500\t\tY';
const SMC_PRICE_SAMPLE='품번,품명,단가,재고\nCDQ2B32-30DZ,SMC 실린더 CDQ2B32,12700,95\nAR25-02BG-A,SMC 레귤레이터 AR25,21500,40\nKQ2H06-08A,SMC 피팅 KQ2H06,2150,760\nAW30-03BG-A,SMC 필터레귤레이터 AW30,38500,12';
function smcNum(v){return Math.round(+String(v==null?'':v).replace(/[^0-9.\-]/g,''))||0;}
function smcHoldList(){return (DB.smcIn||[]).filter(x=>x.status==='hold');}
function smcPriceDt(){return (DB.smcPrices||[]).reduce((m,p)=>p.dt>m?p.dt:m,'');}
function smcAltFor(orig){const a=(DB.smcAlts||[]).find(x=>x.orig===orig);return a?a.alt:null;}
function smcAltOrig(alt){const a=(DB.smcAlts||[]).find(x=>x.alt===alt);return a?a.orig:null;}
function smcOpenPos(){return DB.pos.filter(p=>p.status==='ordered'&&poApvOk(p));}
function smcInParse(text){ // CSV/TSV 붙여넣기 — 헤더(SPNO/PUMNO/…) 자동 매핑, 없으면 기본 열 순서 + 미리보기 수동 매핑 셀렉트 (히트판 이관과 같은 관례)
  const lines=String(text||'').split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length)return {header:false,fields:[],grid:[],rows:[]};
  const sep=lines[0].includes('\t')?'\t':',';
  let grid=lines.map(l=>l.split(sep).map(x=>x.trim().replace(/^"|"$/g,'')));
  const h0=grid[0].map(x=>String(x).toLowerCase());
  const header=h0.some(x=>SMCIN_MAP[x]!==undefined);
  let fields;
  if(header){fields=h0.map(x=>SMCIN_MAP[x]||null);grid=grid.slice(1);}
  else{fields=SMCIN_FIELDS.map(x=>x[0]).slice(0,grid[0].length);while(fields.length<grid[0].length)fields.push(null);}
  const rows=grid.map(cells=>{const o={};cells.forEach((v,i)=>{if(fields[i])o[fields[i]]=v;});return o;});
  return {header,sep,fields,grid,rows};}
function smcMatchRow(r){ // 매칭: ① 발주번호(SPNO)=발주서 번호 → 품번(규격/품명) → ALT 열 → 단일 라인 ② 품번 전역 ③ 등록 대체품번 — 열린 발주(입고 잔량 있음)만
  const part=String(r.part||'').trim();
  const alts=(r.alts||[]).filter(Boolean);
  const pos=smcOpenPos();
  const scan=(list,pt)=>{if(!pt)return null;
    for(const p of list){const rq=receivedQty(p.id);
      for(let i=0;i<p.lines.length;i++){const l=p.lines[i];
        if((l.spec||'')!==pt&&l.name!==pt)continue;
        if(l.qty-(rq[(l.itemId||'')+'|'+l.name]||0)<=0)continue;
        return {po:p,li:i,line:l};}}
    return null;};
  const bySp=r.spno?pos.filter(p=>p.no===String(r.spno).trim()):[];
  if(bySp.length){
    let m=scan(bySp,part);
    if(m)return Object.assign(m,{via:'발주번호+품번',alt:null});
    const ao=smcAltOrig(part); // 등록된 대체품번이면 원품번으로 재시도 (자동 적용)
    if(ao){m=scan(bySp,ao);if(m)return Object.assign(m,{via:'발주번호+대체품(등록)',alt:{orig:ao,alt:part,known:true}});}
    for(const a of alts){m=scan(bySp,a);if(m)return Object.assign(m,{via:'발주번호+대체품(ALT)',alt:{orig:a,alt:part,known:false}});}
    if(bySp[0].lines.length===1){const p=bySp[0];const l=p.lines[0];const rq=receivedQty(p.id);
      if(l.qty-(rq[(l.itemId||'')+'|'+l.name]||0)>0){
        const alt=part&&(l.spec||'')!==part&&l.name!==part?{orig:l.spec||l.name,alt:part,known:false}:null;
        return {po:p,li:0,line:l,via:'발주번호(단일 라인)',alt};}}}
  if(part){
    let m=scan(pos,part);
    if(m)return Object.assign(m,{via:'품번(규격)',alt:null});
    const ao=smcAltOrig(part);
    if(ao){m=scan(pos,ao);if(m)return Object.assign(m,{via:'대체품(등록)',alt:{orig:ao,alt:part,known:true}});}}
  return null;}
function smcInApply(rows){ // 수신 반영: 행 저장 + 발주 매칭 (매칭 실패 → 보류 탭에서 수동 매칭)
  DB.smcIn=DB.smcIn||[];let matched=0,hold=0,skipped=0;
  rows.forEach(r=>{
    const part=String(r.part||'').trim();
    if(!part&&!String(r.spno||'').trim()){skipped++;return;}
    const rec={id:uid('si'),dt:today(),spno:String(r.spno||'').trim(),sujuno:String(r.sujuno||'').trim(),invno:String(r.invno||'').trim(),part,
      napdt:String(r.napdt||'').trim(),napseq:String(r.napseq||'').trim(),napqty:smcNum(r.napqty),napdan:smcNum(r.napdan),
      alts:[r.alt1,r.alt2,r.alt3,r.alt4].map(x=>String(x||'').trim()).filter(Boolean),smcok:String(r.smcok||'').trim(),
      status:'hold',poId:null,li:null,via:'',alt:null,grNo:'',holdWhy:'',by:curUser().id};
    const m=smcMatchRow(rec);
    if(m){rec.status='matched';rec.poId=m.po.id;rec.li=m.li;rec.via=m.via;rec.alt=m.alt||null;matched++;}
    else{rec.holdWhy='발주 매칭 실패 (발주번호·품번·대체품번 불일치 또는 입고 잔량 없음)';hold++;}
    DB.smcIn.push(rec);});
  return {matched,hold,skipped};}
function smcAutoGr(){ // [자동입고] 일괄: 매칭분 → 발주 단위 GR 생성(수신 단가 적용) → 기존 백오더 해제·원가 미확정 제안 발화(grPostProcess) · ALT는 행별 확인 후 DB.smcAlts 등록(다음부터 자동)
  const pend=(DB.smcIn||[]).filter(x=>x.status==='matched');
  if(!pend.length){toast('자동입고 대상(매칭됨)이 없습니다 — 먼저 수신 자료를 반영하세요');return;}
  pend.forEach(x=>{ // 대체품번 치환 확인 (신규만 — 등록되면 이후 수신부터 자동 적용)
    if(!x.alt||x.alt.known)return;
    if((DB.smcAlts||[]).some(a=>a.orig===x.alt.orig&&a.alt===x.alt.alt)){x.alt.known=true;return;}
    if(confirm('대체품번 치환 확인\n\n원품번  '+x.alt.orig+'\n대체품  '+x.alt.alt+'\n(발주 '+((byId(DB.pos,x.poId)||{}).no||'')+' · 수량 '+x.napqty+')\n\n등록하면 다음 수신부터 자동 적용됩니다. 진행할까요?')){
      DB.smcAlts.push({id:uid('sa'),orig:x.alt.orig,alt:x.alt.alt,dt:today(),by:curUser().id});x.alt.known=true;
      logAudit('SMC 대체품번 등록',x.alt.orig+' ↔ '+x.alt.alt);}
    else{x.status='hold';x.holdWhy='대체품 치환 미승인';}});
  const byPo={};
  pend.filter(x=>x.status==='matched').forEach(x=>{(byPo[x.poId]=byPo[x.poId]||[]).push(x);});
  let grN=0,rowN=0,relT=0;const grNos=[];
  Object.keys(byPo).forEach(pid=>{
    const p=byId(DB.pos,pid);if(!p)return;
    const rq=receivedQty(pid);const used={};const lines=[];const done=[];
    byPo[pid].forEach(x=>{
      const l=p.lines[x.li];
      if(!l){x.status='hold';x.holdWhy='발주 라인 없음';return;}
      const k=(l.itemId||'')+'|'+l.name;
      const rem=l.qty-(rq[k]||0)-(used[k]||0);
      const q=Math.min(x.napqty||0,rem);
      if(q<=0){x.status='hold';x.holdWhy='입고 잔량 없음 (기입고 초과)';return;}
      used[k]=(used[k]||0)+q;
      const it=l.itemId?byId(DB.items,l.itemId):null;
      lines.push(calcLine({itemId:l.itemId,name:l.name,spec:l.spec,unit:l.unit,qty:q,price:x.napdan||l.price,dcRate:l.dcRate||0},it&&it.tax==='exempt'));
      x.status='done';rowN++;done.push(x);});
    if(!lines.length)return;
    const date=today();
    const su=(byPo[pid].map(x=>x.sujuno).filter(Boolean)[0]||'');
    const so=su?DB.orders.find(o=>o.no===su):null;
    const g={id:uid('tp'),no:docNo('GR',date),type:'purchase',poId:pid,companyId:p.companyId,date,status:'open',
      smc:{invno:byPo[pid].map(x=>x.invno).filter(Boolean)[0]||'',sujuno:su,soId:so?so.id:(p.orderId||null)},lines};
    DB.trans.push(g);grN++;grNos.push(g.no);
    done.forEach(x=>{x.grNo=g.no;});
    const rq2=receivedQty(pid);
    if(p.lines.every(l=>{const k=(l.itemId||'')+'|'+l.name;return (rq2[k]||0)>=l.qty;})){p.status='received';touch(p);}
    const relN=grPostProcess(g);relT+=relN; // 기존 연동 그대로 발화: 백오더(미입고 대기) 해제 알림 + 원가 미확정 최근매입가 제안
    logAudit('SMC 자동입고',g.no+' ← '+p.no+' ('+lines.length+'라인)'+(su?' · 수주 '+su+' 연계':'')+(relN?' · 백오더 해제 알림 '+relN+'건':''));});
  saveDB();route();
  toast(grN?('SMC 자동입고 완료 — 입고 전표 '+grN+'건 ('+grNos.join(', ')+') · 수신행 '+rowN+'건 처리'+(relT?' · 📦 미입고 대기 '+relT+'건 출고 가능(메일 알림)':'')):'입고 가능한 행이 없습니다 (잔량·치환 확인)');}
function smcManualMatch(id){ // 보류 → 수동 발주 지정 (매칭 상태로 전환 후 [자동입고 실행])
  const x=byId(DB.smcIn||[],id);if(!x)return;
  const sel=document.getElementById('smh-'+id);
  const v=sel?sel.value:'';
  if(!v){toast('매칭할 발주 라인을 선택하세요');return;}
  const pid=v.split('|')[0],li=+v.split('|')[1];
  const p=byId(DB.pos,pid);const l=p&&p.lines[li];
  if(!l){toast('발주 라인을 찾을 수 없습니다');return;}
  x.status='matched';x.poId=pid;x.li=li;x.via='수동 매칭';x.holdWhy='';
  if(x.part&&(l.spec||'')!==x.part&&l.name!==x.part)x.alt={orig:l.spec||l.name,alt:x.part,known:(DB.smcAlts||[]).some(a=>a.orig===(l.spec||l.name)&&a.alt===x.part)};
  logAudit('SMC 수동 매칭',(x.part||x.spno)+' → '+p.no);
  saveDB();route();toast('수동 매칭 완료 — [수신함] 탭에서 자동입고를 실행하세요');}
function smcRowDel(id){if(!confirm('이 수신 행을 삭제할까요?'))return;

/* ---- 수신 ④ SMC 가격표 (견적 작성 중 품번 → 가격 제안) ---- */
function smcPricesParse(text){ // 품번,품명,단가[,재고] — 헤더행 자동 스킵
  const lines=String(text||'').split(/\r?\n/).filter(l=>l.trim());
  const out=[];const dt=today();
  lines.forEach(l=>{const sep=l.includes('\t')?'\t':',';const c=l.split(sep).map(x=>x.trim().replace(/^"|"$/g,''));
    if(!c[0])return;
    if(['품번','part','pumno','spum'].includes(String(c[0]).toLowerCase()))return;
    const price=smcNum(c[2]);if(!price)return;
    out.push({part:c[0],name:c[1]||'',price,stock:(c[3]!==undefined&&c[3]!=='')?smcNum(c[3]):null,dt});});
  return out;}
function smcPricesApply(rows){DB.smcPrices=DB.smcPrices||[];let add=0,upd=0;
  rows.forEach(r=>{const p=DB.smcPrices.find(x=>x.part===r.part);
    if(p){Object.assign(p,r);upd++;}
    else{DB.smcPrices.push(Object.assign({id:uid('sp')},r));add++;}});
  logAudit('SMC 가격표 수신','신규 '+add+' · 갱신 '+upd);saveDB();return {add,upd};}
function smcPriceFor(part){ // 품번(규격) → 수신 가격 + 등록 대체품 가격 (원품번 입력 시 대체품 가격 함께)
  part=String(part||'').trim();if(!part)return null;
  const hit=(DB.smcPrices||[]).find(x=>x.part===part)||null;
  const altPart=smcAltFor(part);
  const alt=altPart?((DB.smcPrices||[]).find(x=>x.part===altPart)||null):null;
  if(!hit&&!alt)return null;
  return {hit,alt:alt?{part:altPart,p:alt}:null};}
function smcPriceBadge(l,i){ // 견적 라인: 규격 매칭 시 "SMC가 ₩N (날짜 기준)" 뱃지 + [적용] · 등록 대체품 가격 병기 — 실시간 API 협의 전 파일 기반
  const r=smcPriceFor(l.spec||l.name);if(!r)return '';
  let h='';
  if(r.hit)h+='<div class="mini"><span class="badge b-blue" title="SMC 가격표 수신값'+(r.hit.stock!=null?' · SMC 재고 '+fmt(r.hit.stock):'')+' — 실시간 조회는 SMC 채널 협의 후">SMC가 ₩'+fmt(r.hit.price)+' ('+r.hit.dt+' 기준)</span>'+(ED&&!ED.ro?' <a class="lnk" onclick="smcApplyPrice('+i+')">[적용]</a>':'')+'</div>';
  if(r.alt)h+='<div class="mini"><span class="badge b-purple" title="등록 대체품번의 SMC 가격 ('+r.alt.p.dt+' 기준)">대체 '+esc(r.alt.part)+' ₩'+fmt(r.alt.p.price)+'</span></div>';
  return h;}
function smcApplyPrice(i){const l=ED.lines[i];if(!l)return;
  const r=smcPriceFor(l.spec||l.name);if(!r||!r.hit){toast('수신된 SMC 가격이 없습니다');return;}
  l.price=r.hit.price;const it=l.itemId?byId(DB.items,l.itemId):null;
  calcLine(l,it&&it.tax==='exempt');renderEdLines();
  toast('SMC가 '+fmt(r.hit.price)+'원 적용 ('+r.hit.dt+' 기준'+(r.hit.stock!=null?' · SMC 재고 '+fmt(r.hit.stock):'')+')');}
/* ---- 송신 ①② CSV 송출 (견적: 가격·재고 / 가격표: 구매가·판매가 / 발주) ---- */
function smcCsvCell(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function smcCsv(rows){return rows.map(r=>r.map(smcCsvCell).join(',')).join('\n');}
function smcDownload(name,csv){try{const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download=name;a.click();}catch(e){}}
function smcLineStock(l){const it=l.itemId?byId(DB.items,l.itemId):null; // 현재고: 재고현황 계산값 (제작품·용역은 재고 미관리 → 0)
  if(it&&!['material','part'].includes(it.kind)&&!it.isSet)return 0; // v4.5: 세트는 조립 입고분 재고 표기
  return stockOf(l.itemId?l.itemId:('n:'+l.name)).qty;}
function smcOutLog(kind,docId,no,file,rows){DB.smcOut=DB.smcOut||[];

function smcQuoteCsv(id){const q=byId(DB.quotes,id);if(!q)return null; // 품번,품명,규격,수량,판매단가,현재고,납기요청[,세트구성]
  const hasSet=q.lines.some(l=>{const it=l.itemId?byId(DB.items,l.itemId):null;return it&&it.isSet;}); // v4.5: 세트 라인 있으면 세트구성 열 추가 + 컴포넌트 전개 행
  const head=['품번','품명','규격','수량','판매단가','현재고','납기요청'];if(hasSet)head.push('세트구성');
  const rows=[head];
  q.lines.forEach(l=>{const it=l.itemId?byId(DB.items,l.itemId):null;
    const r=[l.spec||(it&&it.code)||'',l.name,l.spec||'',l.qty||0,l.price||0,smcLineStock(l),q.validUntil||''];
    if(hasSet)r.push(it&&it.isSet?'세트':'');
    rows.push(r);
    if(it&&it.isSet)setLineComps(it,l.setOpts).forEach(c=>{const ci=byId(DB.items,c.itemId)||{}; // 세트 라인 → 컴포넌트 전개 (SMC 발주·재고 확인용)
      rows.push([ci.spec||ci.code||'',ci.name||'',ci.spec||'',(c.qty||1)*(l.qty||0),'',smcLineStock({itemId:c.itemId,name:ci.name||''}),q.validUntil||'','└ '+(it.name||'')]);});});
  return smcCsv(rows);}

/* ================= v4.5: 세트조립 — 블럭식 묶기/풀기 + 옵션 연동 (2026-07-09) ================= */
/* 벤치마킹: 히트판21c 표준관리>세트조립 (품목 S_SET 필드). 블럭 조립처럼 옵션 추가/제외로 묶었다 풀었다 해도
   재고(stockOf)·수불대장(조립출고/조립입고)·원가(조립원가 스냅샷)·견적/명세서(옵션 가격·서브라인)·SMC 송출(컴포넌트 전개)이 전부 연동됨.
   - 세트 마스터: 품목 isSet=1 + setComps[{itemId,qty,req(필수1/옵션0),addPrice(옵션 추가금)}] — 언제든 수정, 과거 조립 스냅샷은 불변
   - 조립(ASM): 컴포넌트 재고 차감(adjusts kind:asmOut) + 세트 재고 증가(asmIn) + 스냅샷·세트당 원가 기록
   - 해체(DAS): 원 조립 전표 기준(옵션 포함 스냅샷 그대로 복귀) · 부분 해체 = remaining 추적 */
function setComps(it){return (it&&it.setComps)||[];}
function setLineComps(it,opts){opts=opts||[];return setComps(it).filter(c=>c.req||opts.indexOf(c.itemId)>=0);} // 필수 + 선택된 옵션
function compUnitCost(itemId){ // 컴포넌트 원가: 최근 매입 입고 단가 → 기준 매입단가 → 재고 평균단가 (fillLineCost와 같은 우선순위)
  const rb=recentBuyCost(itemId);if(rb)return rb.price;
  const it=byId(DB.items,itemId)||{};if(it.buyPrice>0)return it.buyPrice;
  const r=stockRows().find(x=>x.itemId===itemId);return (r&&r.avgCost)||0;}
function setBuildable(setId){ // "조립 가능 수량" = 필수 컴포넌트 재고로 계산한 최대 세트 수
  const it=byId(DB.items,setId);let m=Infinity;
  setComps(it).filter(c=>c.req).forEach(c=>{m=Math.min(m,Math.floor(stockOf(c.itemId).qty/(c.qty||1)));});
  return m===Infinity?0:Math.max(0,m);}
function setCostOf(setId,opts){ // 세트 라인 원가: 최신 조립 setUnitCost → (조립 이력 없으면) 컴포넌트 최근원가 합
  const asms=(DB.assemblies||[]).filter(a=>a.setId===setId).sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:(a.no<b.no?-1:1));
  const last=asms[asms.length-1];
  if(last&&last.setUnitCost>0)return {cost:last.setUnitCost,src:'조립원가 '+last.no+' ('+last.date+')'};
  const comps=setLineComps(byId(DB.items,setId),opts);
  if(!comps.length)return null;
  let s=0,known=0;comps.forEach(c=>{const u=compUnitCost(c.itemId);if(u>0)known++;s+=u*(c.qty||1);});
  if(!known)return null;
  return {cost:Math.round(s),src:'컴포넌트 원가 합 ('+comps.length+'종'+(known<comps.length?' · 일부 원가 0':'')+')'};}
function setOptPrice(it,opts){opts=opts||[];let s=0;
  setComps(it).forEach(c=>{if(!c.req&&opts.indexOf(c.itemId)>=0)s+=(+c.addPrice||0);});return s;}
function setOptText(l){ // 라인에 저장된 옵션 → "└ 옵션: ..." (명세서 인쇄·화면 서브라인 공용)
  const it=l.itemId?byId(DB.items,l.itemId):null;
  if(!it||!it.isSet||!(l.setOpts||[]).length)return '';
  return '└ 옵션: '+(l.setOpts||[]).map(id2=>{const c=setComps(it).find(x=>x.itemId===id2)||{};const ci=byId(DB.items,id2)||{};
    return (ci.name||'')+((c.qty||1)>1?' x'+c.qty:'')+(c.addPrice?' (+'+fmt(c.addPrice)+')':'');}).filter(Boolean).join(', ');}
function setOptPrintRows(l,cols){const t=setOptText(l);
  return t?'<tr><td></td><td colspan="'+(cols-1)+'" style="font-size:10px;color:#555;padding-left:14px">'+esc(t)+'</td></tr>':'';}
function asmValidate(setId,qty,opts){ // 재고 검증: 부족 컴포넌트 [{itemId,name,need,have,short}] — 있으면 조립 차단
  const shorts=[];
  setLineComps(byId(DB.items,setId),opts).forEach(c=>{const need=(c.qty||1)*qty;const have=stockOf(c.itemId).qty;
    if(have<need){const ci=byId(DB.items,c.itemId)||{};shorts.push({itemId:c.itemId,name:ci.name||'',need,have,short:need-have});}});
  return shorts;}
function asmDo(setId,qty,opts,date,memo){ // 조립 실행 — 컴포넌트 차감 + 세트 증가 + 스냅샷 (수불대장: 조립출고/조립입고 ASM번호)
  const it=byId(DB.items,setId);qty=Math.round(+qty||0);date=date||today();
  if(!it||!it.isSet)return {err:'세트 품목이 아닙니다'};
  if(qty<=0)return {err:'조립 수량을 입력하세요'};
  if(!setComps(it).length)return {err:'구성품(BOM)이 없습니다 — 품목의 세트 구성에서 등록하세요'};
  if(!lockGuard(date,'세트 조립'))return {err:'마감 잠금'};
  const shorts=asmValidate(setId,qty,opts);
  if(shorts.length)return {err:'재고 부족: '+shorts.map(s=>s.name+' '+fmt(s.short)+'개 부족 (보유 '+fmt(s.have)+' / 필요 '+fmt(s.need)+')').join(' · '),shorts};
  const no=docNo('ASM',date);DB.adjusts=DB.adjusts||[];
  const comps=setLineComps(it,opts).map(c=>{const ci=byId(DB.items,c.itemId)||{};const u=compUnitCost(c.itemId);
    DB.adjusts.push({id:uid('aa'),date,itemId:c.itemId,name:ci.name||'',qty:-(c.qty||1)*qty,unitCost:u,kind:'asmOut',ref:no,note:'세트 조립 출고 — '+it.name+' ('+no+')',by:curUser().id});
    return {itemId:c.itemId,name:ci.name||'',qty:(c.qty||1)*qty,unitCost:u,req:c.req?1:0};});
  const unitCost=Math.round(comps.reduce((s,c)=>s+c.qty*c.unitCost,0)/qty);
  DB.adjusts.push({id:uid('aa'),date,itemId:setId,name:it.name,qty:qty,unitCost:unitCost,kind:'asmIn',ref:no,note:'세트 조립 입고 — '+no,by:curUser().id});
  const a={id:uid('asm'),no,date,setId,qty,remaining:qty,options:(opts||[]).slice(),comps,setUnitCost:unitCost,memo:memo||'',by:curUser().id};
  DB.assemblies.push(a);
  logAudit('세트 조립',no+' · '+it.name+' x'+qty+' (세트당 원가 '+fmt(unitCost)+')');
  saveDB();return {a};}
function dasDo(asmId,qty,date,memo){ // 해체 실행 — 원 조립 스냅샷(옵션 포함) 그대로 복귀 · 부분 해체(qty ≤ 잔여)
  const a=byId(DB.assemblies||[],asmId);if(!a)return {err:'조립 이력을 찾을 수 없습니다'};
  const rem=a.remaining!=null?a.remaining:a.qty;
  qty=Math.round(+qty||0);date=date||today();
  if(qty<=0||qty>rem)return {err:'해체 수량은 1 ~ 잔여 '+fmt(rem)+' 범위입니다'};
  if(!lockGuard(date,'세트 해체'))return {err:'마감 잠금'};
  const it=byId(DB.items,a.setId)||{};
  if(stockOf(a.setId).qty<qty)return {err:'세트 재고 부족 — 현재고 '+fmt(stockOf(a.setId).qty)+' (이미 판매/불출된 세트는 해체할 수 없습니다)'};
  const no=docNo('DAS',date);DB.adjusts=DB.adjusts||[];
  DB.adjusts.push({id:uid('aa'),date,itemId:a.setId,name:it.name||'',qty:-qty,unitCost:a.setUnitCost,kind:'asmOut',ref:no,note:'세트 해체 출고 — '+no+' (원 조립 '+a.no+')',by:curUser().id});
  a.comps.forEach(c=>{const back=Math.round(c.qty/a.qty*qty); // 스냅샷 비례 복귀 (옵션 포함 그대로)
    if(back>0)DB.adjusts.push({id:uid('aa'),date,itemId:c.itemId,name:c.name,qty:back,unitCost:c.unitCost,kind:'asmIn',ref:no,note:'세트 해체 복귀 — '+no+' (원 조립 '+a.no+')',by:curUser().id});});
  a.remaining=rem-qty;touch(a);
  const d={id:uid('das'),no,date,asmId:a.id,asmNo:a.no,setId:a.setId,qty,memo:memo||'',by:curUser().id};
  DB.disassemblies.push(d);
  logAudit('세트 해체',no+' · '+(it.name||'')+' x'+qty+' (원 조립 '+a.no+' · 잔여 '+fmt(a.remaining)+')');
  saveDB();return {d};}

  +'</table></div>'

  +'<table><tr><th>조립번호</th><th>일자</th><th>세트</th><th class="r">조립</th><th class="r">잔여</th><th>옵션</th><th class="r">세트당 원가</th><th>구성 스냅샷</th><th>메모</th><th></th></tr>'

    const optN=(a.options||[]).map(x=>((byId(DB.items,x)||{}).name)||'').filter(Boolean).join(', ');

    +dass.map(d=>{const s=byId(DB.items,d.setId)||{};return '<tr><td><b>'+d.no+'</b></td><td>'+d.date+'</td><td><span class="badge b-blue" title="원 조립 전표">'+esc(d.asmNo)+'</span></td><td>'+esc(s.name||'')+'</td><td class="r num">'+fmt(d.qty)+'</td><td class="mini">'+esc(d.memo||'')+'</td><td class="mini">'+userName(d.by)+'</td></tr>';}).join('')+'</table>':'')

function asmModal(setId){const it=byId(DB.items,setId);if(!it)return;
  const comps=setComps(it);
  if(!comps.length){toast('구성품(BOM)이 없습니다 — 품목의 [세트 구성]에서 등록하세요');return;}
  window._asmSet=setId;
  openModal('<h3>세트 조립 — '+esc(it.name)+'</h3><div class="mini">필수 구성은 고정(해제 불가) · 옵션은 체크로 추가/제외 · 컴포넌트 재고 부족 시 차단됩니다.</div>'
  +'<div class="frm" style="margin:10px 0"><div><label>조립일</label><input type="date" id="asm-date" value="'+today()+'"></div>'
  +'<div><label>조립 수량 (세트)</label><input class="r" id="asm-qty" value="1" oninput="asmPreview()"></div>'
  +'<div class="full"><label>메모</label><input id="asm-memo" placeholder="예: 7월 판촉 세트 준비"></div></div>'
  +'<div><b class="mini">구성 (옵션 체크)</b></div>'
  +comps.map((c,k)=>{const ci=byId(DB.items,c.itemId)||{};
    return '<label class="mini" style="display:block;margin:2px 0">'
    +(c.req?'<input type="checkbox" checked disabled title="필수 구성 — 해제 불가"> '+esc(ci.name||'')+' x'+(c.qty||1)+' <span class="badge b-gray">필수</span>'
      :'<input type="checkbox" id="asm-op'+k+'" checked onchange="asmPreview()"> '+esc(ci.name||'')+' x'+(c.qty||1)+' <span class="badge b-purple">옵션 +'+fmt(c.addPrice||0)+'</span>')
    +'</label>';}).join('')
  +'<div id="asm-prev" style="margin-top:8px"></div>'
  +'<div class="bar" style="margin-top:12px"><button class="pri" onclick="asmExec()">조립 실행</button><button onclick="closeModal()">취소</button></div>');
  asmPreview();}
function asmOptsFromModal(){const it=byId(DB.items,window._asmSet);const opts=[];
  setComps(it).forEach((c,k)=>{if(c.req)return;const e=document.getElementById('asm-op'+k);if(e&&e.checked)opts.push(c.itemId);});
  return opts;}
function asmPreview(){const it=byId(DB.items,window._asmSet);if(!it)return;
  const box=document.getElementById('asm-prev');if(!box)return;
  const qty=Math.max(1,Math.round(+String((document.getElementById('asm-qty')||{}).value||1).replace(/,/g,'')||1));
  const rows=setLineComps(it,asmOptsFromModal()).map(c=>{const ci=byId(DB.items,c.itemId)||{};const need=(c.qty||1)*qty;const have=stockOf(c.itemId).qty;
    return {name:ci.name||'',need,have,ok:have>=need,cost:compUnitCost(c.itemId)*(c.qty||1)};});
  const bad=rows.filter(r=>!r.ok);
  box.innerHTML='<table><tr><th>컴포넌트</th><th class="r">필요</th><th class="r">현재고</th><th>판정</th></tr>'
  +rows.map(r=>'<tr'+(r.ok?'':' style="background:#fef2f2"')+'><td>'+esc(r.name)+'</td><td class="r num">'+fmt(r.need)+'</td><td class="r num">'+fmt(r.have)+'</td><td>'+(r.ok?'<span class="badge b-green">가능</span>':'<span class="badge b-red">부족 '+fmt(r.need-r.have)+'</span>')+'</td></tr>').join('')+'</table>'
  +(bad.length?'<div class="warnbox" style="margin-top:6px">⚠ 재고 부족 '+bad.length+'품목 — 조립이 차단됩니다: '+bad.map(r=>esc(r.name)+' '+fmt(r.need-r.have)+'개 부족').join(' · ')+'</div>'
    :'<div class="okbox" style="margin-top:6px">조립 가능 — 예상 세트당 원가 '+fmt(Math.round(rows.reduce((s,r)=>s+r.cost,0)))+'원 (컴포넌트 최근 매입가 스냅샷)</div>');}
function asmExec(){const setId=window._asmSet;
  const qty=+String(document.getElementById('asm-qty').value).replace(/,/g,'')||0;
  const r=asmDo(setId,qty,asmOptsFromModal(),document.getElementById('asm-date').value,document.getElementById('asm-memo').value);
  if(r.err){toast('⚠ '+r.err);return;}
  closeModal();route();
  toast('조립 완료 — '+r.a.no+' · '+((byId(DB.items,setId)||{}).name||'')+' x'+r.a.qty+' (세트당 원가 '+fmt(r.a.setUnitCost)+'원 · 수불대장 반영)');}

      if(sp&&sp.hit)h2+='<span class="badge b-blue" title="SMC 가격표 수신값 — 컴포넌트 매입가 참고">SMC가 ₩'+fmt(sp.hit.price)+' ('+sp.hit.dt+')</span>';

function setCompAdd(id){pickItem(function(iid){const it=byId(DB.items,id);

/* ================= V4-대리점 (D2): SMC 가격 원장(E가·DC·마진) + 감사 리포트 (2026-07-09) ================= */
/* 사용자 실원장 Excel 공식 그대로:
   구매가 = ROUNDUP10(E가 × (1−DC율))          — 10원 단위 올림 (Math.ceil(x/10)*10)
   판매가 = ROUND10(구매가 ÷ (1−마진율))        — 10원 단위 (실원장 검증: VK334V-5DS-01-Q E가 50,360 · DC 25% · 마진 12% → 구매 37,770 · 판매 42,920)
     ※ 판매가를 올림(ROUNDUP10)으로 하면 42,930이 되어 실원장 수치(42,920)와 어긋남 → 실원장 기준 반올림 채택
   DC확인 = (E가−구매가)/E가 · 마진율확인 = (판매가−구매가)/판매가 (판매가 기준 마진) · 변동 = 1−판매가/기존단가 (Excel L열)
   원장 수정 → 품목의 기준단가(buyPrice/salePrice)에 즉시 기록 — 기존 마진·수익률·원가 로직이 전부 그대로 동작 */
function roundUp10(x){return Math.ceil((+x||0)/10)*10;}
function round10(x){return Math.round((+x||0)/10)*10;}
function isSmcItem(it){return !!it&&(it.isSmc===1||String(it.brand||'').trim().toUpperCase()==='SMC');}
function smcRates(){DB.settings=DB.settings||{}; // 카테고리 기본 요율 — 품목에 자체 요율이 없으면 적용 (원장 화면에서 수정)
  if(!DB.settings.smcRates||!DB.settings.smcRates.length)DB.settings.smcRates=[{cat:'소물류',dc:0.25,margin:0.12},{cat:'일반',dc:0.25,margin:0.12}];
  return DB.settings.smcRates;}
function smcRateFor(it){ // 품목 자체 요율 → 없으면 카테고리 기본(품목 smcCat 매칭 → '일반' → 첫 행)
  const rs=smcRates();
  const def=rs.find(r=>r.cat===(it&&it.smcCat))||rs.find(r=>r.cat==='일반')||rs[0];
  const dcOwn=!!(it&&it.dcRate!=null&&it.dcRate!=='');
  const mgOwn=!!(it&&it.marginRate!=null&&it.marginRate!=='');
  return {dc:dcOwn?+it.dcRate:+def.dc,margin:mgOwn?+it.marginRate:+def.margin,dcOwn,mgOwn,cat:def.cat};}
function smcCalc(ePrice,dc,margin){ // 원장 공식 (위 주석) — E가 없으면 null
  const e=+ePrice||0;if(e<=0)return null;
  const buy=roundUp10(e*(1-(+dc||0)));
  const m=+margin||0;
  const sale=m>=1?buy:round10(buy/(1-m));
  return {buy,sale,dcChk:(e-buy)/e,mgChk:sale>0?(sale-buy)/sale:0};}
function smcLedgerCalc(it){ // 품목의 원장 파생값 — 판매가 수동(saleManual)이면 판매가 유지 + 마진율확인 역산
  if(!isSmcItem(it)||!(+it.ePrice>0))return null;
  const r=smcRateFor(it);
  const c=smcCalc(it.ePrice,r.dc,r.margin);
  let sale=c.sale,manual=false,mgChk=c.mgChk;
  if(it.saleManual&&+it.salePrice>0){sale=+it.salePrice;manual=true;mgChk=sale>0?(sale-c.buy)/sale:0;}
  const prev=+it.prevPrice||0;
  return {ePrice:+it.ePrice,dc:r.dc,margin:r.margin,buy:c.buy,sale,dcChk:c.dcChk,mgChk,manual,prev,chg:prev>0?1-sale/prev:null,cat:r.cat,dcOwn:r.dcOwn,mgOwn:r.mgOwn};}
function smcLedgerApply(it){ // 파생값을 품목 기준단가에 기록 — 반환: 파생값 (E가 없으면 null·기준단가 유지)
  const d=smcLedgerCalc(it);if(!d)return null;
  it.buyPrice=d.buy;it.salePrice=d.sale;
  return d;}
function smcRatesReapply(){let n=0;DB.items.forEach(it=>{if(isSmcItem(it)&&+it.ePrice>0){smcLedgerApply(it);n++;}});return n;} // 기본 요율 변경 → 전체 재계산
function slPct(v){return (v==null||isNaN(v))?'-':(Math.round(v*1000)/10)+'%';}
function slNumPct(v){v=String(v==null?'':v).replace(/[%\s,]/g,'');if(v==='')return null;const n=+v;if(isNaN(n))return null;return n>=1?n/100:n;} // '25' '25%' '0.25' 모두 허용
function slSplit(line,sep){const out=[];let cur='',q=false; // CSV 셀 분리 (따옴표 안 콤마·"" 이스케이프 지원 — 납기 문구 대비)
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else if(ch==='"')q=true;
    else if(ch===sep){out.push(cur);cur='';}
    else cur+=ch;}
  out.push(cur);return out;}

function slChg(id,k,v){const it=byId(DB.items,id);if(!it)return;
  if(k==='leadtime'){it.leadtime=String(v||'').trim();touch(it);logAudit('SMC 원장 납기',(it.spec||it.name)+' → '+(it.leadtime||'(없음)'));saveDB();route();return;}
  if(k==='ePrice'||k==='prevPrice'){const n=Math.round(+String(v).replace(/,/g,''))||0;if(n>0)it[k]=n;else delete it[k];}
  else{const n=slNumPct(v);
    if(n==null)delete it[k];
    else if(n>=1){toast('요율은 100% 미만으로 입력하세요');route();return;}
    else it[k]=n;
    if(k==='marginRate')delete it.saleManual;} // 마진율 수정 = 자동 판매가로 복귀
  const d=smcLedgerApply(it);touch(it);
  logAudit('SMC 원장 수정',(it.spec||it.name)+' · '+k+(d?' → 구매 '+fmt(d.buy)+' · 판매 '+fmt(d.sale):''));
  saveDB();route();
  toast(d?(it.name+' — 구매가 '+fmt(d.buy)+' · 판매가 '+fmt(d.sale)+' 재계산'):(it.name+' — E가 미등록: 기준단가 유지'));}
function slSaleManual(id,v){const it=byId(DB.items,id);if(!it)return;
  const n=Math.round(+String(v).replace(/,/g,''))||0;
  if(n<=0||!(+it.ePrice>0)){delete it.saleManual;if(n>0)it.salePrice=n;const d=smcLedgerApply(it);touch(it);saveDB();route();toast(d?('판매가 자동 계산 '+fmt(d.sale)+'원'):'판매가 저장');return;}
  it.salePrice=n;it.saleManual=1;touch(it);
  const d=smcLedgerCalc(it);
  logAudit('SMC 원장 판매가 수동',(it.spec||it.name)+' → '+fmt(n));
  saveDB();route();toast('판매가 수동 '+fmt(n)+'원 — 마진율확인 '+(d?slPct(d.mgChk):'-')+' (역산)');}
function slAuto(id){const it=byId(DB.items,id);if(!it)return;
  delete it.saleManual;const d=smcLedgerApply(it);touch(it);
  logAudit('SMC 원장 판매가 자동 복귀',it.spec||it.name);
  saveDB();route();toast('자동 판매가 '+(d?fmt(d.sale):'-')+'원으로 복귀');}

/* ---- 원장 CSV 송출/수신 ---- */
const SMC_LEDGER_HEAD=['규격','품명','E가','DC율','구매가','마진율','판매가','납기','DC확인','마진율확인','기존단가','변동'];
function smcLedgerCsv(list){
  const rows=[SMC_LEDGER_HEAD.slice()];
  (list||smcLedgerList()).forEach(it=>{const d=smcLedgerCalc(it);
    rows.push([it.spec||it.code||'',it.name,(+it.ePrice>0?it.ePrice:''),d?slPct(d.dc):'',d?d.buy:(it.buyPrice||''),d?slPct(d.manual?d.mgChk:d.margin):'',d?d.sale:(it.salePrice||''),it.leadtime||'',d?slPct(d.dcChk):'',d?slPct(d.mgChk):'',(+it.prevPrice>0?it.prevPrice:''),d&&d.chg!=null?slPct(d.chg):'']);});
  return smcCsv(rows);}
function smcLedgerCsvOut(){const list=smcLedgerList();
  if(!list.length){toast('송출할 SMC 품목이 없습니다');return;}
  const csv=smcLedgerCsv(list);
  const fn='SMC원장_'+today()+'.csv';
  smcDownload(fn,csv);
  smcOutLog('ledger',null,'SMC 품목 '+list.length+'건',fn,list.length);
  logAudit('SMC 원장 CSV 송출',list.length+'품목 · '+fn);
  saveDB();route();toast('원장 CSV 생성 — '+list.length+'품목 (E가·DC·구매·마진·판매·납기) · 송출 이력 기록');}
function smcLedgerParse(text){ // 열 순서 = 송출 형식 (규격,품명,E가,DC율,구매가,마진율,판매가,납기,DC확인,마진율확인,기존단가,변동) — 헤더·빈 규격 스킵
  const lines=String(text||'').split(/\r?\n/).filter(l=>l.trim());
  const out=[];
  lines.forEach(l=>{const sep=l.includes('\t')?'\t':',';
    const c=slSplit(l,sep).map(x=>x.trim());
    if(!c[0])return;
    if(['규격','품번','spec','part'].includes(String(c[0]).toLowerCase()))return;
    out.push({spec:c[0],name:c[1]||'',ePrice:smcNum(c[2])||null,dc:slNumPct(c[3]),margin:slNumPct(c[5]),leadtime:(c[7]||'').trim(),prev:smcNum(c[10])||null});});
  return out;}
function smcLedgerImportApply(rows){ // 매칭: 규격(품번) → 코드 → 품명 · E가 갱신 시 DC/마진 유지 재계산 · 판매가 변경 = "가격 변경" 플래그 (Excel L열 개념)
  const rep=[],miss=[];let upd=0;
  rows.forEach(r=>{const it=DB.items.find(i=>isSmcItem(i)&&(String(i.spec||'')===r.spec||String(i.code||'')===r.spec))||(r.name?DB.items.find(i=>isSmcItem(i)&&i.name===r.name):null);
    if(!it){miss.push(r.spec||r.name);return;}
    const oldE=+it.ePrice||0,oldSale=+it.salePrice||0;
    if(r.ePrice!=null&&r.ePrice>0)it.ePrice=r.ePrice;
    if(r.dc!=null&&r.dc<1)it.dcRate=r.dc;
    if(r.margin!=null&&r.margin<1){it.marginRate=r.margin;delete it.saleManual;}
    if(r.leadtime)it.leadtime=r.leadtime;
    if(r.prev!=null&&r.prev>0)it.prevPrice=r.prev;
    const d=smcLedgerApply(it);touch(it);upd++;
    const newE=+it.ePrice||0,newSale=d?d.sale:(+it.salePrice||0);
    rep.push({spec:it.spec||it.code||'',name:it.name,oldE,newE,oldSale,newSale,eChg:oldE!==newE,saleChg:oldSale!==newSale});});
  if(upd)logAudit('SMC 원장 CSV 수신',upd+'품목 · 가격 변경 '+rep.filter(x=>x.saleChg).length+'건');
  return {upd,rep,miss};}
function smcLedgerInModal(){
  openModal('<h3>원장 CSV 수신</h3><div class="mini">열 순서(송출과 동일): '+SMC_LEDGER_HEAD.join(', ')+' — 헤더 자동 스킵 · 매칭: 규격(품번)→코드→품명 · <b>E가만 갱신해도 DC율·마진율은 유지</b>되어 구매·판매가가 재계산되고, 판매가가 바뀐 품목은 <span class="badge b-amber">가격 변경</span> 리포트로 표시됩니다</div>'
  +'<textarea id="sl-in" rows="8" style="width:100%" placeholder="VK334V-5DS-01-Q,SMC 솔레노이드밸브 VK334V,50360,25%,,12%,,3~4일,,,43000,"></textarea>'

/* ---- 가격표 수신 → E가 반영 체인 ---- */
function smcEPriceApply(rows){ // SMC 가격표(품번,단가) → 매칭 품목 ePrice 갱신 · DC/마진 유지 재계산 · 변동 리포트 반환
  const rep=[];
  rows.forEach(r=>{const it=DB.items.find(i=>isSmcItem(i)&&String(i.spec||'')===r.part)||DB.items.find(i=>isSmcItem(i)&&String(i.code||'')===r.part);
    if(!it||!(r.price>0))return;
    const oldE=+it.ePrice||0,oldSale=+it.salePrice||0;
    if(oldE===r.price)return;
    it.ePrice=r.price;
    const d=smcLedgerApply(it);touch(it);
    rep.push({part:r.part,name:it.name,oldE,newE:r.price,oldSale,newSale:d?d.sale:(+it.salePrice||0)});});
  if(rep.length)logAudit('SMC 가격표 → E가 반영',rep.length+'품목 (DC·마진 유지 재계산)');
  return rep;}

  +rep.map(x=>'<tr><td><b>'+esc(x.part)+'</b></td><td>'+esc(x.name)+'</td>'

  +'</table><div class="bar" style="margin-top:10px"><button class="pri" onclick="closeModal();route()">확인</button></div>');}
/* ---- 견적/명세서 라인 연동 ---- */
function smcLineLedgerize(l,it){ // 품목 선택 시: 원장 판매가 자동 적용 + 납기 → 라인 비고 + 약정가 스냅샷(감사 대조)
  const d=it?smcLedgerCalc(it):null;if(!d)return l;
  l.price=d.sale;l.ledgerSale=d.sale;
  if(it.leadtime&&!l.note)l.note='납기 '+it.leadtime;

function smcLedgerBadge(l,i){ // 라인 편집기: 원장 체인 배지 — E가·DC·구매가·마진은 내부 전용(발송·출력 문서 미표기)
  if(EDITION!=='dealer')return '';
  const it=l.itemId?byId(DB.items,l.itemId):null;

  +(typeof ED!=='undefined'&&ED&&!ED.ro?' <a class="lnk" onclick="smcApplyLedgerPrice('+i+')">[원장가 적용]</a>':'')
  +(it.leadtime?' <span class="badge b-gray" title="원장 납기 — 품목 선택 시 라인 비고로 자동 기록">납기 '+esc(it.leadtime)+'</span>':'')+'</div>';}
function smcApplyLedgerPrice(i){const l=ED.lines[i];if(!l)return;

  if(!d){toast('원장 E가가 등록되지 않은 품목입니다 — SMC 가격 원장에서 E가를 입력하세요');return;}

/* ---- v4.6: 이중 거래명세서 (업체 제출용/SMC 보고용) + 차액 (2026-07-09) ----
   배경: 업체가 요구하는 판매 단가로 명세서를 끊으면 SMC 감사 시스템(약정가)과 안 맞음 →
   업체 제시용(라인 단가 그대로)과 SMC 제출용(약정가 재계산) 두 버전 + 차액 확인. */
function dlSmcRef(l){ // SMC 라인의 약정가 — ledgerSale 스냅샷 우선, 없으면 현재 원장 판매가 (비SMC 라인 null)
  const it=l.itemId?byId(DB.items,l.itemId):null;
  if(!isSmcItem(it))return null;
  if(+l.ledgerSale>0)return +l.ledgerSale;
  const d=smcLedgerCalc(it);return d?d.sale:null;}
function dlSmcLines(d){ // SMC 보고용 라인 — SMC 브랜드 라인만 약정가로 단가 치환·재계산 (비SMC 라인 동일 객체 그대로)
  return (d.lines||[]).map(l=>{const ref=dlSmcRef(l);
    if(ref==null||Math.round(+l.price||0)===Math.round(ref))return l;
    const it=l.itemId?byId(DB.items,l.itemId):null;
    return calcLine(Object.assign({},l,{price:ref,_smcSwap:1,_coPrice:l.price}),it&&it.tax==='exempt');});}
function dlDiff(d){ // 차액: 라인별 (업체단가−약정가)×수량 + 총 차액(업체용 총액−SMC 보고용 총액, VAT 포함) — 화면 전용
  const lines=[];
  (d.lines||[]).forEach((l,i)=>{const ref=dlSmcRef(l);if(ref==null)return;
    const per=Math.round(+l.price||0)-Math.round(ref);
    if(per)lines.push({i,l,ref,per,amt:per*(+l.qty||0)});});
  const cot=lineTotals(d.lines),smt=lineTotals(dlSmcLines(d));
  return {lines,coTotal:cot.total,smcTotal:smt.total,total:cot.total-smt.total};}
function dlDiffBadge(df,small){ // +과대(업체가>약정가)/−과소 배지 — 화면 전용
  if(!df.lines.length)return '';
  const over=df.total>=0;
  return '<span class="badge '+(over?'b-red':'b-blue')+'"'+(small?' style="font-size:10px"':'')+' title="업체 제출용 총액 '+fmt(df.coTotal)+' − SMC 보고용 총액 '+fmt(df.smcTotal)+' = '+fmt(df.total)+'원 ('+(over?'과대':'과소')+' 청구) — 화면 전용, 대외 인쇄 미노출">'+(over?'+과대 ':'−과소 ')+fmt(Math.abs(df.total))+'</span>';}
/* ---- SMC 감사 리포트 (#/smcaudit — 회계 그룹) ---- */
function smcAuditSummary(from,to){ // (a) 거래처별: 거래명세서 합계 vs 세금계산서(발행) 합계 — 합계발행(transIds)은 계산서 1장으로 집계(이중계상 없음) · 미입고 대기(holdGr) 제외
  const by={};
  const B=cid=>by[cid]||(by[cid]={cid,dlCnt:0,dlSum:0,dlSumSmc:0,tiCnt:0,tiSum:0});
  DB.trans.filter(t=>t.type==='sales'&&t.status!=='holdGr'&&t.date>=from&&t.date<=to).forEach(d=>{const t=lineTotals(d.lines);const b=B(d.companyId);b.dlCnt++;b.dlSum+=t.total;b.dlSumSmc+=lineTotals(dlSmcLines(d)).total;}); // v4.6: SMC 보고용 합(약정가 재계산) 병행 집계
  DB.taxInvoices.filter(t=>t.type==='sales'&&t.status==='sent'&&t.date>=from&&t.date<=to).forEach(ti=>{const b=B(ti.companyId);b.tiCnt++;b.tiSum+=ti.supply+ti.vat;});
  const rows=Object.keys(by).map(k=>{const b=by[k];b.diff=b.tiSum-b.dlSum;b.ok=Math.abs(b.diff)<1;return b;})
    .sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  const tot=rows.reduce((s,b)=>({dlCnt:s.dlCnt+b.dlCnt,dlSum:s.dlSum+b.dlSum,dlSumSmc:s.dlSumSmc+b.dlSumSmc,tiCnt:s.tiCnt+b.tiCnt,tiSum:s.tiSum+b.tiSum}),{dlCnt:0,dlSum:0,dlSumSmc:0,tiCnt:0,tiSum:0});
  tot.diff=tot.tiSum-tot.dlSum;
  return {rows,tot};}
function smcAuditViols(from,to){ // (b) 약정가 검증: SMC 라인 단가 ≠ 원장 판매가 — 라인 스냅샷(ledgerSale) 우선, 없으면 현재 원장가와 비교('참고')
  const out=[];
  DB.trans.filter(t=>t.type==='sales'&&t.status!=='holdGr'&&t.date>=from&&t.date<=to).forEach(t=>t.lines.forEach(l=>{
    const it=l.itemId?byId(DB.items,l.itemId):null;
    if(!isSmcItem(it))return;
    let ref=null,snap=false;
    if(+l.ledgerSale>0){ref=+l.ledgerSale;snap=true;}
    else{const d=smcLedgerCalc(it);if(d)ref=d.sale;}
    if(ref==null)return;
    if(Math.round(+l.price||0)!==Math.round(ref))out.push({t,l,it,ref,snap,diff:Math.round(+l.price||0)-Math.round(ref),d:smcLedgerCalc(it)});}));
  return out;}

function navActive(h){
  if(h.startsWith('#/hub/')){const _g=h.split('/')[2];if(NAV_GROUPS.some(g=>g.id===_g))return {href:'#/hub/'+_g,gid:_g};} // v4.4: 그룹 허브 — 해당 그룹 자동 펼침
  if(h==='#/mail'||h.startsWith('#/mail/')||h.startsWith('#/mail?'))return {href:'#/mail',gid:'pin'}; // v4.1: 메일함 상단 고정
  let best=null,bs=0;
  NAV_GROUPS.forEach(g=>g.items.forEach(it=>{const href=it[0];let s=0;
    if(h===href)s=1000;
    else if(h.startsWith(href+'/')||h.startsWith(href+'?'))s=href.length;
    else if(href==='#/purchase'&&h.startsWith('#/po'))s=4;
    else if(href==='#/money/bank'&&h.startsWith('#/money'))s=4;
    else if(href==='#/reports'&&h.startsWith('#/reports'))s=3;
    if(s>bs){bs=s;best={href,gid:g.id};}}));
  return best||{href:'#/dash',gid:'home'};}
function navBadge(href){
  const un=mailUnread(),pend=pendingApvList().length;
  if(href==='#/mail'&&un)return un;
  if(href==='#/approvals'&&pend)return pend;
  if(href==='#/costpending'){const n=costPendingLines().length;if(n)return n;}
  if(href==='#/leave'){const n=pendingLeaveCount();if(n)return n;} // v4.3: 인사 배지 — 내가 승인할 휴가 건수
  if(href==='#/smcinbox'){const n=smcHoldList().length;if(n)return n;} // D1: 보류(미매칭) 배지
  return 0;}
function navToggle(gid){DB.ui=DB.ui||{navOpen:{}};DB.ui.navOpen=DB.ui.navOpen||{};
  const act=navActive(location.hash||'#/dash');
  const cur=(gid===act.gid)||DB.ui.navOpen[gid]!==false;

function pcFilter(q,type){const list=DB.companies.filter(c=>c.active&&(type?(c.type===type||c.type==='both'):true)&&(c.name.includes(q)||(c.bizno||'').includes(q)));document.getElementById('pc-list').innerHTML=pcRows(list);}
function pcPick(id){closeModal();if(_pickCb)_pickCb(id);}
function coType(t){return t==='sales'?'매출처':t==='purchase'?'매입처':'겸용';}
/* ---- 거래처 자동완성 콤보박스 — 입력 즉시 검색(한글 IME 안전), 🔍 버튼=기존 상세 모달 ---- */
let _ccReg={},_ccSel={},_ccList=[],_ccIdx=-1;
function coCombo(id,cb,type,initName,dis){_ccReg[id]={cb:cb,type:type||''};_ccSel[id]=initName||'';
  return '<div style="position:relative;flex:1;min-width:0"><input id="'+id+'" autocomplete="off" value="'+esc(initName||'')+'" placeholder="업체명/사업자번호 입력 — 자동완성" '+(dis?'disabled ':'')
  +'oninput="ccInput(\''+id+'\')" onfocus="ccInput(\''+id+'\')" onblur="ccBlur(\''+id+'\')" onkeydown="ccKey(event,\''+id+'\')" style="width:100%">'
  +'<div id="cc-dd-'+id+'" class="cc-dd" style="display:none"></div></div>'
  +'<button '+(dis?'disabled ':'')+'onclick="ccModal(\''+id+'\')" title="거래처 상세 검색 (표에서 구분·대표까지 확인)">🔍 검색</button>';}
function ccBase(id,q){const r=_ccReg[id]||{};q=String(q||'').toLowerCase();
  return DB.companies.filter(c=>c.active&&(r.type?(c.type===r.type||c.type==='both'):true)&&(!q||c.name.toLowerCase().includes(q)||String(c.bizno||'').includes(q))).slice(0,12);}
function ccHi(t,q){t=String(t||'');if(!q)return esc(t);const i=t.toLowerCase().indexOf(q.toLowerCase());if(i<0)return esc(t);
  return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+q.length))+'</mark>'+esc(t.slice(i+q.length));}
function ccInput(id){const el=document.getElementById(id);if(!el)return;_ccIdx=-1;_ccList=ccBase(id,String(el.value||'').trim());ccRender(id);}
function ccRender(id){const dd=document.getElementById('cc-dd-'+id);if(!dd)return;const el=document.getElementById(id);const q=el?String(el.value||'').trim():'';
  dd.innerHTML=_ccList.length?_ccList.map((c,i)=>'<div class="cc-op'+(i===_ccIdx?' on':'')+'" onmousedown="event.preventDefault();ccPick(\''+id+'\',\''+c.id+'\')"><b>'+ccHi(c.name,q)+'</b> <span class="mini">'+coType(c.type)+(c.bizno?' · '+ccHi(c.bizno,q):'')+'</span></div>').join(''):'<div class="cc-op" style="cursor:default"><span class="mini">결과 없음 — 🔍 검색에서 확인하거나 거래처를 먼저 등록하세요</span></div>';
  dd.style.display='block';}
function ccClose(id){const dd=document.getElementById('cc-dd-'+id);if(dd)dd.style.display='none';}
function ccExact(id){const el=document.getElementById(id);if(!el)return false;const q=String(el.value||'').trim();if(!q)return false;
  const r=_ccReg[id]||{};const m=DB.companies.filter(c=>c.active&&(r.type?(c.type===r.type||c.type==='both'):true)&&c.name.toLowerCase()===q.toLowerCase());
  if(m.length===1){ccPick(id,m[0].id);return true;}return false;}
function ccBlur(id){setTimeout(function(){ccBlurNow(id);},160);}
function ccBlurNow(id){const el=document.getElementById(id);if(!el)return;
  if(!ccExact(id)&&String(el.value||'').trim()!==_ccSel[id])el.value=_ccSel[id]||'';
  ccClose(id);}
function ccKey(e,id){if(e.isComposing||e.keyCode===229)return;
  if(e.key==='ArrowDown'){e.preventDefault();if(!_ccList.length)ccInput(id);else{_ccIdx=(_ccIdx+1)%_ccList.length;ccRender(id);}}
  else if(e.key==='ArrowUp'){e.preventDefault();if(_ccList.length){_ccIdx=(_ccIdx-1+_ccList.length)%_ccList.length;ccRender(id);}}
  else if(e.key==='Enter'){e.preventDefault();
    if(_ccIdx>=0&&_ccList[_ccIdx])ccPick(id,_ccList[_ccIdx].id);
    else if(!ccExact(id)&&_ccList.length===1)ccPick(id,_ccList[0].id);}
  else if(e.key==='Escape'){ccClose(id);}}
function ccPick(id,cid){const c=co(cid);_ccSel[id]=c.name;const el=document.getElementById(id);if(el)el.value=c.name;ccClose(id);
  const r=_ccReg[id];if(r&&r.cb)r.cb(cid);}
function ccModal(id){const r=_ccReg[id]||{};pickCompany(function(cid){_ccSel[id]=co(cid).name;const el=document.getElementById(id);if(el)el.value=co(cid).name;if(r.cb)r.cb(cid);},r.type);}

function piRows(list){return '<table><tr><th>코드</th><th>품목명</th><th>브랜드</th><th>규격</th><th>구분</th><th class="r">매출단가</th><th class="r">매입단가</th></tr>'+list.map(i=>'<tr style="cursor:pointer" onclick="pcPick(\''+i.id+'\')"><td>'+esc(i.code)+'</td><td><b>'+esc(i.name)+'</b></td><td>'+esc(i.brand||'')+'</td><td>'+esc(i.spec)+'</td><td>'+itemKind(i.kind)+'</td><td class="r num">'+fmt(i.salePrice)+'</td><td class="r num">'+fmt(i.buyPrice)+'</td></tr>').join('')+'</table>';}

  else{const it=Object.assign({id:uid('i'),active:1},data);DB.items.push(it);saveDB();

function instChg(id,k,v){const inst=byId(DB.installments,id);
  if(inst.status!=='planned'&&(k==='amount')){toast('청구/수금된 회차는 금액을 바꿀 수 없습니다');route();return;}
  inst[k]=k==='amount'?Math.round(+String(v).replace(/,/g,'')||0):v;
  if(k==='amount')inst.ratio=null;
  saveDB();route();}
function instRatio(id,v){const inst=byId(DB.installments,id);const o=byId(DB.orders,inst.orderId);
  inst.ratio=+v||0;inst.amount=Math.round(orderTotal(o)*inst.ratio/100);saveDB();route();}
function instAdd(oid){const o=byId(DB.orders,oid);const ins=orderInsts(oid);
  const names=['계약금','중도금','잔금'];
  DB.installments.push({id:uid('in'),orderId:oid,seq:ins.length+1,name:names[Math.min(ins.length,2)],trigger:'',ratio:null,amount:0,dueDate:addDays(today(),30*(ins.length+1)),status:'planned',tiId:null});
  saveDB();route();}
function instDel(id){const inst=byId(DB.installments,id);
  if(inst.status!=='planned'){toast('청구/수금된 회차는 삭제할 수 없습니다');return;}
  if(!confirm('회차를 삭제할까요?'))return;
  DB.installments=DB.installments.filter(i=>i.id!==id);
  orderInsts(inst.orderId).forEach((x,i)=>x.seq=i+1);saveDB();route();}
function instAutoFill(oid){const o=byId(DB.orders,oid);const ins=orderInsts(oid);
  const tot=orderTotal(o);const fixed=ins.filter(i=>i.status!=='planned'||i.amount>0);
  const open=ins.filter(i=>i.status==='planned'&&i.amount===0);
  if(!open.length){toast('금액이 0원인 예정 회차가 없습니다');return;}
  const remain=tot-fixed.reduce((s,i)=>s+i.amount,0);
  const each=Math.floor(remain/open.length);
  open.forEach((i,idx)=>{i.amount=idx===open.length-1?remain-each*(open.length-1):each;});
  saveDB();route();toast('잔여 '+fmt(remain)+'원을 자동 배분했습니다');}
function instPreset(oid){const o=byId(DB.orders,oid);
  if(orderInsts(oid).length&&!confirm('기존 회차(예정 상태)를 지우고 30/40/30으로 다시 만들까요? 청구·수금된 회차는 유지됩니다.'))return;
  DB.installments=DB.installments.filter(i=>i.orderId!==oid||i.status!=='planned');
  const kept=orderInsts(oid);const tot=orderTotal(o);const keptAmt=kept.reduce((s,i)=>s+i.amount,0);
  const remain=tot-keptAmt;const r=[["계약금","계약 시",30],["중도금","제작 착수",40],["잔금","검수 완료",30]];
  let acc=0;r.forEach((x,i)=>{let amt=i===2?remain-acc:Math.round(remain*x[2]/100);acc+=amt;
    DB.installments.push({id:uid('in'),orderId:oid,seq:kept.length+i+1,name:x[0],trigger:x[1],ratio:x[2],amount:amt,dueDate:addDays(today(),30*(i+1)),status:'planned',tiId:null});});
  saveDB();route();}
function orderStatus(id,st){const o=byId(DB.orders,id);o.status=st;touch(o);saveDB();route();toast('상태가 변경되었습니다');}
function orderClose(id){const o=byId(DB.orders,id);const ins=orderInsts(id);

  o.status='closed';touch(o);saveDB();route();}
function orderCancel(id){const o=byId(DB.orders,id);const ins=orderInsts(id);
  const hasAlloc=ins.some(i=>instAlloc(i.id)>0);
  const hasSent=DB.taxInvoices.some(ti=>ti.status==='sent'&&((ti.basis==='order'&&ti.basisId===id)||(ti.basis==='installment'&&ins.some(i=>i.id===ti.basisId))));
  if(hasAlloc){alert('입금 배분이 있는 수주는 바로 취소할 수 없습니다.\n[자금/통장대사]에서 배분을 먼저 취소하세요. (절차 강제)');return;}
  if(hasSent){alert('발행된 세금계산서가 있는 수주는 바로 취소할 수 없습니다.\n[세금계산서]에서 수정(취소)계산서를 먼저 발행하세요. (절차 강제)');return;}

  o.status='canceled';touch(o);

  saveDB();route();toast('수주가 취소되었습니다. 원본 견적은 다시 활성화되었습니다.');}

function saveOrder(){
  if(!ED.companyId){toast('거래처를 선택하세요');return;}
  if(!ED.lines.length||ED.lines.every(l=>!l.name)){toast('품목 라인을 입력하세요');return;}
  const g=x=>document.getElementById(x).value;
  const data={companyId:ED.companyId,date:g('f-date'),dueDate:g('f-due'),midterm:g('f-mid')==='1',memo:g('f-memo'),lines:ED.lines.filter(l=>l.name)};
  if(ED.id){const o=byId(DB.orders,ED.id);
    const oldTot=orderTotal(o);const newTot=lineTotals(data.lines).total;
    if(oldTot!==newTot){
      const ins=orderInsts(o.id);
      const hasBilled=ins.some(i=>i.status!=='planned');
      if(hasBilled&&!confirm('⚠ 계약액이 '+fmt(oldTot)+' → '+fmt(newTot)+'원으로 바뀝니다.\n이미 청구/수금된 회차가 있습니다. 미청구 회차만 조정 가능합니다. 계속할까요?'))return;
      if(!hasBilled&&o.status!=='ordered'&&!confirm('제작 진행 중 금액 변경입니다. 계속할까요?'))return;}
    Object.assign(o,data);touch(o);
    saveDB();toast('저장되었습니다. 수금계획 합계를 확인하세요.');location.hash='#/orders/view/'+o.id;}
  else{const o=Object.assign({id:uid('so'),no:docNo('SO',data.date),quoteId:null,status:'ordered'},data);
    DB.orders.push(o);saveDB();toast('수주가 등록되었습니다. 수금계획을 설정하세요.');location.hash='#/orders/view/'+o.id;}}

function deliveryCreate(oid){ // v4.1: 출고분=정상 명세서 · 재고 부족분=미입고 대기(holdGr) 전표 자동 분리 · 라인 원가=최근 매입가 자동 삽입
  const o=byId(DB.orders,oid);const dq=deliveredQty(oid);const hq=holdQtyMap(oid);
  if(!lockGuard(document.getElementById('dl-date').value,'납품 생성'))return;
  const ship=[],hold=[];let err='';
  o.lines.forEach((l,i)=>{const el=document.getElementById('dl-q'+i);if(!el)return;
    const k=(l.itemId||'')+'|'+l.name;const rem=l.qty-(dq[k]||0)-(hq[k]||0);
    if(rem<=0)return;
    const avail=shipAvailFor(oid,l);
    const q=+String(el.value).replace(/,/g,'')||0;
    if(q>rem){err='"'+l.name+'" 출고수량('+q+')이 잔량('+rem+')을 초과합니다';return;}
    if(avail!=null&&q>avail){err='"'+l.name+'" 출고수량('+q+')이 출고가능('+avail+')을 초과합니다 — 입고 후 출고하세요';return;}
    const it=l.itemId?byId(DB.items,l.itemId):null;const ex=it&&it.tax==='exempt';
    if(q>0)ship.push(fillLineCost(calcLine({itemId:l.itemId,name:l.name,spec:l.spec,unit:l.unit,qty:q,price:l.price,setOpts:l.setOpts?l.setOpts.slice():undefined},ex))); // v4.5: 세트 옵션 라인 승계
    if(avail!=null&&avail<rem&&rem-q>0)hold.push(fillLineCost(calcLine({itemId:l.itemId,name:l.name,spec:l.spec,unit:l.unit,qty:rem-q,price:l.price,setOpts:l.setOpts?l.setOpts.slice():undefined},ex)));});
  if(err){toast('⚠ '+err);return;}
  if(!ship.length&&!hold.length){toast('납품 수량을 입력하세요');return;}
  const date=document.getElementById('dl-date').value;
  let msg='';
  if(ship.length){const d={id:uid('ts'),no:docNo('DL',date),type:'sales',orderId:oid,companyId:o.companyId,date,status:'open',lines:ship};
    DB.trans.push(d);msg='거래명세서 '+d.no+' 생성';}
  if(hold.length){const h={id:uid('ts'),no:docNo('DL',date),type:'sales',orderId:oid,companyId:o.companyId,date,status:'holdGr',holdNote:'미입고 분리 보관 — 입고 완료 후 [출고 전환]',lines:hold};
    DB.trans.push(h);logAudit('미입고 대기 전표 생성',h.no);
    msg+=(msg?' · ':'')+'📦 미입고 대기 '+h.no+' 분리 ('+hold.length+'품목 — 입고 완료 후 [출고 전환])';}
  const full=refreshOrderDelivered(oid);
  saveDB();closeModal();route();
  toast(msg+(full?' · 전량 납품 → 수주 상태 [납품완료]로 자동 변경':''));}
function dlRelease(id){ // v4.1: 미입고 대기 전표 → 정상 거래명세서 전환 (재고 재확인 · 부분 가능 시 재분리)
  const d=byId(DB.trans,id);

  const date=today();

    return fillLineCost(calcLine({itemId:l.itemId,name:l.name,spec:l.spec,unit:l.unit,qty:q,price:l.price,setOpts:l.setOpts?l.setOpts.slice():undefined},it&&it.tax==='exempt'));};
  const n={id:uid('ts'),no:docNo('DL',date),type:'sales',orderId:d.orderId,companyId:d.companyId,date,status:'open',releasedFrom:d.no,lines:can.map(x=>mk(x.l,x.ship))};

  refreshOrderDelivered(d.orderId);

/* ================= v4.2: 원가(매입단가) 미확정 관리 (2026-07-04) ================= */
/* 배경: 매입단가를 측정하지 못하는 품목은 거래명세서 작성 시 원가 0으로 저장돼 마진·수주 수익률이 왜곡됨.
   → 라인에 costPending 플래그를 남기고(저장·인쇄 차단 없음) 전용 페이지에서 추후 확인·확정. */
function costPendingCalc(l){ // 원가 미확정 판정: 매입 대상 품목(part/material)인데 라인 원가·기준 매입단가·매입 입고 이력 전부 없음
  if(!l||!l.itemId)return false;
  if(l.cost!=null&&l.cost>0)return false;
  const it=byId(DB.items,l.itemId);
  if(it&&it.isSet)return !setCostOf(it.id,l.setOpts); // v4.5: 세트는 조립원가·컴포넌트 원가가 계산되면 미확정 아님
  if(!it||!['part','material'].includes(it.kind))return false; // 제작품·용역 원가는 자재비·공수로 집계 — 대상 아님
  if(it.buyPrice>0)return false;
  if(recentBuyCost(l.itemId))return false;
  return true;}
function costPendingLines(){ // 원가 미확정 라인 전체 수집 (매출 거래명세서 — 미입고 대기 전표 포함, 최신순)
  const out=[];
  DB.trans.filter(t=>t.type==='sales').forEach(t=>t.lines.forEach((l,i)=>{if(l.costPending)out.push({t,l,i});}));
  return out.sort((a,b)=>a.t.date<b.t.date?1:-1);}
function pageCostPending(M){
  const all=costPendingLines();
